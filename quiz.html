え、その出力結果を観察・分析することで、モデルのパラメータや構造を推測し複製する攻撃である。企業が独自に開発した高精度モデルの知的財産が不正に模倣されるリスクを生む。データ窃取（学習データの推測を狙う攻撃）と混同されやすいが、狙う対象がデータかモデルかで区別される。", "note": "データ窃取・モデル汚染と対比", "imp": "○"}, {"id": 538, "cat": "13.数学統計", "term": "ユークリッド距離", "en": "Euclidean Distance", "desc": "ユークリッド距離は、各次元における値の差を2乗して足し合わせ、その平方根をとることで求められる距離で、直線的な隔たりをそのまま測るという点で、私たちが普段イメージする距離の感覚に近い指標である。k近傍法やクラスタリングなど、データ同士の近さを比較する多くの手法で標準的に採用される。変数間の相関を織り込むマハラノビス距離や、向きの違いを測るコサイン類似度とは測り方の前提が異なる。", "note": "マハラノビス距離・コサイン類似度と対比", "imp": "○"}, {"id": 539, "cat": "18.法律補完", "term": "ライセンス契約", "en": "License Agreement", "desc": "ライセンス契約（使用許諾契約）とは、AI開発の成果物やソフトウェアなどの知的財産について、その利用条件を定める契約である。AI開発を委託する際、成果物の知的財産権の帰属だけでは利用条件が十分にカバーしきれない複雑なケースでは、別途ライセンス契約を締結して使用範囲や条件を明確にする。ソフトウェア開発契約と併せて、知的財産の権利関係を整理する手段として用いられる。", "note": "ソフトウェア開発契約と併用", "imp": "○"}, {"id": 540, "cat": "18.法律補完", "term": "リスクベースアプローチ", "en": "Risk-based Approach", "desc": "リスクベースアプローチとは、AIの利活用によって生じるリスクの大きさに応じて、規制や対応の強度を段階的に対応させるべきという考え方である。すべてのAIに一律の厳格な規制を課すのではなく、リスクが高い用途（採用選考や医療診断など）には厳しい規制を、リスクが低い用途には軽い規制を適用する発想であり、EUのAI規則などのAIガバナンス設計の基本原則となっている。", "note": "AI原則・ハードロー/ソフトローと関連", "imp": "○"}, {"id": 541, "cat": "9.応用-言語音声", "term": "ルールベース機械翻訳", "en": "Rule-based Machine Translation", "desc": "ルールベース機械翻訳とは、文法規則や辞書などの言語知識をあらかじめ人手で整備し、それに基づいて翻訳を行う初期の機械翻訳方式である。機械翻訳技術はルールベース機械翻訳から、対訳データを統計的に処理する統計的機械翻訳、さらにニューラルネットワークを用いるニューラル機械翻訳へと発展してきた。ルールベース方式は膨大な言語規則の整備が必要で、対応言語や表現の拡張が難しいという limitations があった。", "note": "統計的機械翻訳→ニューラル機械翻訳へ変遷", "imp": "○"}, {"id": 542, "cat": "6.DL学習技術", "term": "レイヤー正規化", "en": "Layer Normalization", "desc": "レイヤー正規化とは、ニューラルネットワークの前層の出力に対して、ミニバッチ内の各データごとに正規化を行う手法である。バッチ正規化がミニバッチ全体の統計量に依存し小さいバッチサイズで不安定になりやすいのに対し、レイヤー正規化はデータ単位で正規化するためバッチサイズの影響を受けにくく、Transformerなど系列データを扱うモデルで広く採用されている。", "note": "バッチ正規化・インスタンス正規化と対比", "imp": "○"}, {"id": 543, "cat": "11.社会実装-産業", "term": "レコメンデーション", "en": "Recommendation", "desc": "レコメンデーションとは、ユーザーの好みや行動履歴に基づいて、そのユーザーが関心を持ちそうな商品やコンテンツを推薦する技術である。代表的な手法である協調フィルタリングは、あるユーザーと嗜好が似た別のユーザーの購買履歴を利用し、そのユーザーが購入した商品を推薦する仕組みを持つ。ECサイトの商品表示順位の決定などにも使われるが、特定商品を意図的に優遇すると公正競争阻害性が問題となり得る。", "note": "協調フィルタリングが代表手法", "imp": "○"}, {"id": 544, "cat": "8.応用-画像", "term": "一般物体認識", "en": "Generic Object Recognition", "desc": "一般物体認識とは、画像に写る物体を「椅子」や「猫」といった一般的なカテゴリレベルで判別するタスクである。物体認識（物体識別）は特定物体認識と一般物体認識に分類され、前者が個々の物体そのものの同一性を識別するのに対し、一般物体認識はより抽象化されたクラス分類を行う点が異なる。画像分類を行うCNNベースのモデルの多くはこの一般物体認識にあたる。", "note": "特定物体認識と対比される概念", "imp": "○"}, {"id": 545, "cat": "8.応用-画像", "term": "特定物体認識", "en": "Specific Object Recognition", "desc": "特定物体認識とは、ある画像に写っている物体が、あらかじめ登録された特定の物体と全く同一であるかどうかを判別するタスクである。一般的なカテゴリを判別する一般物体認識とは異なり、個体レベルでの同一性判定を目的とする点が特徴で、例えば特定の製品や個人の顔を識別する場面などで用いられる。物体認識（物体識別）はこの特定物体認識と一般物体認識に分類される。", "note": "一般物体認識と対比される概念", "imp": "○"}, {"id": 546, "cat": "1.AIとAIの動向", "term": "不気味の谷", "en": "Uncanny Valley", "desc": "不気味の谷とは、ロボットやCGキャラクターなどが人間に似てくるにつれて親近感が高まっていくが、ある類似度の水準を超えると急激に嫌悪感や不気味さを感じるようになる現象である。ロボット工学者の森政弘によって提唱された概念で、人間そっくりのアンドロイドや写実的なCGキャラクターの造形設計において考慮すべき重要な知見となっている。", "note": "森政弘が提唱、アンドロイド設計に関連", "imp": "○"}, {"id": 547, "cat": "15.DL発展", "term": "二重降下現象", "en": "Double Descent", "desc": "モデルの表現力を高めていく過程で、テスト誤差が一旦悪化した後に再び下がっていく現象を指す。訓練誤差の減少に対してテスト誤差が単調に増加するという古典的な過学習の図式とは食い違うふるまいであり、パラメータ数やデータ量をさらに増やすことで精度が持ち直すケースがあるため、早期終了だけでは最適な学習の止め時を判断しきれない場合がある。", "note": "過学習・早期終了と関連", "imp": "○"}, {"id": 548, "cat": "13.数学統計", "term": "二項分布", "en": "Binomial Distribution", "desc": "コインをn回投げて表が出る回数のように、結果が成功と失敗の2種類しかない試行（ベルヌーイ試行）をn回独立に行った際に、成功した回数がとる確率分布を二項分布という。試行回数nと成功確率pという2つのパラメータで特徴づけられる離散確率分布であり、n=1の場合はベルヌーイ分布そのものに一致する。", "note": "ベルヌーイ分布・ポアソン分布と関連", "imp": "○"}, {"id": 549, "cat": "1.AIとAIの動向", "term": "人工無脳", "en": "Chatbot (Jinkou Munou)", "desc": "あらかじめ定められたルールやパターンマッチングだけで返答を組み立て、内部に知識や推論の仕組みを持たないまま、会話が成立しているように見せる対話プログラムを人工無脳と呼ぶ。1966年に登場したELIZA（イライザ）はその代表例として知られ、真の知能を備えたエキスパートシステムとは一線を画す存在とされる。", "note": "イライザが元祖とされる", "imp": "○"}, {"id": 550, "cat": "13.数学統計", "term": "代理変数", "en": "Proxy Variable", "desc": "代理変数とは、人種や性別などのセンシティブ情報そのものを直接使わなくても、それと強い相関を持つために実質的に同様の効果を生んでしまう別の変数のことである。例えば居住地域や出身校がセンシティブ情報の代理変数として機能し、AIの採用審査モデルなどに知らぬ間に組み込まれると、特定属性への差別的なスコアリングを引き起こす公平性の問題につながる。", "note": "センシティブ情報の代替として機能", "imp": "○"}, {"id": 551, "cat": "12.法律倫理", "term": "保有個人データ", "en": "Retained Personal Data", "desc": "個人情報保護法上、本人からの開示・訂正・利用停止などの請求に事業者自身が対応する権限を持つ個人データを保有個人データという。同法が定めるより広い概念である個人データの中でも、事業者が実質的にコントロールできる範囲に絞られたものがこれに該当し、両概念の範囲の違いは同法の理解を問う設問で頻繁に取り上げられる。", "note": "個人データより範囲が限定的", "imp": "○"}, {"id": 552, "cat": "12.法律倫理", "term": "個人データ", "en": "Personal Data", "desc": "個人情報保護法上の分類の一つで、氏名などの情報を検索しやすい形に整理した「個人情報データベース等」の中に組み込まれている個人情報のことを指す。単に個人情報を持っているだけでなく、それが体系的に検索可能なデータベースの一部になっている点がポイントであり、事業者にはこれらの漏えいや滅失を防止するための安全管理措置を講じる義務が課される。", "note": "個人情報データベース等を構成", "imp": "○"}, {"id": 553, "cat": "12.法律倫理", "term": "個人識別符号", "en": "Personal Identifier Code", "desc": "個人識別符号とは、それ単独で特定の個人を識別できる符号のことであり、個人情報保護法上の個人情報に該当する。指紋データや旅券番号、マイナンバーなどが代表例であり、これらは他の情報と照合しなくてもそれ自体で本人を特定できるため、厳格な保護対象となる。画像データを加工した場合でも、特定個人を識別できる状態であれば個人識別符号とみなされる。", "note": "指紋データ・旅券番号が該当例", "imp": "○"}, {"id": 554, "cat": "12.法律倫理", "term": "要配慮個人情報", "en": "Sensitive Personal Information", "desc": "病歴や人種、社会的身分といった、取り扱い方によっては本人が差別や偏見の対象になりかねない個人情報を指す法律上の分類で、個人情報保護法上、通常の個人情報よりも取得や利用に厳しい制約が課される。かつて「センシティブ情報（機微情報）」と呼ばれていた枠組みを整理し直したものであり、こうした情報やそれに準じる代理的な特徴をAIの学習に用いると、出力結果に不公平な偏りをもたらす恐れがある。", "note": "旧称はセンシティブ情報（機微情報）", "imp": "○"}, {"id": 555, "cat": "12.法律倫理", "term": "倫理アセスメント", "en": "Ethics Assessment", "desc": "AIの開発・運用が公平性や安全性などの倫理的観点で問題を起こさないかを事前・継続的に調査する評価活動である。AI倫理アセスメントとも呼ばれ、社内だけでなく外部の専門家に委託することで、多様な視点を取り入れられる利点がある。AIの再現性確保や入出力履歴の管理と並び、AIガバナンスを支える重要な取り組みの一つである。", "note": "AIガバナンス、追跡可能性と関連", "imp": "○"}, {"id": 556, "cat": "4.評価と前処理", "term": "偽陰性", "en": "False Negative", "desc": "実際は陽性であるデータを、モデルが誤って陰性と予測した件数を表す指標である。False Negative（FN）と呼ばれ、混同行列を構成する4分類（TP・TN・FP・FN）の一つである。例えば病気の検査で本当は罹患しているのに陰性と判定された場合が該当し、再現率（Recall）の計算に用いられる。", "note": "混同行列、TP/TN/FPと対", "imp": "○"}, {"id": 557, "cat": "4.評価と前処理", "term": "偽陽性", "en": "False Positive", "desc": "実際は陰性であるデータを、モデルが誤って陽性と予測した件数を表す指標である。False Positive（FP）と呼ばれ、混同行列を構成する要素の一つで、適合率（Precision）の計算式の分母に用いられる。例えば健康な人を病気と誤診する場合がこれに当たり、偽陽性率はROC曲線の横軸としても使われる。", "note": "適合率の計算、ROC曲線と関連", "imp": "○"}, {"id": 558, "cat": "4.評価と前処理", "term": "真陰性", "en": "True Negative", "desc": "実際は陰性であるデータを、モデルが正しく陰性と予測した件数を表す指標である。True Negative（TN）と呼ばれ、混同行列における4分類の一つであり、正解率（Accuracy）の計算に用いられる。2クラス分類では陽性・陰性の呼び分けがなされ、正しい陰性判定の数を示す。", "note": "混同行列、正解率の算出に使用", "imp": "○"}, {"id": 559, "cat": "4.評価と前処理", "term": "真陽性", "en": "True Positive", "desc": "実際は陽性であるデータを、モデルが正しく陽性と予測した件数を表す指標である。True Positive（TP）と呼ばれ、混同行列を構成する要素の一つで、適合率や再現率の計算式の分子として用いられる。例えば病気の人を正しく陽性と判定できた件数がこれに当たる。", "note": "適合率・再現率の計算に使用", "imp": "○"}, {"id": 560, "cat": "18.法律補完", "term": "公正競争阻害性", "en": "Impediment to Fair Competition", "desc": "公正な競争秩序に悪影響を及ぼすおそれがあることを指す独占禁止法上の概念である。例えばECサイトや飲食店の比較プラットフォームが、AIやアルゴリズムを用いて特定の商品や店舗が意図的に高く評価されるよう学習させた場合、出品者間の公正な競争が制限され問題となる。AIの社会実装においては独占禁止法との関連で理解しておくべき用語である。", "note": "独占禁止法、AIレコメンドと関連", "imp": "○"}, {"id": 561, "cat": "18.法律補完", "term": "独占禁止法", "en": "Antimonopoly Act", "desc": "公正かつ自由な競争を促進し、企業による市場支配や不当な取引制限を防ぐための法律である。AIをレコメンデーションなどに利用する事業者が、特定の商品を意図的に優遇して学習させ表示順位を操作するような行為は、公正競争阻害性の観点から独占禁止法上の問題となり得る。個人情報保護法や著作権法と並び、AIに関する法律と契約の分野で扱われる代表的な法律である。", "note": "公正競争阻害性、AIと法律の分野", "imp": "○"}, {"id": 562, "cat": "13.数学統計", "term": "共分散", "en": "Covariance", "desc": "2つの変数間にどの程度の相関があるかを表す統計指標である。2変数が正の相関を持つ場合は正の値、負の相関を持つ場合は負の値、相関がない場合は0付近の値をとる。ただし共分散の値のスケールは計算に使う変数の単位に依存するため、単位に左右されない指標として値を-1から1の範囲に正規化した相関係数がよく用いられる。", "note": "相関係数と対で理解する", "imp": "○"}, {"id": 563, "cat": "17.社会補完", "term": "再現性", "en": "Reproducibility", "desc": "AIガバナンスの文脈では、同一の入力に対して常に同一の結果を返せることを再現性と呼ぶ。入出力の記録を整備して再現性を確保しておけば、後から挙動を遡って確認できるようになり、説明可能性の担保にもつながる重要な要素となる。", "note": "追跡可能性・説明可能性と関連", "imp": "○"}, {"id": 564, "cat": "9.応用-言語音声", "term": "周波数スペクトル", "en": "Frequency Spectrum", "desc": "音声を構成する各周波数成分がどれくらいの強さで含まれているかをグラフ化したものが周波数スペクトルであり、音声認識・音声処理の基礎資料として利用される。このスペクトルの大まかな輪郭はスペクトル包絡と呼ばれ音色の違いを表すとされ、メル周波数ケプストラム係数（MFCC）で抽出した際のピーク位置はフォルマントに対応する。", "note": "スペクトル包絡、MFCC、フォルマントと関連", "imp": "○"}, {"id": 565, "cat": "7.DLの手法", "term": "回帰結合", "en": "Recurrent Connection", "desc": "ある時刻の出力や隠れ状態を、次の時刻の入力として自分自身に戻す結合構造であり、回帰結合層とも呼ばれる。リカレントニューラルネットワーク（RNN）を構成する要素技術の一つで、過去の情報を保持しながら時系列データを処理する仕組みを実現する。Seq2Seqのデコーダなどでもこの回帰結合層が用いられ、可変長の系列を扱えるようにしている。", "note": "RNN、Seq2Seqの構成要素", "imp": "○"}, {"id": 566, "cat": "3.機械学習の手法", "term": "多クラス分類", "en": "Multiclass Classification", "desc": "手書き数字の認識のように、あらかじめ用意された3種類以上の選択肢の中からどれに当たるかを当てさせる分類問題を指す。選択肢が2つだけの場合は2クラス分類と呼び区別する。ニューラルネットワークでは各クラスの確率が合計して1になるようソフトマックス関数を出力層に組み込むのが一般的で、2値問題で用いるシグモイド関数とはこの点で役割が異なる。", "note": "ソフトマックス関数、2クラス分類と対", "imp": "○"}, {"id": 567, "cat": "14.ML補完", "term": "多次元尺度構成法", "en": "Multidimensional Scaling", "desc": "高次元データの点間の距離や類似度の関係をできるだけ保ちながら、低次元（多くは2次元や3次元）の空間に配置し直す次元削減・可視化手法である。英語名はMultidimensional Scaling（MDS）で、主成分分析やt-SNE、特異値分解（SVD）などと同じく、データの構造を人間が理解しやすい形に落とし込むために用いられる代表的な手法の一つである。", "note": "t-SNE、SVD等と並ぶ次元削減手法", "imp": "○"}, {"id": 568, "cat": "15.DL発展", "term": "宝くじ仮説", "en": "Lottery Ticket Hypothesis", "desc": "大きなニューラルネットワークの中には、元のネットワークと同じ設定で学習させても同等の性能を発揮できる小さな部分ネットワーク（サブネットワーク）である「当選チケット」が存在する、とする仮説である。The Lottery Ticket Hypothesisとも呼ばれ、提唱論文では元のネットワークの10〜20%程度のサイズでこの当選チケットを一貫して発見できたと報告されている。この仮説が正しければ、モデル圧縮による軽量化の可能性を裏付けることになる。", "note": "モデル圧縮・軽量化と関連", "imp": "○"}, {"id": 569, "cat": "7.DLの手法", "term": "平均値プーリング", "en": "Average Pooling", "desc": "CNNにおけるプーリング処理の一種で、指定した大きさの窓を画像全体にずらしながら適用し、窓の中に含まれる値の平均を代表値として出力していく手法である。窓内の最大値を採用する最大値プーリングとは対照的な集約方法であり、ストライドの設定次第で出力される特徴マップの縮小率が変わる。", "note": "最大値プーリングと対比される", "imp": "○"}, {"id": 570, "cat": "13.数学統計", "term": "度数分布", "en": "Frequency Distribution", "desc": "ある変数の値の範囲を複数の階級（区間）に区分し、各階級に属するデータの個数（度数）を一覧にしたものである。データ全体の分布の形を把握するための基本的な統計的手法であり、度数分布を棒グラフとして可視化したものがヒストグラムである。", "note": "ヒストグラムで可視化される", "imp": "○"}, {"id": 571, "cat": "14.ML補完", "term": "弱学習器", "en": "Weak Learner", "desc": "単体では予測精度がそれほど高くない、比較的単純なモデルを指す。アンサンブル学習ではこの弱学習器を複数組み合わせて全体の予測精度を高める。決定木がよく用いられ、バギングでは弱学習器を並列に学習させて多数決や平均で出力を決定し、ブースティングでは弱学習器を逐次的に学習させて予測値の誤りを修正していく点が異なる。", "note": "バギング・ブースティングで利用", "imp": "○"}, {"id": 572, "cat": "7.DLの手法", "term": "恒等写像関数", "en": "Identity Mapping Function", "desc": "入力をそのまま出力する、変換を行わない関数である。回帰タスクでは予測値を確率などに変換する必要がないため、ニューラルネットワークの出力層の活性化関数として通常この恒等写像関数が使用される。G検定では線形関数と呼ばれる場合もあるため注意が必要であり、分類タスクで使われるシグモイド関数やソフトマックス関数とは役割が異なる。", "note": "線形関数とも呼ばれる、回帰の出力層で使用", "imp": "○"}, {"id": 573, "cat": "13.数学統計", "term": "擬似相関", "en": "Spurious Correlation", "desc": "確率変数XとYの間に直接の因果関係がないにもかかわらず、両者がともに別の確率変数Zと相関しているために、見かけ上相関しているように見える現象である。擬似相関を見抜き、Xと Yの真の関係を捉えるためには、共通原因であるZの影響を取り除く必要があり、そのようにして算出した相関係数を偏相関係数と呼ぶ。", "note": "偏相関係数を使って影響を除去", "imp": "○"}, {"id": 574, "cat": "7.DLの手法", "term": "教師強制", "en": "Teacher Forcing", "desc": "教師強制とは、RNNなどの系列生成モデルを学習する際に、一時刻前の出力ではなく正解の教師データを現時刻の入力として使う手法である。誤った出力を次の入力に使うと誤差が連鎖して学習が不安定になるため、これを防いで出力系列を教師データに近づける効果がある。Seq2Seqによる機械翻訳の学習時に用いられ、予測時（推論時）には教師データが無いため自身の前の出力を入力に使う点が異なる。", "note": "Seq2Seq・RNNの学習手法", "imp": "○"}, {"id": 575, "cat": "9.応用-言語音声", "term": "構文解析", "en": "Syntactic Parsing", "desc": "構文解析とは、文章の主語や目的語といった文法的な構造を解析する自然言語処理の手法である。文を単語に分割する形態素解析の後段として行われることが多く、文の係り受けや文法的な役割を明らかにすることで、機械翻訳や文意理解など高度な言語処理の土台となる。単語をベクトル化したり意味関係をグラフ化したりする処理とは区別される。", "note": "形態素解析の後段処理", "imp": "○"}, {"id": 576, "cat": "16.強化学習補完", "term": "深層強化学習", "en": "Deep Reinforcement Learning", "desc": "深層強化学習とは、深層学習と強化学習を組み合わせ、ニューラルネットワークによって状態から行動価値や方策を近似する手法である。エージェントが環境との試行錯誤を通じて報酬を最大化する行動を学習する点が特徴で、代表例としてDQN（Deep Q-Network）があり、これを改良したRainbow、ノイジーネットワーク、デュエリングネットワークなどの手法が知られる。囲碁AIのAlphaGoなどにも応用されている。", "note": "DQN・Rainbow等が代表例", "imp": "○"}, {"id": 577, "cat": "7.DLの手法", "term": "深層距離学習", "en": "Deep Metric Learning", "desc": "深層距離学習とは、ニューラルネットワークを用いてデータ間の類似度（距離）を学習する手法である。2つ以上のデータの組に対して距離の情報を考慮した損失を計算する点が特徴で、代表的な損失関数として2005年提案のContrastive Lossと、2015年提案で3つのデータ間の距離を扱うTriplet Lossがある。顔認証や画像検索など、似ているものを近く・異なるものを遠くに配置したい用途で用いられる。", "note": "Contrastive Loss・Triplet Loss", "imp": "○"}, {"id": 578, "cat": "18.法律補完", "term": "準委任契約", "en": "Quasi-mandate Contract", "desc": "準委任契約とは、検証や開発といった役務の提供そのものを目的とする契約であり、成果物の完成義務を負う請負契約とは異なる。AI開発では学習済みモデルの精度が事前に保証できない性質上、準委任契約が用いられることが多い。さらに成果に対して報酬を支払う成果完成型と、業務の遂行自体に対して報酬を支払う履行割合型に分類される。", "note": "請負契約と対比。成果完成型/履行割合型", "imp": "○"}, {"id": 579, "cat": "7.DLの手法", "term": "特徴マップ", "en": "Feature Map", "desc": "特徴マップとは、CNNにおいて畳み込み層やプーリング層が出力する多次元の特徴量の集合を指す。画像などの入力データから抽出された局所的なパターン情報を層ごとにチャンネルとして保持し、後続の層でさらに処理される。各チャンネル全体を1つの値に集約するグローバルアベレージプーリングなど、特徴マップに対する演算がCNNの様々な工夫の対象となっている。", "note": "畳み込み層・プーリング層の出力", "imp": "○"}, {"id": 580, "cat": "15.DL発展", "term": "特徴表現学習", "en": "Feature Representation Learning", "desc": "特徴表現学習とは、従来人手で設計していた特徴量の抽出過程そのものをモデルが学習することを指す。ディープラーニングでは層を重ねることで、データから有用な特徴表現を自動的に獲得できる点が大きな利点とされる。転移学習では、学習済みモデルが獲得した特徴表現を別タスクに転用し、必要に応じてファインチューニングで重みを更新する。", "note": "転移学習・ファインチューニングと関連", "imp": "○"}, {"id": 581, "cat": "11.社会実装-産業", "term": "産学連携", "en": "Industry-Academia Collaboration", "desc": "産学連携とは、企業（産業界）と大学・研究機関（学術界）が協力して研究開発や人材育成を行う取り組みである。IT業界ではオープンソースによる共同開発など他企業・他業種との連携も含め、組織の枠を超えて知見を持ち寄るオープンイノベーションの一環として積極的に行われている。AI分野でも新技術の実用化や研究成果の社会実装を加速する手段として重視される。", "note": "オープンイノベーションの一形態", "imp": "○"}, {"id": 582, "cat": "4.評価と前処理", "term": "白色化", "en": "Whitening", "desc": "白色化とは、データの前処理手法の一つで、特徴量間の相関を取り除いたうえで標準化（平均0、標準偏差1に変換）を行う手法である。特徴量同士の冗長な相関を排除することで、後続の機械学習アルゴリズムの学習効率や性能を高める効果が期待できる。単に平均・分散を揃えるだけの標準化よりも踏み込んだ変換である点が特徴である。", "note": "標準化・正規化と対比", "imp": "○"}, {"id": 583, "cat": "13.数学統計", "term": "相互情報量", "en": "Mutual Information", "desc": "相互情報量とは、2つの確率変数の間で、一方を知ることでもう一方についてどれだけ情報が得られるかを定量化した指標である。1つの確率変数のみから計算される自己情報量とは異なり、2変数間の依存関係の強さを測る点が特徴である。変数間の関連性の評価や特徴選択など、情報理論に基づく分析に利用される。", "note": "自己情報量と対比", "imp": "○"}, {"id": 584, "cat": "2.探索推論知識表現", "term": "知識表現", "en": "Knowledge Representation", "desc": "知識表現とは、人間が持つ知識をコンピュータが扱える形式で記述・整理する技術であり、第二次AIブームにおいてエキスパートシステムの基盤として研究が進んだ。自然言語で対話できるAIシステムであるELIZA（人工無脳の元祖）、有機化合物の構造決定を支援するDENDRAL、血液中のバクテリア診断を支援するMYCINなど、知識表現を用いた代表的なエキスパートシステムが開発された。", "note": "ELIZA・DENDRAL・MYCIN", "imp": "○"}, {"id": 585, "cat": "15.DL発展", "term": "破壊的忘却", "en": "Catastrophic Forgetting", "desc": "あるタスクで学習させたニューラルネットワークを別のタスク向けに転用（転移学習）すると、新しいタスクの学習が進むにつれて元々できていたはずのタスクの精度が損なわれてしまうことがある。この現象を破壊的忘却（破滅的忘却・破局的忘却とも表記）と呼び、勾配が層を伝わる際に値が小さくなりすぎる勾配消失問題とは異なる現象として区別される。", "note": "破滅的忘却・破局的忘却とも訳す", "imp": "○"}, {"id": 586, "cat": "13.数学統計", "term": "確率分布", "en": "Probability Distribution", "desc": "確率分布とは、確率変数がとりうる値とその発生確率の対応関係を表したものである。サイコロの出目のような離散的な確率変数の分布は離散型分布と呼ばれ、気温のような連続的な確率変数の分布は確率密度関数を用いて表現され連続型分布と呼ばれる。VAE（変分オートエンコーダ）では入力データがエンコーダによって確率分布上に表現され、そこからサンプリングした潜在変数をデコーダに入力することでデータを生成する。", "note": "離散型分布・連続型分布、VAEで利用", "imp": "○"}, {"id": 587, "cat": "13.数学統計", "term": "確率密度", "en": "Probability Density", "desc": "確率密度とは、連続型の確率変数においてある観測値に対応する確率密度関数の値のことである。連続的な確率変数では特定の値をとる確率がゼロになるため、確率密度関数を用いて確率変数がある範囲内の値をとる確率を、その関数の面積（積分）として求める。気温や身長のような連続量を扱う際の確率分布の表現に不可欠な概念である。", "note": "確率密度関数・連続型分布と関連", "imp": "○"}, {"id": 588, "cat": "18.法律補完", "term": "秘密保持契約", "en": "Non-Disclosure Agreement", "desc": "秘密保持契約（NDA）とは、企業間などで共有するデータや技術情報といった秘密情報の取扱いについて定める契約である。AI開発では学習用データセットや学習済みモデルなど機密性の高い情報をやり取りする機会が多いため、開発を委託する前段階でNDAを締結し、情報漏洩や不正利用を防ぐことが一般的である。", "note": "NDA。データ提供時に締結", "imp": "○"}, {"id": 589, "cat": "7.DLの手法", "term": "移動不変性", "en": "Translation Invariance", "desc": "画像中の物体がフレームのどこに写っていても同じ特徴として検出できるCNNの性質を移動不変性（位置不変性）と呼ぶ。畳み込み層が同一のフィルタを画像全体に適用して特徴を抽出する仕組みによってこの性質が生まれ、時系列データの統計的性質が時間によって変わらないことを意味する定常性とは区別される概念である。", "note": "位置不変性とも呼ぶ。定常性と混同注意", "imp": "○"}, {"id": 590, "cat": "13.数学統計", "term": "移動平均", "en": "Moving Average", "desc": "移動平均とは、時系列データにおいて各時刻からさかのぼった一定期間（窓）の観測値の平均を計算し、特徴量として用いる手法である。売上予測において、ある日の売上に対応する特徴量としてそれ以前の来店者数の移動平均を用いる例のように、直近の傾向を滑らかに捉えたい場合に利用される。微分・積分・分散とは異なり、勾配降下法のパラメータ更新の計算自体には使用されない指標である。", "note": "時系列データの特徴量の一種", "imp": "○"}, {"id": 591, "cat": "13.数学統計", "term": "対立仮説", "en": "Alternative Hypothesis", "desc": "対立仮説とは、統計的仮説検定において、否定したい仮説である帰無仮説に対抗して用意される仮説である。帰無仮説のもとではほとんど起こらないはずの現象がデータ上で観測された場合に帰無仮説を棄却し、対立仮説が正しいと主張する。なお、類似の言葉である反証仮説は一般的な統計学の用語ではない点に注意が必要である。", "note": "帰無仮説と対で用いる", "imp": "○"}, {"id": 592, "cat": "13.数学統計", "term": "統計的仮説検定", "en": "Statistical Hypothesis Testing", "desc": "統計的仮説検定とは、データに関するある仮説が統計的に妥当かどうかを検証するための枠組みである。まず否定したい帰無仮説を立て、それに対立する対立仮説を用意したうえで、データから計算した統計量が帰無仮説のもとでは起こりにくい値であることを示すことで、帰無仮説を棄却し対立仮説が正しいと主張する。A/Bテストの効果検証など、データに基づく意思決定の場面で広く用いられる。", "note": "帰無仮説・対立仮説を用いる枠組み", "imp": "○"}, {"id": 593, "cat": "18.法律補完", "term": "職務発明", "en": "Employee Invention", "desc": "会社に勤める人が、自らの業務に関連して生み出した発明を指す法律上の呼び名である。特許法はプログラムも発明の対象として認めており、独自の構造を備えたニューラルネットワークやその訓練手順であっても、この職務発明の枠組みに含まれ得る。発明した従業員の権利をきちんと守るための特則として設けられた制度である。", "note": "特許法・知的財産権と関連", "imp": "○"}, {"id": 594, "cat": "3.機械学習の手法", "term": "能動学習", "en": "Active Learning", "desc": "ラベル付けされていないデータすべてに教師データを用意するのではなく、モデルの性能向上に最も寄与すると見込まれるデータだけを優先してアノテーションの対象とする学習の進め方である。アノテーションにかかる費用や時間が制約となる状況で、限られた予算内で高精度なモデルを目指す教師あり学習の効率化手法として位置づけられる。", "note": "Active Learning、アノテーション効率化", "imp": "○"}, {"id": 595, "cat": "13.数学統計", "term": "自己情報量", "en": "Self-information", "desc": "ある事象がどれだけ起こりにくいかを情報の量として数値化したものが自己情報量である。発生確率が小さい事象ほど値が大きくなるという性質を持ち、1つの確率変数の実現値だけから計算される点で、2変数間の関連を測る相互情報量とは異なる。情報理論の基礎となる概念で、エントロピーを求める際の要素にもなる。", "note": "相互情報量・エントロピーと関連", "imp": "○"}, {"id": 596, "cat": "12.法律倫理", "term": "自律型致死兵器システム", "en": "LAWS", "desc": "人間の関与なしに自律的に攻撃目標を設定でき、致死性を有する完全自律型兵器を指す概念で、明確な定義は定まっていない。自律型無人機など軍事分野でのAI技術の研究開発が進む中、CCW（特定通常兵器使用禁止制限条約）の枠組みで人間の関与の在り方や規制について国際的な議論が行われている。", "note": "LAWS、CCWで国際議論", "imp": "○"}, {"id": 597, "cat": "16.強化学習補完", "term": "行動価値関数", "en": "Action-Value Function", "desc": "強化学習において、ある状態である行動を取った場合に将来得られる報酬の期待値を表す関数であり、Q値や単に価値関数とも呼ばれる。これを最適化することでエージェントは適切な行動を学習でき、代表的な手法にQ学習やSARSAがある。DQNはこの行動価値関数をニューラルネットワークで近似する手法である。", "note": "Q値、Q学習・SARSA・DQNと関連、状態価値関数と対比", "imp": "○"}, {"id": 598, "cat": "4.評価と前処理", "term": "訓練誤差", "en": "Training Error", "desc": "機械学習モデルが訓練データに対して出力する予測値と正解との誤差のことで、学習の過程ではこの誤差を小さくするようにパラメータが調整される。訓練誤差だけが小さく未知データへの汎化誤差が大きい状態は過学習と呼ばれ、両者がともに大きい状態は未学習と呼ばれる。", "note": "汎化誤差・過学習・未学習と対比", "imp": "○"}, {"id": 599, "cat": "18.法律補完", "term": "請負契約", "en": "Contract for Work", "desc": "具体的な仕事の完成を目的とし、成果物の納品義務を伴う契約形態である。検証や開発といった役務の提供自体を目的とする準委任契約とは区別され、AI開発では学習済みモデルの精度が仕事の完成として保証されにくいため、成果物の性質に応じて請負と準委任のどちらを選ぶかが実務上の論点となる。", "note": "準委任契約と対比される契約類型", "imp": "○"}, {"id": 600, "cat": "14.ML補完", "term": "階層ありクラスタリング", "en": "Hierarchical Clustering (Agglomerative)", "desc": "クラスタをどこまで細かく分けるかを一つに決め切らず、併合や分割の過程を樹形図（デンドログラム）として残すクラスタリング手法である。代表的なウォード法では、二つのクラスタを一つにまとめた際に生じる分散の増加量が最小となる組を選んで併合を繰り返していく。", "note": "ウォード法、樹形図（デンドログラム）", "imp": "○"}, {"id": 601, "cat": "14.ML補完", "term": "階層なしクラスタリング", "en": "Non-hierarchical Clustering", "desc": "階層構造を持たせず、データをあらかじめ決めた個数のグループに分割する教師なし学習のクラスタリング手法であり、代表例はk-meansである。k-meansはクラスタ数を事前に決定し、各データを最も近いクラスタ中心に割り当てた後、重心の再計算と割り当てを繰り返すアルゴリズムで動作する。", "note": "k-means、階層ありクラスタリングと対比", "imp": "○"}, {"id": 602, "cat": "9.応用-言語音声", "term": "隠れマルコフモデル", "en": "Hidden Markov Model", "desc": "音声認識に用いられる代表的な統計的手法で、観測できない状態（音素など）の遷移を確率モデルとして扱う。音声データに対して音素ごとに学習を行うことで、入力された音声から尤もらしい単語列を推定する仕組みであり、深層学習が普及する以前の音声認識の中心的技術であった。", "note": "HMM、音声認識の伝統的手法", "imp": "○"}, {"id": 603, "cat": "13.数学統計", "term": "離散型分布", "en": "Discrete Distribution", "desc": "サイコロの出目やコインの表裏のように、値を1つ2つと数え上げられる確率変数がとる分布の総称が離散型分布であり、二項分布やポアソン分布がその代表例にあたる。値が切れ目なく連続的に変化する正規分布のような連続型分布とは対になる概念である。", "note": "連続型分布と対比、ベルヌーイ・二項・ポアソン分布", "imp": "○"}, {"id": 604, "cat": "9.応用-言語音声", "term": "音韻", "en": "Phonology", "desc": "言語によらず、人間が発声する際に区別可能な音の単位を指す概念である。言語ごとに区別される音の最小単位である音素とは異なり、音韻はより普遍的な音の分類として扱われ、音声認識の仕組みを理解する上で音素や隠れマルコフモデルとあわせて登場する用語である。", "note": "音素と対比、音声認識分野の用語", "imp": "○"}, {"id": 605, "cat": "9.応用-言語音声", "term": "高速フーリエ変換", "en": "Fast Fourier Transform", "desc": "音声データの周波数ごとの強さ（振幅）を分析するためのアルゴリズムであり、FFT（Fast Fourier Transform）と略される。時間領域の音声波形を周波数領域の情報に変換することで、スペクトル包絡やメル周波数ケプストラム係数の算出など、音声認識・音声処理の前処理として広く利用される。", "note": "FFT、音声処理の周波数分析", "imp": "○"}, {"id": 606, "cat": "12.法律倫理", "term": "特定通常兵器使用禁止制限条約", "en": "CCW (Convention on Certain Conventional Weapons)", "desc": "1980年にジュネーブで採択された、非人道的な効果を持つ通常兵器の使用を禁止・制限する国際条約である。日本を含む126カ国以上が締約しており、2014年以降はこの条約の枠組みの中で自律型致死兵器システム(LAWS)の規制について政府専門家会合が継続的に議論を行っている。AIが人間の関与なしに攻撃対象を選定・攻撃する兵器をどう規制するかという論点で、AI倫理・安全保障分野の重要な議論の場となっている。", "note": "LAWSの議論の枠組み", "imp": "○"}, {"id": 607, "cat": "8.応用-画像", "term": "VQA", "en": "Visual Question Answering", "desc": "1枚の画像とその画像について尋ねる質問文をセットで受け取り、質問に沿った答えを言葉で返すタスク。たとえば切り分けられたピザの写真に「いくつに分けられていますか」と尋ねると「6つです」のように応答するもので、視覚的な認識と言語による応答生成を組み合わせる、マルチモーダルAIを代表するタスクの一つとされる。", "note": "マルチモーダルタスクの一種", "imp": "○"}, {"id": 608, "cat": "3.機械学習の手法", "term": "カーネル関数", "en": "Kernel Function", "desc": "サポートベクターマシン(SVM)などで、データを高次元空間へ写像した際の内積を、実際に写像を計算せずに求めるための関数である。RBFカーネル(ガウスカーネル)や多項式カーネル、線形カーネルなどの種類があり、どのカーネル関数を選ぶかによって決定境界の形状（直線か曲線か）が変わる。カーネルトリックはこの関数を用いて非線形分離を可能にする技法全体を指す。", "note": "カーネルトリックで使用", "imp": "○"}, {"id": 609, "cat": "13.数学統計", "term": "確率変数", "en": "Random Variable", "desc": "サイコロの出目のように、試行のたびにランダムに変動する値をとる変数である。とりうる値が離散的な離散型確率変数と、連続的な範囲をとる連続型確率変数に分けられ、それぞれ確率分布・確率密度関数によって値の出やすさが表現される。気温や身長のような連続量、コイン投げの結果のような離散量など、不確実性を伴うあらゆる現象のモデル化の基礎となる概念である。", "note": "離散型/連続型に分類", "imp": "◎"}, {"id": 610, "cat": "12.法律倫理", "term": "監査可能性", "en": "Auditability", "desc": "AIの入出力の履歴を適切に記録・管理し、後から第三者がAIの挙動を検証・監査できるようにする性質である。追跡可能性(トレーサビリティ)と密接に関連し、AIが倫理的に不適切な判断をしていないかを事後的にチェックできる体制を整えることを指す。AIガバナンスにおいて、説明可能性と並んで信頼できるAIを実現するための重要な要素とされる。", "note": "トレーサビリティと関連", "imp": "○"}, {"id": 611, "cat": "3.機械学習の手法", "term": "重回帰分析", "en": "Multiple Regression Analysis", "desc": "複数の特徴量（説明変数）を用いて目的変数を予測する線形回帰の手法である。単回帰分析が説明変数を1つしか使わないのに対し、重回帰分析は店舗の面積・商品単価・店員数など複数の要因を同時に考慮して売上を予測するといった、より複雑な現実の問題に対応できる。どの特徴量が予測に有効かを分析する際にも用いられる。", "note": "単回帰分析の複数変数版", "imp": "○"}, {"id": 612, "cat": "16.強化学習補完", "term": "状態価値関数", "en": "State-Value Function", "desc": "強化学習において、ある状態にいることがどれだけ価値があるかを表す関数であり、V関数とも呼ばれる。行動まで含めて価値を評価する行動価値関数(Q関数)とは異なり、状態そのものの価値だけを評価する点が特徴である。単に「価値関数」と呼ばれる場合はこの状態価値関数を指すことも多く、方策の良し悪しを評価する基礎となる。", "note": "行動価値関数(Q関数)と対比", "imp": "○"}, {"id": 613, "cat": "13.数学統計", "term": "最小二乗法", "en": "Least Squares Method", "desc": "予測値と実際の値との差（残差）の二乗和が最小になるようにモデルのパラメータを求める手法である。線形回帰においてもっとも代表的な学習方法であり、外れ値の影響を強く受けやすい（二乗するため差が大きいほど影響が拡大する）という特徴を持つ。回帰係数を求める際の基本的な考え方として、統計学・機械学習の両方で広く用いられる。", "note": "線形回帰の代表的な学習法", "imp": "◎"}, {"id": 614, "cat": "18.法律補完", "term": "知的財産権", "en": "Intellectual Property Right", "desc": "発明・著作物・商標など、人の知的な創作活動によって生み出された成果を保護する権利の総称である。AI開発の委託契約では、開発の成果物（学習済みモデルやプログラム等）の知的財産権がベンダー側・ユーザー側のどちらに帰属するかを契約で個別に定めることができ、トラブルを避けるため契約時に明確化しておくことが重要とされる。", "note": "特許権・著作権等を含む総称", "imp": "○"}, {"id": 615, "cat": "13.数学統計", "term": "説明変数", "en": "Explanatory Variable", "desc": "回帰分析などにおいて、予測したい対象（目的変数）を説明するために使う入力側の変数であり、機械学習の文脈では特徴量とほぼ同じ意味で使われる。例えば店舗の売上（目的変数）を予測する際の店舗面積や立地（説明変数）のように、目的変数との関係をモデル化する対象となる。線形回帰では説明変数と目的変数の線形的な関係を仮定してパラメータを求める。", "note": "特徴量とほぼ同義、目的変数と対", "imp": "◎"}, {"id": 616, "cat": "13.数学統計", "term": "潜在変数", "en": "Latent Variable", "desc": "観測データそのものには現れないが、その生成過程の裏側にあると考えられる変数のこと。VAE(変分オートエンコーダ)ではエンコーダが入力を低次元の確率分布へ写し、そこから取り出した値を使って出力側のネットワークが元のデータらしきものを組み立てる。混合ガウスモデルやEMアルゴリズムのように、観測されない要因を仮定してモデル化する手法全般に共通する概念である。", "note": "VAE・EMアルゴリズム等で使用", "imp": "○"}, {"id": 617, "cat": "13.数学統計", "term": "相関係数", "en": "Correlation Coefficient", "desc": "2つの変数の間にどれだけ直線的な関係があるかを-1から1の範囲の値で表す指標である。値が1に近いほど強い正の相関、-1に近いほど強い負の相関、0に近いほど相関が弱いことを示す。似た指標に共分散があるが、共分散は変数のスケール（単位）の影響を受けるのに対し、相関係数は正規化されているため異なるデータ間でも比較しやすいという違いがある。", "note": "共分散を正規化した指標", "imp": "◎"}, {"id": 618, "cat": "18.法律補完", "term": "データ窃取", "en": "Data Theft", "desc": "学習済みのAIモデルに対してデータを入力し、その出力結果を観察することで、モデルが学習に使用した元のデータの内容を推測しようとする攻撃である。モデル自体を盗もうとするモデル窃取や、学習データに悪意あるデータを混入させるデータ汚染とは異なり、既に学習済みのモデルからプライバシー性の高い学習データの情報を間接的に抜き取ろうとする点が特徴である。", "note": "モデル窃取・データ汚染と対比", "imp": "○"}, {"id": 619, "cat": "13.数学統計", "term": "特異値分解", "en": "SVD (Singular Value Decomposition)", "desc": "任意の行列を、直交行列と対角行列の積に分解する行列分解の手法である。主成分分析(PCA)と同様に次元削減で用いられるほか、推薦システムにおけるユーザーと商品の関係性の分析などにも応用される。分解して得られる特異値の大きさによって、データのどの方向の情報が重要かを把握できる。", "note": "PCAと並ぶ次元削減手法", "imp": "○"}, {"id": 620, "cat": "13.数学統計", "term": "偏相関係数", "en": "Partial Correlation Coefficient", "desc": "第三の変数の影響を取り除いた上で、残る2つの変数間の本当の相関の強さを表す指標である。例えば「アイスクリームの売上」と「水難事故の件数」には見かけ上の相関（擬似相関）があるが、これは「気温」という第三の変数が両方に影響しているためであり、気温の影響を除いた偏相関係数を計算するとこの相関はほぼ消える。擬似相関を見抜くための重要な統計手法である。", "note": "擬似相関の見抜き方に利用", "imp": "○"}, {"id": 621, "cat": "13.数学統計", "term": "マンハッタン距離", "en": "Manhattan Distance", "desc": "2点間の距離を、各座標軸方向の差の絶対値の和として計算する距離の測り方であり、碁盤の目状の道路を移動する距離に似ていることから名付けられた。直線的に測るユークリッド距離とは異なり、道路網に沿った移動距離のような場面に適しており、k近傍法やクラスタリングなど距離を用いる機械学習手法で類似度の定義として使われることがある。", "note": "L1距離とも呼ばれる、ユークリッド距離と対比", "imp": "○"}, {"id": 622, "cat": "13.数学統計", "term": "目的変数", "en": "Target Variable", "desc": "回帰分析や教師あり学習において、予測したい対象そのものを表す変数であり、教師データ（正解ラベル）に相当する。例えば明日の気温やある店舗の売上などが目的変数にあたり、説明変数（特徴量）との関係をモデル化することで、未知のデータに対する目的変数の値を予測できるようになる。", "note": "説明変数と対、正解ラベルに相当", "imp": "◎"}, {"id": 623, "cat": "13.数学統計", "term": "連続型分布", "en": "Continuous Distribution", "desc": "身長や測定誤差のように、値がどこまでも細かく続き得る量を表す確率分布の総称であり、正規分布がその典型である。取りうる値が0,1,2…と数え上げられる離散型分布（例えばベルヌーイ分布や二項分布、ポアソン分布など）とは対照的に、特定の一点をとる確率はゼロとなるため、確率密度関数をある範囲にわたって積分することで初めて確率が定まる。", "note": "離散型分布と対", "imp": "○"}, {"id": 624, "cat": "13.数学統計", "term": "最頻値", "en": "Mode", "desc": "データの中でもっとも度数（出現回数）が多い値であり、モードとも呼ばれる。平均値・中央値と並ぶ代表値の一つで、例えば試験の得点をいくつかの階級に区切った度数分布表において、もっとも人数の多い階級の階級値が最頻値となる。極端な外れ値の影響を受けにくいという特徴があり、平均値が使いにくい場面で有用である。", "note": "平均値・中央値と並ぶ代表値", "imp": "○"}, {"id": 625, "cat": "19.補遺", "term": "Quil", "en": "Quil", "desc": "Rigetti Computing社が開発した、量子コンピュータ向けの命令セット言語(アセンブリ言語に相当)である。古典コンピュータがコプロセッサとして量子コンピュータ(QPU)と連携して動作することを前提に設計されており、どの量子ビットにどの量子ゲートを適用するかを記述する。PyQuilというPythonライブラリを通じて、Quilプログラムの生成・シミュレーション・実機QPUでの実行が行える。", "note": "QPU向けの命令セット言語", "imp": "△"}, {"id": 626, "cat": "3.機械学習の手法", "term": "回帰係数", "en": "Regression Coefficient", "desc": "線形回帰などの回帰モデルにおいて、各説明変数が目的変数にどれだけ影響を与えるかを表す係数である。回帰係数の値が大きいほどその説明変数の影響が大きいことを意味し、線形回帰では実測値と予測値の誤差（損失関数）を最小化するように最小二乗法を用いて求められる。リッジ回帰やラッソ回帰は、この回帰係数の大きさに正則化項で制約を加える手法である。", "note": "最小二乗法で求める", "imp": "○"}, {"id": 627, "cat": "13.数学統計", "term": "確率密度関数", "en": "Probability Density Function", "desc": "連続型の確率変数について、ある値の周辺での確率の密度（相対的な起こりやすさ）を表す関数である。離散型確率変数と異なり連続型では特定の1点をとる確率が0になるため、確率変数がある範囲の値をとる確率は確率密度関数を区間で積分した面積として求める。正規分布のグラフの釣り鐘型の曲線は、この確率密度関数を図示したものである。", "note": "正規分布のグラフ等で使用", "imp": "○"}, {"id": 628, "cat": "13.数学統計", "term": "帰無仮説", "en": "Null Hypothesis", "desc": "統計的仮説検定において、「差がない」「効果がない」など、否定したい対象として設定する仮説である。検定ではこの帰無仮説が正しいと仮定した上でデータから得られる確率(p値)を計算し、確率が十分小さければ帰無仮説を棄却し、対立仮説（本来主張したい仮説）を採択する。新薬の効果検証で「新薬と偽薬に差はない」を帰無仮説とするのが典型例である。", "note": "対立仮説と対", "imp": "◎"}, {"id": 629, "cat": "16.強化学習補完", "term": "信用割当問題", "en": "Credit Assignment Problem", "desc": "強化学習において、最終的に得られた報酬が、それ以前のどの状態・行動の組み合わせによってもたらされたのかを正しく特定することが難しいという問題である。特に報酬が得られるまでの時間が長い場合や、複数の行動が積み重なって結果に影響する場合に深刻になり、どの行動を強化・抑制すべきかの判断を困難にする。時間的信用割当問題とも呼ばれる。", "note": "強化学習の基本的な課題", "imp": "○"}, {"id": 630, "cat": "10.応用-強化生成", "term": "生成タスク", "en": "Generation Task", "desc": "学習したデータの特徴やパターンをもとに、新しいデータを作り出すタスクの総称である。画像を生成するGANやVAE、拡散モデル、文章を生成するGPT系の大規模言語モデルなど、識別・分類ではなくゼロから（あるいは指示に応じて）新しいコンテンツを作り出す点が特徴であり、生成AIと呼ばれる技術群はこの生成タスクを担うモデルを指す。", "note": "識別・分類タスクと対比", "imp": "○"}, {"id": 631, "cat": "12.法律倫理", "term": "セキュリティ・バイ・デザイン", "en": "Security by Design", "desc": "システムの設計・開発の初期段階から、後付けではなくセキュリティ対策を組み込んでおくという考え方である。プライバシー・バイ・デザインがプライバシー保護を設計段階から組み込む考え方であるのに対し、セキュリティ・バイ・デザインは情報漏洩や不正アクセスなどのセキュリティリスクへの対策を対象とする、並行する概念である。", "note": "プライバシー・バイ・デザインと並ぶ概念", "imp": "○"}, {"id": 632, "cat": "5.DL概要", "term": "線形関数", "en": "Linear Function", "desc": "入力と出力の関係が直線で表される、最も単純な関数である。パーセプトロンの出力層などに用いられることがあるが、線形関数を活性化関数として多層に重ねても全体として1つの線形変換にしかならず、非線形な問題を表現できないという限界がある。このため、多層パーセプトロン以降のニューラルネットワークでは非線形な活性化関数（シグモイドやReLU等）が用いられる。", "note": "非線形性を持たず多層化しても意味がない", "imp": "○"}, {"id": 633, "cat": "13.数学統計", "term": "中央値", "en": "Median", "desc": "データを小さい順（または大きい順）に並べたとき、ちょうど中央に位置する値である。平均値や最頻値と並ぶ代表値の一つで、極端に大きい・小さい外れ値の影響を受けにくいという特徴があり、例えば少数の高所得者が平均年収を押し上げてしまうような場面では、実態を表す指標として中央値の方が適していることが多い。", "note": "平均値・最頻値と並ぶ代表値、外れ値に頑健", "imp": "◎"}, {"id": 634, "cat": "18.法律補完", "term": "著作権法", "en": "Copyright Act", "desc": "小説・音楽・プログラム・データベースなどの著作物を保護する日本の法律である。AI開発においては、AIの学習データとして著作物を利用する場合の扱いが論点となっており、日本の著作権法30条の4では、情報解析（機械学習など）を目的とする場合には一定の条件のもとで著作権者の許諾なく著作物を利用できると定められている。", "note": "著作権法30条の4と関連", "imp": "○"}, {"id": 635, "cat": "15.DL発展", "term": "敵対的攻撃", "en": "Adversarial Attack", "desc": "AIモデルの脆弱性を突いて、誤った判断をさせたり情報を盗み出したりする攻撃全般を指す総称である。入力データにわずかなノイズを加えてAIを誤認識させる敵対的サンプルを用いた攻撃のほか、学習データを汚染するデータ汚染、モデルの情報を盗むモデル窃取・データ窃取なども広義の敵対的攻撃に含まれる。AIシステムの安全性・堅牢性を評価する上で重要な観点である。", "note": "敵対的サンプルより広い概念", "imp": "◎"}, {"id": 636, "cat": "3.機械学習の手法", "term": "特徴抽出", "en": "Feature Extraction", "desc": "画像や音声、テキストなどの生データから、タスクの予測に役立つ特徴（情報の要約）を取り出す処理である。人手で特徴量を設計する特徴量エンジニアリングとは異なり、ディープラーニングでは畳み込みニューラルネットワークの層を重ねることで、エッジや模様といった単純な特徴から複雑な特徴まで自動的に抽出できる点が大きな利点とされる。", "note": "特徴量エンジニアリングと対比、CNNが得意", "imp": "○"}, {"id": 637, "cat": "18.法律補完", "term": "特許法", "en": "Patent Act", "desc": "発明を保護するための日本の法律である。特許権という「発明を独占的に使用できる権利」の内容・成立要件・存続期間などを定めており、AI関連発明についても、AIが生成したアイデアそのものが特許の対象になるか、発明者としてAIを認めるかといった新しい論点が国内外で議論されている。", "note": "特許権の根拠法", "imp": "○"}, {"id": 638, "cat": "4.評価と前処理", "term": "バッチ学習", "en": "Batch Learning", "desc": "訓練データ全体を一度にまとめて使ってモデルを更新する学習方式である。少量ずつデータを使うミニバッチ学習や、新しいデータが来るたびに逐次更新するオンライン学習とは対照的な方式であり、データセット全体の傾向を安定して反映できる一方、データ量が非常に大きい場合は1回の更新に時間がかかり、新しいデータへの追従も遅くなるという欠点がある。", "note": "ミニバッチ学習・オンライン学習と対比", "imp": "◎"}, {"id": 639, "cat": "8.応用-画像", "term": "物体識別", "en": "Object Identification", "desc": "画像の中に写っている物体が何であるかを判別するタスクであり、物体認識とも呼ばれる。物体検出が「どこに」「何が」あるかを位置情報付きで特定するのに対し、物体識別は主に「何が」写っているかの判別そのものに焦点を当てる場合に使われる語である。", "note": "物体認識とも呼ばれる、物体検出と対比", "imp": "○"}, {"id": 640, "cat": "18.法律補完", "term": "利用規約", "en": "Terms of Service", "desc": "サービス提供者が、利用者がそのサービスを使う際に守るべきルールや条件を定めた文書である。AIサービス（SaaSやクラウドAPIなど）を利用する契約では、入力データの取り扱いや生成物の権利帰属などが利用規約の中で定められることがあり、AIサービスを業務利用する際は事前に確認しておくべき重要な文書とされる。", "note": "SaaS等の契約で確認すべき文書", "imp": "○"}, {"id": 641, "cat": "10.応用-強化生成", "term": "累積報酬", "en": "Cumulative Reward", "desc": "エピソードの開始から終了まで（あるいはある時点から先）に、エージェントが獲得した報酬の合計値である。強化学習の目的は、この累積報酬（多くの場合は将来の報酬を割引率で割り引いた割引累積報酬）を最大化するような方策を学習することにあり、価値関数はこの累積報酬の期待値を見積もるものとして定義される。", "note": "強化学習が最大化を目指す対象", "imp": "◎"}, {"id": 642, "cat": "2.探索推論知識表現", "term": "ルールベース手法", "en": "Rule-based Method", "desc": "あらかじめ人間が定めた「もし〜ならば〜する」というルールに基づいて判断・処理を行う手法である。データから自動的にパターンを学習する機械学習的な手法とは対照的なアプローチであり、エキスパートシステムや初期の機械翻訳（ルールベース機械翻訳）などで用いられたが、ルールを網羅的に作成する必要があり複雑な問題への対応が難しいという限界がある。", "note": "機械学習的手法と対比", "imp": "○"}, {"id": 643, "cat": "16.強化学習補完", "term": "連続値制御", "en": "Continuous Control", "desc": "ロボットアームの関節角度やモーターの出力のように、行動が離散的な選択肢ではなく連続的な数値で表される問題を扱う強化学習の枠組みである。上下左右のような離散的な行動を扱うQ学習やDQNに対し、連続値制御では方策勾配法やActor-Criticなど、連続的な行動空間を直接扱える手法が用いられることが多い。", "note": "離散的な行動選択と対比、ロボット制御等", "imp": "○"}, {"id": 644, "cat": "1.AIとAIの動向", "term": "イライザ効果", "en": "ELIZA Effect", "desc": "単純なパターンマッチングで応答しているだけのプログラムに対して、人間があたかも本当に理解し感情を持っているかのように錯覚してしまう心理現象である。1966年に開発された対話システム「イライザ」の利用者が、単純な受け答えの繰り返しにもかかわらず親密な感情を抱いた事例に由来し、生成AIの応答に対して人間が過度に人格を投影してしまう現代の現象にも通じる概念として言及される。", "note": "イライザ(ELIZA)の利用者の反応に由来", "imp": "○"}, {"id": 645, "cat": "2.探索推論知識表現", "term": "インタビューシステム", "en": "Interview System", "desc": "専門家の頭の中にある知識を聞き出して、エキスパートシステムが利用する知識ベースへと落とし込むための対話的な仕組みを指す。専門家の知識は暗黙的・経験的なものが多く言葉にしにくいため、効果的な聞き取りを支援する仕組みとして研究が進められた背景があり、知識獲得の難しさ（ボトルネック）を乗り越える工夫の一つに数えられる。", "note": "知識獲得のボトルネック解消の一手法", "imp": "○"}, {"id": 646, "cat": "4.評価と前処理", "term": "2クラス分類", "en": "Binary Classification", "desc": "分類タスクのうち、データを2つのクラスのいずれかに分ける問題である。ロジスティック回帰はもともと線形回帰を2クラス分類に応用した手法で、シグモイド関数を用いて予測値を0から1の確率とみなし、損失関数には交差エントロピーを用いる。SVMも2クラス分類の代表的な手法であり、2つのクラスを分けるマージンが最大になるように境界線を求める。", "note": "多クラス分類と対", "imp": "○"}, {"id": 647, "cat": "10.応用-強化生成", "term": "β-VAE", "en": "Beta-VAE", "desc": "標準的なVAE(変分オートエンコーダ)の目的関数に係数βという重みを加えることで、潜在変数の各成分が意味的に絡み合わずそれぞれ独立した特徴を表すように仕向けたモデル。この考え方をさらに発展させたネットワークとしてInfoVAEが提案されており、VAE系のモデル研究では潜在空間の性質をどう改善するかをめぐって様々な派生形が生まれている。", "note": "VAEの拡張、InfoVAEはβ-VAEをさらに拡張", "imp": "○"}, {"id": 648, "cat": "16.強化学習補完", "term": "A3C", "en": "Asynchronous Advantage Actor-Critic", "desc": "Actor-Criticを非同期(Asynchronous)かつ複数エージェントで並列に学習させる強化学習アルゴリズムである。複数のエージェントが異なる環境のコピー上で同時に経験を収集し、その勾配を共有のネットワークに非同期に反映することで、学習の効率化と安定化を図る。", "note": "Actor-Criticの応用手法", "imp": "○"}, {"id": 649, "cat": "14.ML補完", "term": "AdaBoost", "en": "Adaptive Boosting", "desc": "弱学習器を逐次的に学習させ、直前の弱学習器が誤分類したデータの重みを増やしながら次の弱学習器を学習していくブースティング手法の代表例である。決定木を弱学習器として用いることが多く、単体の決定木よりも高い精度を得られる傾向があるが、外れ値の影響を受けやすいという弱点もある。", "note": "Boostingの代表例、決定木を弱学習器に使うことが多い", "imp": "○"}, {"id": 650, "cat": "6.DL学習技術", "term": "AdaDelta", "en": "AdaDelta", "desc": "AdaGradが学習の後半で学習率が下がりすぎてしまう問題を改善した最適化手法である。モーメンタム、NAG、AdaGrad、AdaDelta、RMSprop、Adam、AdaBound、AMSBoundという最適化手法の発展の歴史の中に位置づけられ、過去の勾配の情報を指数移動平均で管理することで、学習率を動的かつ安定的に調整する。", "note": "AdaGradの改良、Adamの系譜の一つ", "imp": "○"}, {"id": 651, "cat": "9.応用-言語音声", "term": "A-D変換", "en": "Analog to Digital Conversion", "desc": "アナログの音声信号をデジタルデータに変換する処理である。標本化・量子化・符号化の3ステップからなるパルス符号変調(PCM)は、このA-D変換を実現する代表的な具体的手法であり、音声認識などの音声処理を行う前段階として必須の処理である。", "note": "パルス符号変調(PCM)はA-D変換の具体的手法", "imp": "○"}, {"id": 652, "cat": "19.補遺", "term": "AI-Ready", "en": "AI-Ready", "desc": "社会や組織がAIの恩恵をどれだけ取り込める状態にあるかを表す言葉で、「人間中心のAI社会原則」が目指すべき変革の到達点として掲げた「AI-Readyな社会」という理念から来ている。すでにAIを活用できている場合はもちろん、必要になった時点で速やかに導入し利益を得られる体制が整っていれば、その社会もAI-Readyとみなされる。", "note": "人間中心のAI社会原則が提言する概念", "imp": "○"}, {"id": 653, "cat": "12.法律倫理", "term": "AIポリシー", "en": "AI Policy", "desc": "企業や組織が、自らのAI活用の目的や運用方法、倫理面での考え方を社内外に向けて明文化した方針文書がAIポリシーである。何のためにどのようにAIを使うのかを公表することで透明性が高まり、利用者や社会からの信頼獲得につながる取り組みとして重視されている。", "note": "AI利用・開発の方針を明文化した文書", "imp": "○"}, {"id": 654, "cat": "7.DLの手法", "term": "CEC", "en": "Constant Error Carousel", "desc": "LSTMブロックの中核をなす、長期的な情報を蓄えておくための機構である。LSTMはこのCECとゲート機構（入力ゲート・出力ゲート・忘却ゲート）を組み合わせた構造を持ち、CECが誤差を減衰させずに保持し続けることで、通常のRNNで起きやすい勾配消失問題を緩和し、長期的な依存関係を学習できるようにしている。", "note": "LSTMの長期記憶を担う機構", "imp": "○"}, {"id": 655, "cat": "8.応用-画像", "term": "DeepLab", "en": "DeepLab", "desc": "通常の畳み込みでは広い受容野を得るために層を増やすかカーネルを大きくする必要があるが、Dilated Convolutionを使ってその制約を回避したセグメンテーション用ネットワークがDeepLabである。画素単位でクラスを割り当てるセマンティックセグメンテーションのタスクに用いられ、U-NetやFCN、SegNetと並ぶ代表的な手法の一つに数えられる。", "note": "Dilated Convolutionを採用", "imp": "○"}, {"id": 656, "cat": "7.DLの手法", "term": "Depthwise Convolution", "en": "Depthwise Convolution", "desc": "通常の畳み込み演算を空間方向とチャンネル方向の2段階に分解した際に、空間方向側を担う処理で、各チャンネルを独立に扱いながらフィルタを適用する。チャンネル方向の統合を担う1×1のPointwise Convolutionと組み合わせることで計算コストを大きく抑えられ、MobileNetのような軽量なモデル設計の要となっている。", "note": "Pointwise Convolutionと組みDepthwise Separable Convolutionを構成", "imp": "○"}, {"id": 657, "cat": "4.評価と前処理", "term": "L0正則化", "en": "L0 Regularization", "desc": "モデルのパラメータのうち、値が0でないものの個数そのものに罰則を課す正則化手法である。L1正則化やL2正則化がパラメータの絶対値や二乗の和にペナルティを課すのに対し、L0正則化は非ゼロパラメータの「個数」を直接制限するためもっとも厳密なスパース化を実現できるが、微分不可能で組み合わせ最適化問題になり計算が難しいという欠点がある。", "note": "L1/L2正則化よりスパースだが計算困難", "imp": "△"}, {"id": 658, "cat": "15.DL発展", "term": "LIME", "en": "Local Interpretable Model-agnostic Explanations", "desc": "複雑なブラックボックスモデルの個々の予測結果について、その予測に寄与した要因を人間が解釈しやすい形で説明する手法である。予測対象のデータ点の周辺で入力を微小に変化させたときの出力の変化を観察し、その局所的な挙動を単純な（解釈可能な）モデルで近似することで説明を生成する、モデルの種類を問わず適用できる説明可能AI(XAI)の代表的手法の一つである。", "note": "SHAPと並ぶ説明可能AI(XAI)手法", "imp": "○"}, {"id": 659, "cat": "16.強化学習補完", "term": "sim2real", "en": "sim2real", "desc": "コンピュータ上のシミュレータで学習した強化学習モデルを、実世界のロボット等に適用することを指す。実環境での学習に比べ低コストで大量の試行錯誤ができる利点があるが、シミュレータは実世界を完全には再現できないため、そのまま適用すると性能が低下する問題(reality gap)が生じる。この問題を緩和するため、摩擦や光源などのシミュレータのパラメータをランダムに変化させながら学習するドメインランダマイゼーションという手法が用いられる。", "note": "ドメインランダマイゼーションで対策", "imp": "○"}];
const CATS = ["1.AIとAIの動向", "2.探索推論知識表現", "3.機械学習の手法", "4.評価と前処理", "5.DL概要", "6.DL学習技術", "7.DLの手法", "8.応用-画像", "9.応用-言語音声", "10.応用-強化生成", "11.社会実装-産業", "12.法律倫理", "13.数学統計", "14.ML補完", "15.DL発展", "16.強化学習補完", "17.社会補完", "18.法律補完", "19.補遺"];
const app = document.getElementById("app");
const esc = s => (s||"").replace(/[&<>]/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;"}[m]));
const impClass = i => i==="◎"?"a":i==="○"?"b":"c";
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
let state = null;
let timerInterval = null;
const timerEl = document.getElementById("timer");
function fmtTime(sec){
  const m = Math.floor(sec/60), s = sec%60;
  return String(m).padStart(2,"0") + ":" + String(s).padStart(2,"0");
}
function tickTimer(){
  timerEl.textContent = fmtTime(Math.floor((Date.now()-state.quizStart)/1000));
}
function startTimer(){
  timerEl.style.display = "inline";
  tickTimer();
  timerInterval = setInterval(tickTimer, 500);
}
function stopTimer(){
  if(timerInterval){ clearInterval(timerInterval); timerInterval = null; }
}

function renderSetup(){
  stopTimer();
  timerEl.style.display = "none";
  const catChips = CATS.map(c=>`<label><input type="checkbox" class="catf" value="${esc(c)}" checked>${esc(c)}</label>`).join("");
  app.innerHTML = `
    <div class="card">
      <h2>出題範囲を選んで開始</h2>
      <div class="grp">
        <div class="label"><span>カテゴリ</span><span class="labelbtns"><button id="catAll">全選択</button><button id="catNone">全解除</button></span></div>
        <div class="chips">${catChips}</div>
      </div>
      <div class="grp">
        <div class="label"><span>重要度</span></div>
        <div class="chips">
          <label><input type="checkbox" class="impf" value="◎" checked>◎</label>
          <label><input type="checkbox" class="impf" value="○" checked>○</label>
          <label><input type="checkbox" class="impf" value="△" checked>△</label>
        </div>
      </div>
      <div class="grp">
        <div class="label"><span>問題数</span></div>
        <select id="qcount">
          <option value="10">10問</option>
          <option value="20">20問</option>
          <option value="30">30問</option>
          <option value="all">全問</option>
        </select>
      </div>
      <div class="poolcount" id="poolcount"></div>
      <button class="startbtn" id="startBtn">開始</button>
    </div>`;
  const catAll = document.getElementById("catAll");
  const catNone = document.getElementById("catNone");
  const catBoxes = () => [...document.querySelectorAll(".catf")];
  const impBoxes = () => [...document.querySelectorAll(".impf")];
  function pool(){
    const cats = catBoxes().filter(c=>c.checked).map(c=>c.value);
    const imps = impBoxes().filter(c=>c.checked).map(c=>c.value);
    return DATA.filter(d=>cats.includes(d.cat) && imps.includes(d.imp));
  }
  function updateCount(){
    const p = pool();
    document.getElementById("poolcount").textContent = p.length + " 語が対象";
    document.getElementById("startBtn").disabled = p.length < 4;
  }
  catAll.onclick = () => { catBoxes().forEach(c=>c.checked=true); updateCount(); };
  catNone.onclick = () => { catBoxes().forEach(c=>c.checked=false); updateCount(); };
  catBoxes().forEach(c=>c.addEventListener("change", updateCount));
  impBoxes().forEach(c=>c.addEventListener("change", updateCount));
  updateCount();
  document.getElementById("startBtn").onclick = () => {
    const p = pool();
    const countSel = document.getElementById("qcount").value;
    const n = countSel==="all" ? p.length : Math.min(parseInt(countSel,10), p.length);
    const questions = shuffle(p).slice(0, n);
    state = { questions, idx: 0, correct: 0, answered: false, quizStart: Date.now() };
    startTimer();
    renderQuestion();
  };
}

function makeChoices(correct){
  const sameCat = DATA.filter(d=>d.cat===correct.cat && d.id!==correct.id);
  const others = DATA.filter(d=>d.id!==correct.id && d.cat!==correct.cat);
  const dummies = shuffle(sameCat).slice(0,3);
  if(dummies.length<3) dummies.push(...shuffle(others).slice(0, 3-dummies.length));
  return shuffle([correct, ...dummies]);
}

function renderQuestion(){
  const { questions, idx } = state;
  const q = questions[idx];
  const choices = makeChoices(q);
  state.answered = false;
  const pct = Math.round(idx/questions.length*100);
  app.innerHTML = `
    <div class="card">
      <div class="progressbar"><div class="fill" style="width:${pct}%"></div></div>
      <div class="qhead"><span>第 ${idx+1} 問 / ${questions.length} 問</span><span class="qcat">${esc(q.cat)}</span></div>
      <div class="qdesc">${esc(q.desc)}</div>
      <div class="choices">${choices.map((c,i)=>`<button class="choice" data-id="${c.id}">${esc(c.term)}${c.en?` <span style="color:var(--muted);font-size:12px">(${esc(c.en)})</span>`:""}</button>`).join("")}</div>
      <div id="resultArea"></div>
    </div>`;
  document.querySelectorAll(".choice").forEach(btn=>{
    btn.onclick = () => onAnswer(+btn.dataset.id, q);
  });
}

function onAnswer(pickedId, q){
  if(state.answered) return;
  state.answered = true;
  const ok = pickedId === q.id;
  if(ok) state.correct++;
  document.querySelectorAll(".choice").forEach(btn=>{
    btn.disabled = true;
    const id = +btn.dataset.id;
    if(id===q.id) btn.classList.add("correct");
    else if(id===pickedId) btn.classList.add("wrong");
  });
  const resultArea = document.getElementById("resultArea");
  const isLast = state.idx === state.questions.length-1;
  resultArea.innerHTML = `
    <div class="result">
      <div class="verdict ${ok?'ok':'ng'}">${ok?'○ 正解':'✕ 不正解'}</div>
      <dt>正解：<span class="imp ${impClass(q.imp)}">${esc(q.imp)}</span> ${esc(q.term)} ${q.en?`(${esc(q.en)})`:""}</dt>
      <dd>${esc(q.desc)}</dd>
      ${q.note?`<dt>補足・関連</dt><dd>${esc(q.note)}</dd>`:""}
    </div>
    <button class="nextbtn" id="nextBtn">${isLast?'結果を見る':'次の問題へ'}</button>`;
  document.getElementById("nextBtn").onclick = () => {
    if(isLast){ renderResult(); } else { state.idx++; renderQuestion(); }
  };
}

const EXAM_PACE_SEC = 40;
function renderResult(){
  stopTimer();
  const { questions, correct } = state;
  const pct = Math.round(correct/questions.length*100);
  const totalSec = Math.floor((Date.now()-state.quizStart)/1000);
  const avgSec = totalSec / questions.length;
  const diff = EXAM_PACE_SEC - avgSec;
  const paceOk = diff >= 0;
  const paceMsg = paceOk
    ? `本番想定ペース（${EXAM_PACE_SEC}秒/問）より <b>${diff.toFixed(1)}秒</b> 速いペース`
    : `本番想定ペース（${EXAM_PACE_SEC}秒/問）より <b>${Math.abs(diff).toFixed(1)}秒</b> 遅いペース`;
  app.innerHTML = `
    <div class="card">
      <h2>結果</h2>
      <div class="scorebig">${correct} / ${questions.length}</div>
      <div class="scoresub">正答率 ${pct}%</div>
      <div class="timeinfo"><span>合計時間 <b>${fmtTime(totalSec)}</b></span><span>平均解答時間 <b>${avgSec.toFixed(1)}秒/問</b></span></div>
      <div class="pace ${paceOk?'ok':'ng'}">${paceMsg}</div>
      <div class="resultbtns">
        <button class="again" id="againBtn">もう一度</button>
        <button class="back" id="backBtn">設定に戻る</button>
      </div>
    </div>`;
  document.getElementById("backBtn").onclick = renderSetup;
  document.getElementById("againBtn").onclick = () => {
    state = { questions: shuffle(questions), idx: 0, correct: 0, answered: false, quizStart: Date.now() };
    startTimer();
    renderQuestion();
  };
}

renderSetup();
</script>
</body>
</html>
