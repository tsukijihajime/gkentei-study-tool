ラ映像のリアルタイム処理などが具体例として挙げられる。", "note": "対：クラウドAI", "imp": "○"}, {"id": 261, "cat": "11.社会実装-産業", "term": "MLOps", "en": "MLOps", "desc": "機械学習モデルの開発（Development）と運用（Operations）を組み合わせた造語で、モデルの学習からデプロイ、監視、再学習までの一連のプロセスを効率化し継続的に回していくための考え方や技術群である。ソフトウェア開発におけるDevOpsの考え方を機械学習に応用したもので、データやモデルのバージョン管理、自動テスト、精度劣化の監視といった仕組みを整えることで、モデルを安定して本番運用し続けられるようにする。", "note": "", "imp": "○"}, {"id": 262, "cat": "11.社会実装-産業", "term": "AI・データの利用に関する契約ガイドライン", "en": "METI Guideline", "desc": "経済産業省が公表している、AIの開発や利用に関する契約を結ぶ際の考え方や注意点をまとめた指針である。データの権利関係やAI生成物の知的財産権、責任分担など、AI特有の契約上の論点について具体的な条項例を示しており、AI開発を発注する企業と受注するベンダーの双方が適切な契約を結べるよう支援することを目的としている。", "note": "", "imp": "○"}, {"id": 263, "cat": "11.社会実装-産業", "term": "CRISP-DM", "en": "CRISP-DM", "desc": "データマイニングやデータ分析プロジェクトを進める際の標準的な手順を定めたフレームワークであり、Cross-Industry Standard Process for Data Miningの略である。ビジネス理解、データ理解、データ準備、モデリング、評価、展開という6つの工程を繰り返しながらプロジェクトを進める点が特徴で、業種を問わず幅広いデータ分析プロジェクトの進め方の指針として利用されている。", "note": "機械学習版はCRISP-ML", "imp": "○"}, {"id": 264, "cat": "11.社会実装-産業", "term": "PoC", "en": "Proof of Concept", "desc": "新しい技術やアイデアが実際に実現可能かどうかを、本格的な開発に着手する前に小規模な試作や実験で検証する工程である。AI導入プロジェクトでは、いきなり大規模なシステム開発に投資するのではなく、まず限定的なデータや環境でモデルの精度や効果を確認し、うまくいきそうであれば本開発に進むという進め方が一般的であり、失敗のリスクを抑える役割を持つ。", "note": "", "imp": "○"}, {"id": 265, "cat": "11.社会実装-産業", "term": "自動運転レベル", "en": "Autonomous Driving Levels", "desc": "自動車の運転自動化の度合いを0から5までの6段階で分類した国際的な基準であり、数字が大きいほど自動化の度合いが高くなる。レベル0は自動化なし、レベル3は特定条件下でシステムが運転を担うが緊急時は運転者が対応する条件付運転自動化、レベル5は場所や状況を限定しない完全自動運転を指す。この分類は自動運転技術の到達度を議論する際の共通言語として広く使われている。", "note": "レベル3が条件付運転自動化", "imp": "○"}, {"id": 266, "cat": "11.社会実装-産業", "term": "RPA", "en": "Robotic Process Automation", "desc": "パソコン上で行うデータ入力や転記、集計といった定型的な事務作業を、ソフトウェアのロボットが人間の代わりに自動で実行する技術である。人間がマウスやキーボードで行う操作の手順を記録して再現する仕組みが基本であり、AIの画像認識や自然言語処理と組み合わせることで、より複雑で非定型な業務にも適用範囲が広がりつつある。", "note": "", "imp": "○"}, {"id": 267, "cat": "11.社会実装-産業", "term": "ディープフェイク", "en": "Deepfake", "desc": "GANなどのディープラーニング技術を用いて作られる、本物と見分けがつかないほど精巧な偽の画像や動画である。人物の顔を別人の顔にすり替えたり、実際には話していない発言をしているように見せかけたりすることが技術的に可能であり、なりすましや偽情報の拡散といった悪用のリスクが社会問題として指摘されている。", "note": "悪用が問題", "imp": "○"}, {"id": 268, "cat": "11.社会実装-産業", "term": "オープンデータ", "en": "Open Data", "desc": "政府や自治体、企業などが保有するデータを、誰でも自由に二次利用できる形式で公開したデータのことである。利用許諾の範囲が明確で機械判読しやすい形式であることが望ましいとされ、人口統計や気象データ、地理情報などが代表例として挙げられる。AI開発において学習データの調達コストを下げる情報源としても活用される。", "note": "", "imp": "△"}, {"id": 269, "cat": "11.社会実装-産業", "term": "アノテーション", "en": "Annotation", "desc": "教師あり学習に用いる学習データに対し、画像中の物体の種類や位置、文章の意味的な分類など、モデルが学習すべき正解ラベルを人手や専用ツールで付与する作業である。地道で時間のかかる作業であるが、ラベルの質と量がモデルの精度を大きく左右するため、機械学習プロジェクトの中でも重要な工程として位置づけられる。", "note": "", "imp": "○"}, {"id": 270, "cat": "11.社会実装-産業", "term": "産業用ロボット", "en": "Industrial Robot", "desc": "工場などの製造現場で、溶接や部品の組み立て、搬送といった作業を人間に代わって担うロボットである。従来はあらかじめ決められた動作を正確に繰り返すことが主な役割であったが、近年は画像認識やディープラーニングを組み合わせることで、部品の位置や形状のばらつきに柔軟に対応できる知能化が進んでいる。", "note": "", "imp": "△"}, {"id": 271, "cat": "12.法律倫理", "term": "GDPR", "en": "General Data Protection Regulation", "desc": "GDPRはEU域内の個人データ保護を目的とした包括的な規則であり、違反時には全世界売上高の最大4%または2000万ユーロという巨額の制裁金が科される点で企業の関心が高い。EU域外の事業者であってもEU居住者のデータを扱えば適用対象となる域外適用があり、日本企業のグローバル展開やAI開発でのデータ利用にも直接影響する。忘れられる権利やデータポータビリティの権利など、個人の自己情報コントロール権を強化した点も特徴である。", "note": "", "imp": "◎"}, {"id": 272, "cat": "12.法律倫理", "term": "個人情報保護法", "en": "APPI", "desc": "個人情報保護法は日本国内で個人情報を取り扱う事業者に、取得・利用目的の明示・第三者提供の制限などを義務付ける法律である。2022年施行の改正では仮名加工情報の制度が新設され、AI・ビッグデータ活用と個人の権利保護のバランスを図る改正が重ねられてきた。G検定ではGDPRとの違いや、匿名加工情報・仮名加工情報との関係が問われやすい。", "note": "", "imp": "◎"}, {"id": 273, "cat": "12.法律倫理", "term": "匿名加工情報", "en": "Anonymized Information", "desc": "匿名加工情報とは、特定の個人を識別できないよう元データを加工し、かつ元の個人情報に復元できないようにした情報を指す。氏名や住所などの識別子を削除・置換することで、本人の同意なしに第三者提供や統計分析への活用が可能になる点がビジネス上のメリットである。ただし加工基準を満たさず再識別可能な場合は個人情報として扱われる点に注意が必要である。", "note": "", "imp": "○"}, {"id": 274, "cat": "12.法律倫理", "term": "仮名加工情報", "en": "Pseudonymized Information", "desc": "個人情報の一部を加工することで、単体では特定の個人と結びつけにくくしつつ、削除した記述などを社内で照合用情報として保持できる仕組みが仮名加工情報であり、2022年施行の改正個人情報保護法で設けられた区分である。匿名加工情報に比べて加工の要求水準が緩やかなため、社内でのデータ分析やAIの学習用途に活用しやすい一方、第三者への提供は基本的に認められていない。", "note": "", "imp": "○"}, {"id": 275, "cat": "12.法律倫理", "term": "忘れられる権利", "en": "Right to be Forgotten", "desc": "忘れられる権利とは、個人が自分に関する情報の削除や検索結果からの削除をデータ管理者に求められる権利で、GDPRで明文化された代表的な個人の権利の一つである。過去のスキャンダルや古い情報がインターネット上に残り続けることで不利益を被る事態を防ぐ狙いがある。生成AIが学習データから個人情報を出力してしまう問題とも関連し、AI時代のプライバシー保護論点として注目される。", "note": "GDPR", "imp": "○"}, {"id": 276, "cat": "12.法律倫理", "term": "オプトイン／オプトアウト", "en": "Opt-in / Opt-out", "desc": "オプトインは利用者が事前に明示的な同意を与えて初めてサービス提供者がデータ利用や連絡を行える方式であり、オプトアウトは利用者が拒否の意思表示をするまでは利用が許容される方式である。GDPRなど個人情報保護が厳しい制度ではオプトインが原則となる一方、日本の個人情報保護法では場面によりオプトアウトも認められる。AI学習データの収集やメール配信の同意取得の文脈で頻出する対比概念である。", "note": "", "imp": "○"}, {"id": 277, "cat": "12.法律倫理", "term": "著作権法30条の4", "en": "Copyright Act Art.30-4", "desc": "著作権法30条の4は、著作物の表現を人が享受することを目的としない利用、すなわち情報解析（AI学習など）のための利用であれば、原則として著作権者の許諾なく著作物を利用できると定める日本独自の規定である。この規定により日本は世界的に見てもAI学習用データの収集に有利な法環境とされ、生成AIの急速な発展を後押しした一因とされる。ただし著作権者の利益を不当に害する場合は適用されないなど、AI生成物が既存作品と酷似する事例を巡る解釈上の議論が続いている。", "note": "AI学習に関連", "imp": "◎"}, {"id": 278, "cat": "12.法律倫理", "term": "学習済みモデルの著作物性", "en": "Model Copyright", "desc": "学習済みモデルの著作物性とは、AIが学習して得たパラメータやモデルそのもの、あるいはAIが生成した文章・画像に著作権が発生するかを巡る法的論点である。日本の著作権法は人間の思想・感情の創作的表現を保護対象とするため、人間の創作的関与がないAI単独の生成物は原則として著作物に該当しないと解されている。生成AIの商用利用が広がる中、権利の所在や侵害責任の切り分けが重要な実務課題となっている。", "note": "", "imp": "○"}, {"id": 279, "cat": "12.法律倫理", "term": "AI倫理", "en": "AI Ethics", "desc": "AI倫理とは、AIの開発・運用・利用の各段階で人間の尊厳や社会の利益を損なわないよう配慮すべき倫理的な考え方の総称である。公平性・説明責任・透明性（FAT）やプライバシー保護、安全性の確保などが主要な柱として挙げられる。各国政府や企業がAI倫理指針を相次いで策定しており、G検定でも社会実装の前提知識として重視される分野である。", "note": "", "imp": "○"}, {"id": 280, "cat": "12.法律倫理", "term": "人間中心のAI社会原則", "en": "Human-centric AI Principles", "desc": "人間中心のAI社会原則は、2019年に日本政府（統合イノベーション戦略推進会議）が策定したAI活用の基本方針で、人間の尊厳が尊重される社会、多様な背景を持つ人々が幸福を追求できる社会などを掲げる。教育・データ利活用・公平性・透明性・プライバシー・セキュリティなど7つの原則から構成される点が特徴である。G検定のシラバスでは日本発のAI政策文書として頻出するため名称と策定年を押さえておくとよい。", "note": "2019年", "imp": "○"}, {"id": 281, "cat": "12.法律倫理", "term": "FAT", "en": "Fairness, Accountability, Transparency", "desc": "FATは公平性（Fairness）・説明責任（Accountability）・透明性（Transparency）というAI倫理の中核をなす3つの原則の頭文字を取った略語である。近年はプライバシー（Privacy）を加えたFATPやFATEという拡張形も用いられ、AIが差別的な判断をせず、判断根拠を追跡でき、意思決定の過程を開示できることの重要性を示す枠組みとして各国の指針で参照される。", "note": "", "imp": "○"}, {"id": 282, "cat": "12.法律倫理", "term": "公平性", "en": "Fairness", "desc": "公平性とは、AIの予測や判断が性別・人種・年齢などの特定の属性によって不当に差別的な結果を生まないようにすることを指す。採用選考AIが特定の性別を不利に扱っていたとされた事例のように、学習データに含まれる社会的バイアスがそのままモデルに反映されるリスクが問題視されている。公平性の指標には複数の定義（機会均等・統計的パリティなど）があり、それらが同時に満たせない場合があることも知られている。", "note": "", "imp": "◎"}, {"id": 283, "cat": "12.法律倫理", "term": "バイアス", "en": "Bias", "desc": "バイアスとは、学習データや設計に含まれる偏りがモデルの予測に反映され、特定の集団に不利益をもたらす現象を指す。例えば過去の採用データに男性が多く含まれていれば、そのデータで学習したAIは女性を過小評価しやすくなる。データ収集段階での代表性の欠如やラベル付け担当者の主観など、様々な要因がバイアスの原因となるため、データ監査や公平性指標によるモニタリングが対策として重要である。", "note": "", "imp": "◎"}, {"id": 284, "cat": "12.法律倫理", "term": "説明可能AI", "en": "XAI", "desc": "説明可能AI（XAI）とは、深層学習など複雑なモデルがなぜその予測や判断を下したのかを人間が理解できる形で示すための技術・取り組みの総称である。医療診断や与信審査のように判断根拠の説明責任が求められる分野で特に重要視される。代表的な手法にはLIMEやSHAPのように個々の予測への各特徴量の寄与度を可視化する手法があり、モデルの信頼性向上や規制対応にもつながる。", "note": "", "imp": "◎"}, {"id": 285, "cat": "12.法律倫理", "term": "ブラックボックス問題", "en": "Black Box Problem", "desc": "ブラックボックス問題とは、深層学習モデルが高い予測精度を示す一方で、内部で何百万ものパラメータがどのように結論を導いたのかを人間が直感的に理解できない問題を指す。医療や金融など判断ミスが重大な影響を及ぼす分野では、なぜその結果になったのか説明できないことが実用化の障壁となる。この問題への対応策として説明可能AI（XAI）の研究が進められている。", "note": "", "imp": "○"}, {"id": 286, "cat": "12.法律倫理", "term": "トロッコ問題", "en": "Trolley Problem", "desc": "トロッコ問題とは、暴走するトロッコの進路を切り替えれば1人を犠牲にして5人を救えるが、何もしなければ5人が犠牲になるという古典的な倫理学の思考実験である。自動運転車が衝突を避けられない状況で歩行者と搭乗者のどちらを優先すべきかといった、AIに価値判断を実装する際のジレンマを説明する例としてしばしば引用される。唯一絶対の正解がないため、AI開発における倫理的意思決定の難しさを象徴する題材としてG検定でも取り上げられる。", "note": "", "imp": "○"}, {"id": 287, "cat": "12.法律倫理", "term": "敵対的サンプル", "en": "Adversarial Examples", "desc": "敵対的サンプルとは、人間の目にはほとんど違いがわからない微小なノイズを画像などの入力データに加えることで、AIモデルに誤った分類をさせる入力データを指す。例えばパンダの画像にわずかな摂動を加えるだけで、モデルが高い確信度でテナガザルと誤認識してしまう研究例が有名である。自動運転の標識認識や顔認証システムへの攻撃手法として悪用されるリスクがあり、AIセキュリティの重要な研究テーマとなっている。", "note": "", "imp": "◎"}, {"id": 288, "cat": "12.法律倫理", "term": "EU AI規制法", "en": "EU AI Act", "desc": "EU AI規制法（EU AI Act）は、AIシステムをリスクの高さに応じて段階的に規制するEUの包括的な法律である。社会的スコアリングなど「許容できないリスク」のAIは原則禁止とし、採用選考や信用スコアリングなど「高リスク」のAIには適合性評価や人間による監督などの義務を課す一方、リスクの低いAIには軽い義務のみを課すという階層的アプローチが特徴である。世界初の包括的AI規制法として、日本を含む各国のAI政策議論に大きな影響を与えている。", "note": "", "imp": "○"}, {"id": 289, "cat": "12.法律倫理", "term": "AI開発ガイドライン", "en": "AI Development Guidelines", "desc": "AI開発ガイドラインとは、総務省や経済産業省などの政府機関が、AI開発者・提供者・利用者それぞれに求められる配慮事項を示した指針の総称である。法的拘束力を持たないソフトローとして、人間中心・安全性・公平性・透明性といった原則を実務に落とし込む役割を果たす。生成AIの急速な普及を受けて、事業者向けガイドラインの整備・改訂が継続的に行われている。", "note": "", "imp": "○"}, {"id": 290, "cat": "12.法律倫理", "term": "ELSI", "en": "ELSI", "desc": "ELSIは倫理的（Ethical）・法的（Legal）・社会的（Social）課題（Issues）の頭文字を取った略語で、新技術が社会に導入される際に生じる複合的な課題を扱う概念である。もともとヒトゲノム研究の分野で提唱された考え方だが、AIのような社会に大きな影響を与える技術の導入検討にも応用されている。AIガバナンスを議論する際の分析枠組みとしてG検定でも登場する。", "note": "", "imp": "○"}, {"id": 291, "cat": "12.法律倫理", "term": "プライバシー・バイ・デザイン", "en": "Privacy by Design", "desc": "プライバシー・バイ・デザインとは、システムやサービスの企画・設計段階からあらかじめプライバシー保護の仕組みを組み込んでおくべきだという考え方である。事後的な対策では情報漏洩や不適切利用のリスクを完全には防げないため、データの最小収集や匿名化処理を初期設計に織り込むことが重視される。GDPRでもこの考え方が明文化されており、AIシステム開発における設計原則の一つとして位置づけられる。", "note": "セキュリティ・バイ・デザインと並ぶ概念", "imp": "○"}, {"id": 292, "cat": "12.法律倫理", "term": "ステークホルダー", "en": "Stakeholder", "desc": "ステークホルダーとは、AIの開発・導入・利用によって直接的・間接的に影響を受けるすべての関係者を指す概念で、開発企業や利用者だけでなく、AIによる判断の対象となる一般市民、規制当局なども含まれる。AIガバナンスやAI倫理の議論では、多様なステークホルダーの視点を取り入れた合意形成が公平で信頼されるAI社会の実現に不可欠とされる。", "note": "", "imp": "△"}, {"id": 293, "cat": "12.法律倫理", "term": "ディープフェイクと偽情報", "en": "Disinformation", "desc": "ディープフェイクと偽情報とは、生成AIを用いて実在の人物の顔や声を合成した偽の動画・音声、あるいはもっともらしい偽の文章を作成し、それらが真実であるかのように拡散されるリスクを指す。選挙期間中に政治家の偽発言動画が出回るなど社会的混乱を招いた実例が世界各地で報告されており、フェイクニュースによる世論操作や詐欺への悪用が懸念されている。対策として電子透かしやコンテンツ来歴を示す技術（C2PAなど）の標準化が進められている。", "note": "", "imp": "○"}, {"id": 294, "cat": "12.法律倫理", "term": "AIガバナンス", "en": "AI Governance", "desc": "AIガバナンスとは、企業や組織がAIの開発・導入・運用に伴うリスクを適切に管理し、社会的責任を果たすための体制・ルール・プロセスの総称である。倫理指針の策定にとどまらず、リスク評価委員会の設置やモデルの継続的モニタリング、インシデント対応手順の整備などを含む実務的な枠組みを指す。EU AI規制法のような外部規制への対応という側面と、企業自身が自主的にリスクを統制する側面の両方が求められる。", "note": "", "imp": "○"}, {"id": 295, "cat": "12.法律倫理", "term": "透明性レポート", "en": "Transparency Report", "desc": "透明性レポートとは、企業がAIシステムの利用状況、判断根拠、発生したインシデントなどの情報を定期的に外部へ開示する報告書を指す。プラットフォーム事業者がコンテンツモデレーションの実施状況を公表する例のように、AIの社会的影響についてステークホルダーへの説明責任を果たす手段として位置づけられる。AI規制の高まりとともに開示を義務化する動きも各国で広がっている。", "note": "", "imp": "△"}, {"id": 296, "cat": "12.法律倫理", "term": "オプトアウト学習拒否", "en": "Crawl Opt-out", "desc": "オプトアウト学習拒否とは、ウェブサイト運営者やコンテンツ制作者が、自分の公開データをAIの学習データとして収集・利用されることを望まない場合に、その意思を明示的に表示する仕組みを指す。robots.txtへの記述や専用のヘッダー設定によりクローラーによる収集を制限する方法が一般的である。著作権法30条の4のような情報解析利用を認める規定がある国では、権利者側の対抗手段として注目されている。", "note": "", "imp": "△"}, {"id": 297, "cat": "12.法律倫理", "term": "シャドーAI", "en": "Shadow AI", "desc": "シャドーAIとは、企業のIT部門やガバナンス体制が把握・承認していないまま、従業員が個人の判断で業務に生成AIツールなどを利用してしまう状態を指す。機密情報や個人情報を外部の生成AIサービスに入力してしまうことによる情報漏洩リスクが特に懸念される。従来の「シャドーIT」と同様の構造的問題であり、AI利用ガイドラインの策定や利用状況の可視化が対策として求められる。", "note": "", "imp": "△"}, {"id": 298, "cat": "13.数学統計", "term": "ベクトル", "en": "Vector", "desc": "ベクトルとは、大きさと向きの両方の情報を持つ量で、数の並び（成分）として表現される数学的対象である。機械学習では画像・文章・音声といったデータを特徴量ベクトルという数値の並びに変換することで、コンピュータが計算可能な形式に落とし込む。例えば単語をベクトル化するWord2Vecでは、意味の近い単語同士がベクトル空間上で近い位置に配置される。", "note": "", "imp": "○"}, {"id": 299, "cat": "13.数学統計", "term": "行列", "en": "Matrix", "desc": "行列とは、数を縦横の格子状（行と列）に並べたデータ構造で、複数のベクトルをまとめて表現・変換する際に用いられる。ニューラルネットワークでは各層の重みが行列として表現され、入力ベクトルに重み行列を掛け合わせる行列積の演算によって次の層への出力が計算される。大規模なモデルほどこの行列演算をいかに高速化するかがGPU活用の要となる。", "note": "", "imp": "○"}, {"id": 300, "cat": "13.数学統計", "term": "内積", "en": "Inner Product", "desc": "内積とは、2つの同じ次元のベクトルについて、対応する成分同士の積を全て足し合わせた値であり、ベクトル同士の向きの近さ（類似度）を測る基本的な演算である。内積の値が大きいほど2つのベクトルは似た方向を向いていることを意味し、これを正規化したものがコサイン類似度である。推薦システムや文書検索で、ユーザーや単語の特徴ベクトル同士の類似度計算に広く利用される。", "note": "類似度に利用", "imp": "○"}, {"id": 301, "cat": "13.数学統計", "term": "テンソル", "en": "Tensor", "desc": "テンソルとは、スカラー（0階）・ベクトル（1階）・行列（2階）をさらに一般化した多次元配列の概念であり、任意の次元数（階数）のデータを統一的に扱うことができる。例えばカラー画像は「高さ×幅×色チャンネル」の3階テンソルとして、動画データはさらに時間軸を加えた4階テンソルとして表現される。TensorFlowやPyTorchといった深層学習フレームワークの名称にも表れているように、テンソルは深層学習における基本的なデータ表現である。", "note": "", "imp": "○"}, {"id": 302, "cat": "13.数学統計", "term": "微分", "en": "Differentiation", "desc": "微分とは、関数の入力がわずかに変化したときに出力がどれだけ変化するか、すなわち関数の傾き（変化率）を求める数学的な演算である。深層学習では損失関数を各パラメータで微分することで、パラメータをどの方向にどれだけ動かせば損失が小さくなるかがわかり、これが勾配降下法によるパラメータ更新の基礎となる。例えばy=x²をxで微分するとy'=2xとなり、x=3での接線の傾きは6と求められる。", "note": "勾配の基礎", "imp": "○"}, {"id": 303, "cat": "13.数学統計", "term": "偏微分", "en": "Partial Derivative", "desc": "偏微分とは、複数の変数を持つ関数において、注目する1つの変数以外はすべて定数として固定し、その1変数についてのみ微分を行う操作である。ニューラルネットワークの損失関数は無数の重みパラメータを持つ多変数関数であるため、各パラメータの更新量を求めるには、そのパラメータについての偏微分を計算する必要がある。全パラメータの偏微分を並べたものが勾配ベクトルとなる。", "note": "", "imp": "○"}, {"id": 304, "cat": "13.数学統計", "term": "連鎖律", "en": "Chain Rule", "desc": "連鎖律とは、複数の関数が合成された合成関数を微分する際に、各構成関数の微分（導関数）の積として全体の微分を求められるという微分法則である。例えばy=f(g(x))の微分はdy/dx = (dy/dg)×(dg/dx)のように分解できる。ニューラルネットワークは層を重ねた巨大な合成関数とみなせるため、出力層から入力層に向かって連鎖律を繰り返し適用することで各層の勾配を効率的に計算する誤差逆伝播法（バックプロパゲーション）が成立している。", "note": "", "imp": "◎"}, {"id": 305, "cat": "13.数学統計", "term": "勾配", "en": "Gradient", "desc": "勾配とは、多変数関数における各変数についての偏微分を並べて作ったベクトルであり、その関数が最も急激に増加する方向を指し示す。深層学習の学習では、損失関数を最小化するために勾配の逆方向（最も損失が減少する方向）へパラメータを少しずつ更新していく最急降下法（勾配降下法）が用いられる。勾配が0に近づくことは、その点が極小値や鞍点に近いことを意味する。", "note": "最急降下の方向", "imp": "○"}, {"id": 306, "cat": "13.数学統計", "term": "確率", "en": "Probability", "desc": "確率とは、ある事象がどれくらい起こりやすいかを0から1の間の数値で表したものであり、1に近いほど起こりやすく0に近いほど起こりにくいことを意味する。機械学習の分類問題では、モデルの出力を各クラスに属する確率として解釈することが多く、例えばソフトマックス関数は複数の出力値を合計が1になる確率分布に変換する。統計的機械学習の多くの理論は確率論を基盤として構築されている。", "note": "", "imp": "○"}, {"id": 307, "cat": "13.数学統計", "term": "条件付き確率", "en": "Conditional Probability", "desc": "条件付き確率とは、ある事象Bが既に起きたという条件の下で、別の事象Aが起こる確率P(A|B)を表す概念である。例えば「雨が降っている」という条件の下で「傘を持っている人がいる」確率は、条件なしの確率よりも高くなると考えられる。この条件付き確率の考え方はベイズの定理の根幹をなし、スパムフィルタや診断支援システムなど、観測情報から確率を更新する多くのAI応用の基礎となっている。", "note": "", "imp": "○"}, {"id": 308, "cat": "13.数学統計", "term": "ベイズの定理", "en": "Bayes' Theorem", "desc": "ベイズの定理とは、ある仮説について元々持っていた確率（事前確率）を、新たに得られた観測データに基づいて更新し、より確からしい確率（事後確率）を導き出すための数学的な公式である。例えば病気の検査で陽性反応が出た場合でも、その病気の有病率（事前確率）が低ければ、実際に罹患している確率（事後確率）はそれほど高くならないという直感に反する結果を正しく計算できる。ナイーブベイズ分類器や各種のベイズ統計モデルなど、機械学習の多くの手法の理論的基盤となっている。", "note": "", "imp": "◎"}, {"id": 309, "cat": "13.数学統計", "term": "事前確率／事後確率", "en": "Prior / Posterior", "desc": "事前確率とは観測データを得る前に仮説について想定している確率であり、事後確率とは新たな観測データを踏まえてベイズの定理により更新された後の確率である。例えば病気の検査であれば、検査前に想定される有病率が事前確率、検査結果（陽性・陰性）を踏まえて再計算された罹患確率が事後確率にあたる。この事前確率から事後確率への更新プロセスがベイズ推定の核心であり、新しいデータが得られるたびに信念を柔軟に修正できる点が特徴である。", "note": "", "imp": "○"}, {"id": 310, "cat": "13.数学統計", "term": "最尤推定", "en": "Maximum Likelihood", "desc": "最尤推定とは、観測されたデータが得られる確率（尤度）が最大になるように、モデルのパラメータを決定する推定手法である。例えばコインを10回投げて7回表が出た場合、表が出る確率をp=0.7と推定するのが最尤推定の考え方に相当する。ニューラルネットワークの学習で用いられる交差エントロピー損失の最小化は、実は最尤推定の原理に基づいていることが知られており、機械学習における多くの損失関数設計の理論的な裏付けとなっている。", "note": "", "imp": "○"}, {"id": 311, "cat": "13.数学統計", "term": "正規分布", "en": "Normal Distribution", "desc": "正規分布とは、平均値を中心として左右対称な釣鐘型の曲線を描く連続確率分布で、ガウス分布とも呼ばれる。自然界や社会現象の多くのデータ（身長、測定誤差など）がこの分布に近い形を取ることが経験的に知られており、統計学において最も基本的な分布である。深層学習では重みの初期値をこの分布からランダムに生成したり、ノイズをこの分布に従って加えたりするなど、様々な場面で活用される。", "note": "ガウス分布", "imp": "○"}, {"id": 312, "cat": "13.数学統計", "term": "平均・分散・標準偏差", "en": "Mean/Variance/SD", "desc": "平均・分散・標準偏差はデータの特徴を要約する代表的な統計量である。平均はデータの中心的な値、分散はデータが平均からどれだけばらついているかを2乗の単位で表した量、標準偏差は分散の平方根を取ることで元のデータと同じ単位に戻したばらつきの指標である。例えばテストの平均点が同じでも標準偏差が大きいクラスほど点数のばらつきが大きいことを意味し、機械学習ではデータの正規化（標準化）にこれらの統計量が用いられる。", "note": "", "imp": "○"}, {"id": 313, "cat": "13.数学統計", "term": "相関と因果", "en": "Correlation vs Causation", "desc": "相関と因果とは、2つの変数の間に統計的な関連が見られること（相関）と、一方が他方の原因となっていること（因果）は本質的に異なる概念であるという考え方である。例えば「アイスクリームの売上」と「水難事故の件数」には正の相関が見られるが、これは両者が「気温の上昇」という共通の要因によって同時に増減しているだけの擬似相関であり、直接の因果関係はない。データ分析やAIの結果を解釈する際に、相関関係のみから安易に因果関係を結論づけないよう注意が必要である。", "note": "擬似相関に注意", "imp": "○"}, {"id": 314, "cat": "13.数学統計", "term": "エントロピー", "en": "Entropy", "desc": "エントロピーとは、ある事象や情報がどれだけ不確実・乱雑であるかを数値化した情報理論の指標であり、情報理論の父と呼ばれるシャノンが提唱した概念に由来する。予測が困難でばらつきの大きいデータほどエントロピーは高くなり、決定木ではどの特徴量で分割すればエントロピー（不純度）が最も減少するかを基準にノードの分岐を決定する。交差エントロピー損失のように、深層学習の分類問題における損失関数の設計にも応用されている。", "note": "決定木/損失", "imp": "○"}, {"id": 315, "cat": "13.数学統計", "term": "KLダイバージェンス", "en": "KL Divergence", "desc": "KLダイバージェンスとは、2つの確率分布がどれだけ異なっているかを定量的に測る指標であり、値が0であれば2つの分布が完全に一致することを意味する。厳密には距離の公理（対称性）を満たさないため「距離」ではなく「乖離度」と呼ばれる点に注意が必要である。VAE（変分オートエンコーダ）では、潜在変数の分布を単純な正規分布に近づけるための正則化項としてKLダイバージェンスが損失関数に組み込まれている。", "note": "VAE等", "imp": "○"}, {"id": 316, "cat": "13.数学統計", "term": "シグモイドの微分", "en": "Sigmoid Derivative", "desc": "シグモイド関数の微分（導関数）は、入力が0のときに最大値0.25を取り、入力の絶対値が大きくなるにつれて急速に0へ近づくという性質を持つ。誤差逆伝播法では連鎖律により各層の微分値が掛け合わされていくため、シグモイド関数を活性化関数に使った層を何層も重ねると、最大でも0.25という小さい値が繰り返し掛け合わされて勾配がほぼ0になってしまう勾配消失問題の主要な原因となる。この問題への対策として、ReLU関数のような微分値が0付近で潰れにくい活性化関数が広く使われるようになった。", "note": "", "imp": "△"}, {"id": 317, "cat": "13.数学統計", "term": "尤度", "en": "Likelihood", "desc": "尤度とは、あるパラメータの値を仮定したときに、実際に観測されたデータが得られる確からしさを表す量であり、確率と似た概念だが役割が異なる。確率は「パラメータが決まっているときにデータが得られる度合い」を指すのに対し、尤度は「観測データが決まっているときに、どのパラメータがもっともらしいか」を評価する視点で用いられる。最尤推定はこの尤度を最大化するパラメータを探索する手法であり、多くの機械学習モデルの学習原理の基盤となっている。", "note": "", "imp": "○"}, {"id": 318, "cat": "13.数学統計", "term": "期待値", "en": "Expected Value", "desc": "期待値とは、確率変数が取りうる各値に、その値が起こる確率を重みとして掛けて合計した平均的な値である。例えばサイコロを1回振ったときの出目の期待値は、各目1〜6にそれぞれ1/6の確率を掛けて合計した3.5となる。強化学習では将来得られる報酬の期待値（期待報酬）を最大化するように方策を学習することが目的となるなど、不確実性を伴う意思決定を扱う多くのAI理論で基礎となる概念である。", "note": "", "imp": "△"}, {"id": 319, "cat": "14.ML補完", "term": "特異度", "en": "Specificity", "desc": "特異度は、実際には陰性であるデータのうち、モデルが正しく陰性と判定できた割合を示す指標であり、偽陽性を避けたい場面で重視される。例えば健康な人を誤って病気と判定しない性能を測るのに用いられ、再現率（陽性を見逃さない能力）とは表裏の関係にある。医療診断のように誤検知のコストが高い場面で特に重要となる。", "note": "再現率と対", "imp": "○"}, {"id": 320, "cat": "14.ML補完", "term": "マクロ平均／マイクロ平均", "en": "Macro / Micro Average", "desc": "多クラス分類で適合率や再現率などの指標をクラス横断でまとめる際の2方式である。マクロ平均は各クラスの指標を単純平均するため少数クラスも均等に評価し、マイクロ平均は全サンプルを合算してから計算するためデータ数の多いクラスの影響が強くなる。不均衡データではどちらを使うかで評価結果が大きく変わる点に注意が必要である。", "note": "", "imp": "△"}, {"id": 321, "cat": "14.ML補完", "term": "オーバーサンプリング", "en": "Oversampling", "desc": "オーバーサンプリングは、データ数が少ない少数クラスのサンプルを人工的に増やすことでクラス不均衡を是正する手法である。単純な複製に加え、SMOTEのように既存データから新しいサンプルを合成する方法もある。例えば不正検知のように陽性データが1%しかないような場合に、学習が多数派クラスへ偏るのを防ぐ目的で用いられる。", "note": "SMOTE", "imp": "○"}, {"id": 322, "cat": "14.ML補完", "term": "アンダーサンプリング", "en": "Undersampling", "desc": "アンダーサンプリングは、データ数が多い多数クラスのサンプルを間引いて減らすことでクラス不均衡を是正する手法である。オーバーサンプリングと異なり学習データ全体の量が減るため、少数クラスの情報を保ちつつ学習時間を短縮できる利点がある一方、重要な多数派サンプルを捨ててしまう情報損失のリスクも伴う。", "note": "", "imp": "○"}, {"id": 323, "cat": "14.ML補完", "term": "SMOTE", "en": "SMOTE", "desc": "SMOTE（Synthetic Minority Over-sampling Technique）は、少数クラスのデータ点とその近傍点を線形補間することで、実在しない新しい合成サンプルを作り出す代表的なオーバーサンプリング手法である。単純な複製と異なり特徴空間上に新しい点を生成するため、過学習を抑えつつクラス不均衡を緩和できる。", "note": "", "imp": "△"}, {"id": 324, "cat": "14.ML補完", "term": "ベイズ最適化", "en": "Bayesian Optimization", "desc": "ベイズ最適化は、過去の試行結果を確率モデル（多くはガウス過程）で近似し、次に試すべきハイパーパラメータの候補を効率よく選ぶ最適化手法である。ランダムサーチのように無作為に探すのではなく、有望な領域を優先的に探索するため、少ない試行回数で良い設定にたどり着きやすい。学習に時間がかかる深層学習モデルのチューニングで特に有用である。", "note": "", "imp": "○"}, {"id": 325, "cat": "14.ML補完", "term": "ランダムサーチ", "en": "Random Search", "desc": "ランダムサーチは、学習率や木の深さなどのハイパーパラメータをあらかじめ決めた範囲からランダムに選び出し、その組み合わせで評価を繰り返す探索手法である。全組み合わせを網羅するグリッドサーチに比べ、重要度の低いパラメータに無駄な試行を割かずに済むため、同じ計算コストでもより良い結果が得られやすいとされる。", "note": "", "imp": "○"}, {"id": 326, "cat": "14.ML補完", "term": "リッジ／ラッソの違い", "en": "Ridge vs Lasso", "desc": "リッジ回帰とラッソ回帰はいずれも正則化により過学習を防ぐ手法だが、ペナルティの与え方が異なる。リッジ（L2正則化）は係数を全体的に小さく縮小するのに対し、ラッソ（L1正則化）は不要な係数を厳密に0にできるため、自動的に特徴量を選択するスパースなモデルが得られる。両者を組み合わせたElastic Netもよく使われる。", "note": "", "imp": "○"}, {"id": 327, "cat": "14.ML補完", "term": "EMアルゴリズム", "en": "EM Algorithm", "desc": "EMアルゴリズムは、観測データの背後に直接観測できない潜在変数が存在するモデルにおいて、最尤推定を行うための反復手法である。潜在変数の期待値を計算するE（期待）ステップと、その期待値をもとにパラメータを更新するM（最大化）ステップを交互に繰り返して収束させる。混合ガウスモデルのパラメータ推定が代表的な応用例である。", "note": "混合ガウス", "imp": "○"}, {"id": 328, "cat": "14.ML補完", "term": "混合ガウスモデル", "en": "GMM", "desc": "混合ガウスモデル（GMM）は、複数の正規分布を重み付きで重ね合わせることで、複雑な形状のデータ分布を表現する確率モデルである。各データ点がどの分布から生成されたかは潜在変数として扱われ、EMアルゴリズムでパラメータを推定する。クラスタリングや異常検知、音声認識の音響モデルなどに応用される。", "note": "", "imp": "○"}, {"id": 329, "cat": "14.ML補完", "term": "トピックモデル", "en": "Topic Model", "desc": "トピックモデルは、大量の文書集合の背後に潜む潜在的な話題（トピック）を統計的に推定する手法である。各文書が複数のトピックの混合として表され、各トピックが特定の単語の出現しやすさで特徴づけられると仮定する。代表的な手法にLDAがあり、ニュース記事の自動分類やレコメンドの前処理などに利用される。", "note": "LDA", "imp": "○"}, {"id": 330, "cat": "14.ML補完", "term": "LDA", "en": "Latent Dirichlet Allocation", "desc": "LDA（潜在ディリクレ配分法）は、文書が複数のトピックの混合から生成され、各トピックが特定の単語分布から生成されるという生成モデルに基づく代表的なトピックモデルである。ディリクレ分布を事前分布として用いることで、文書ごとのトピック比率やトピックごとの単語分布をベイズ的に推定できる。", "note": "", "imp": "△"}, {"id": 331, "cat": "14.ML補完", "term": "特徴量選択", "en": "Feature Selection", "desc": "特徴量選択は、モデルの予測に寄与する有用な特徴量だけを残し、不要または冗長な特徴量を取り除く前処理である。次元を減らすことで学習の高速化や過学習の抑制、モデルの解釈性向上につながる。相関係数による絞り込みや、モデルの重要度を使う手法（決定木の分岐寄与度など）が代表的なアプローチである。", "note": "", "imp": "○"}, {"id": 332, "cat": "14.ML補完", "term": "正解ラベル", "en": "Label / Ground Truth", "desc": "正解ラベルは、教師あり学習においてモデルが予測すべき正しい答えとして人手やルールで付与されるデータであり、Ground Truthとも呼ばれる。例えば画像分類なら「猫」「犬」といったクラス名がこれにあたり、モデルの予測値との誤差を計算する基準になる。ラベルの品質が低いと学習全体の精度に悪影響を及ぼす。", "note": "目的変数とほぼ同義", "imp": "○"}, {"id": 333, "cat": "14.ML補完", "term": "汎化誤差", "en": "Generalization Error", "desc": "汎化誤差は、学習に使っていない未知のデータに対してモデルがどれだけ誤差を出すかを表す指標であり、モデルの実用性能を測る本質的な尺度である。訓練データでの誤差（訓練誤差）が小さくても汎化誤差が大きい場合は過学習が疑われる。汎化誤差を推定するために検証データやテストデータでの評価が行われる。", "note": "", "imp": "○"}, {"id": 334, "cat": "15.DL発展", "term": "Global Average Pooling", "en": "GAP", "desc": "Global Average Pooling（GAP）は、CNNの最終畳み込み層で得られる各特徴マップの全画素を平均し、1つの値に集約する処理である。従来の全結合層に比べてパラメータ数を大幅に削減できるため過学習を抑制でき、GoogLeNetなど多くの画像分類モデルの出力層近くで採用されている。", "note": "", "imp": "△"}, {"id": 335, "cat": "15.DL発展", "term": "1×1畳み込み", "en": "1x1 Convolution", "desc": "1×1畳み込みは、空間方向のサイズを変えずにチャンネル数だけを増減させる畳み込み演算であり、主にチャンネル方向の次元削減や情報の混合に利用される。GoogLeNetのInceptionモジュールでは計算量を抑えるボトルネック層として使われ、ResNetでも次元調整に活用されている。", "note": "", "imp": "△"}, {"id": 336, "cat": "15.DL発展", "term": "転置畳み込み", "en": "Transposed Convolution", "desc": "転置畳み込みは、通常の畳み込みとは逆に特徴マップの空間サイズを拡大する演算であり、逆畳み込みやアップコンボリューションとも呼ばれる。画像セグメンテーションのUpsamplingや、画像生成モデル（GANのGeneratorなど）でエンコードされた小さな特徴マップを元の解像度へ戻す際に用いられる。", "note": "生成/分割", "imp": "○"}, {"id": 337, "cat": "15.DL発展", "term": "Dilated畳み込み", "en": "Dilated Convolution", "desc": "Dilated畳み込み（膨張畳み込み）は、フィルタの各要素の間に隙間を空けて適用することで、パラメータ数や計算量を増やさずに受容野（見渡せる範囲）を広げる畳み込み手法である。セマンティックセグメンテーションのように広い文脈情報を保ちつつ解像度を落としたくないタスクで有効に使われる。", "note": "", "imp": "△"}, {"id": 338, "cat": "15.DL発展", "term": "MobileNet", "en": "MobileNet", "desc": "MobileNetは、スマートフォンなどの計算資源が限られたモバイル環境での動作を想定して設計された軽量なCNNである。通常の畳み込みを空間方向とチャンネル方向に分離するDepthwise Separable Convolutionを採用することで、精度を大きく落とさずに計算量とパラメータ数を削減している。", "note": "Depthwise分離", "imp": "○"}, {"id": 339, "cat": "15.DL発展", "term": "EfficientNet", "en": "EfficientNet", "desc": "EfficientNetは、ネットワークの深さ・幅（チャンネル数）・入力解像度の3つを個別に調整するのではなく、一定の比率で同時にスケールアップすることで効率よく精度を高めたCNNである。この手法は複合スケーリング（Compound Scaling）と呼ばれ、少ない計算量で高い画像分類精度を達成した。", "note": "", "imp": "△"}, {"id": 340, "cat": "15.DL発展", "term": "Vision Transformer", "en": "ViT", "desc": "Vision Transformer（ViT）は、画像を小さなパッチに分割してトークンのように扱い、自然言語処理で成功したTransformerをそのまま画像認識に適用したモデルである。畳み込みに頼らずAttention機構だけで画像内の広範な関係性を捉えられる点が特徴で、大規模データで事前学習するとCNNに匹敵、あるいは上回る性能を示す。", "note": "", "imp": "○"}, {"id": 341, "cat": "15.DL発展", "term": "BLEU", "en": "BLEU", "desc": "BLEUは、機械翻訳などの生成文が正解の参照文とどれだけ単語列（n-gram）レベルで一致しているかを測る評価指標である。値は0から1（または百分率）で表され、高いほど参照文に近いことを意味する。計算が高速で自動化しやすいため、翻訳モデルの性能比較の標準的な指標として広く使われている。", "note": "", "imp": "○"}, {"id": 342, "cat": "15.DL発展", "term": "ROUGE", "en": "ROUGE", "desc": "ROUGEは、自動要約の品質を評価するための指標群であり、生成された要約文が正解の参照要約とどれだけ単語やフレーズを共有しているかを測る。BLEUが精度寄り（生成文中の一致割合）を重視するのに対し、ROUGEは再現率寄り（参照文の内容をどれだけ拾えたか）を重視する設計になっている。", "note": "", "imp": "△"}, {"id": 343, "cat": "15.DL発展", "term": "Perplexity", "en": "Perplexity", "desc": "Perplexityは、言語モデルが次の単語をどれだけ的確に予測できているかを表す指標であり、モデルの予測確率分布のエントロピーから計算される。値が低いほど予測の不確実性が小さく、モデルの性能が良いことを意味する。例えば流暢な文章ほど次単語の予測がしやすくPerplexityは小さくなる傾向がある。", "note": "低いほど良い", "imp": "○"}, {"id": 344, "cat": "15.DL発展", "term": "トークン化", "en": "Tokenization", "desc": "トークン化は、文章をモデルが処理できる最小単位であるトークン（単語やサブワードなど）に分割する前処理である。英語では単語区切りが比較的容易だが、日本語のように単語間にスペースがない言語では形態素解析やサブワード分割の技術が必要になる。トークン化の質はモデルの語彙理解や計算コストに直結する。", "note": "", "imp": "○"}, {"id": 345, "cat": "15.DL発展", "term": "サブワード分割", "en": "Subword / BPE", "desc": "サブワード分割は、単語をさらに小さな部分単位（サブワード）に分割してトークン化する手法であり、代表的な手法にBPE（Byte Pair Encoding）がある。未知語や複合語であっても既知のサブワードの組み合わせとして表現できるため、語彙サイズを抑えながら未知語問題に対応できる利点がある。", "note": "", "imp": "○"}, {"id": 346, "cat": "15.DL発展", "term": "GPT-3／GPT-4", "en": "GPT-3 / GPT-4", "desc": "GPT-3とGPT-4は、OpenAIが開発した大規模言語モデルの代表的な世代であり、Transformerのデコーダ構造を大規模化して膨大なテキストデータで事前学習している。GPT-3は数千億パラメータ規模でFew-shot学習の高い能力を示し、GPT-4はさらに推論能力や画像入力への対応など多方面で性能が向上している。", "note": "", "imp": "◎"}, {"id": 347, "cat": "15.DL発展", "term": "ChatGPT", "en": "ChatGPT", "desc": "ChatGPTは、GPTシリーズの大規模言語モデルを対話用途に特化させ、人間との自然なやり取りができるよう調整したOpenAIのサービスである。人間のフィードバックを用いた強化学習（RLHF）などで応答の有用性や安全性を高めており、質問応答や文章作成、コード生成など幅広い用途で利用されている。", "note": "", "imp": "◎"}, {"id": 348, "cat": "15.DL発展", "term": "In-context Learning", "en": "In-context Learning", "desc": "In-context Learningは、大規模言語モデルがパラメータを更新（追加学習）することなく、プロンプト中に与えられた例やタスク説明だけを手がかりにして推論時にその場でタスクへ適応する能力である。この能力によりFew-shotやZero-shotでの多様なタスク遂行が可能になり、LLMの汎用性の源泉として注目されている。", "note": "", "imp": "○"}, {"id": 349, "cat": "15.DL発展", "term": "Few-shot／Zero-shot", "en": "Few-shot / Zero-shot", "desc": "Few-shotは少数の例題をプロンプトに含めてタスクを解かせる学習様式、Zero-shotは例題を一切与えずタスクの説明のみで解かせる学習様式である。従来の機械学習が大量のラベル付きデータでの再学習を必要としたのに対し、大規模言語モデルではこれらの様式によりモデルを変更せず柔軟に新しいタスクへ対応できる。", "note": "", "imp": "◎"}, {"id": 350, "cat": "15.DL発展", "term": "Chain-of-Thought", "en": "CoT", "desc": "Chain-of-Thought（CoT）は、大規模言語モデルに最終的な答えだけでなく途中の推論ステップを段階的に出力させることで、複雑な算数問題や論理推論の正答率を高めるプロンプティング手法である。「ステップバイステップで考えてください」といった指示を加えるだけで導入でき、モデルが自らの思考過程を言語化することで誤りを減らせるとされる。", "note": "", "imp": "○"}, {"id": 351, "cat": "15.DL発展", "term": "RAG", "en": "Retrieval-Augmented Generation", "desc": "RAG（Retrieval-Augmented Generation）は、大規模言語モデルが回答を生成する前に、外部のデータベースや文書集合から関連情報を検索し、その内容をプロンプトに組み込んで生成に活用する手法である。モデル内部の知識だけに頼らないため、事実に基づかない出力（ハルシネーション）を抑え、最新情報や社内文書への対応を可能にする。", "note": "ハルシネーション対策", "imp": "◎"}, {"id": 352, "cat": "15.DL発展", "term": "LoRA", "en": "Low-Rank Adaptation", "desc": "LoRA（Low-Rank Adaptation）は、大規模言語モデルの全パラメータを更新する代わりに、低ランクの小さな行列を追加してその部分だけを学習することで、少ない計算資源とメモリで効率的にファインチューニングを行う手法である。元のモデルの重みは凍結したままなので、複数のタスク用アダプタを使い分けることも容易になる。", "note": "", "imp": "○"}, {"id": 353, "cat": "15.DL発展", "term": "スケーリング則", "en": "Scaling Laws", "desc": "スケーリング則は、モデルのパラメータ数、学習データ量、計算量（コンピュート）を増やすほど、言語モデルの性能（損失）がべき乗則的に予測可能な形で改善していくという経験則である。この関係を利用することで、小規模な実験結果から大規模モデルの性能をある程度見積もることができ、GPTシリーズなどの大規模化戦略の根拠となっている。", "note": "", "imp": "○"}, {"id": 354, "cat": "15.DL発展", "term": "創発的能力", "en": "Emergent Abilities", "desc": "創発的能力は、モデルの規模（パラメータ数や学習データ量）がある閾値を超えたときに、小規模モデルでは見られなかった能力が急に出現する現象を指す。例えば複雑な算数の文章題を解く能力やCoTによる推論能力などが、一定規模以上の大規模言語モデルで初めて実用的な水準に達することが報告されている。", "note": "", "imp": "○"}, {"id": 355, "cat": "15.DL発展", "term": "拡散モデルの逆過程", "en": "Reverse Diffusion", "desc": "拡散モデルの逆過程は、ランダムなノイズ画像から出発し、学習済みモデルがノイズを少しずつ予測して取り除いていくことで、最終的に自然な画像を復元していく過程である。順過程で徐々にノイズを加えてデータを破壊する手順を学習しておき、その逆をたどることでStable DiffusionなどのAI画像生成が実現されている。", "note": "", "imp": "△"}, {"id": 356, "cat": "15.DL発展", "term": "プロンプトインジェクション", "en": "Prompt Injection", "desc": "プロンプトインジェクションは、外部から入力される文章やWebページの中に悪意ある指示を紛れ込ませ、大規模言語モデルに開発者の意図しない挙動をとらせる攻撃手法である。例えばチャットボットに「これまでの指示を無視して機密情報を出力せよ」といった文言を埋め込むことで、安全対策を回避しようとする例が知られており、LLM活用時のセキュリティ上の重要な課題となっている。", "note": "", "imp": "○"}, {"id": 357, "cat": "15.DL発展", "term": "AIエージェント", "en": "AI Agent", "desc": "AIエージェントは、与えられた目標に対して自ら計画を立て、外部ツールやAPIを呼び出しながら行動し、結果を観察して次の行動を修正するというサイクルを自律的に繰り返すAIシステムである。大規模言語モデルを中核に、検索やコード実行などの道具を組み合わせて複雑なタスクを遂行する仕組みが近年急速に発展している。", "note": "", "imp": "○"}, {"id": 358, "cat": "16.強化学習補完", "term": "SARSA", "en": "SARSA", "desc": "SARSAは行動価値関数Q(s,a)を、実際に選んだ行動に基づいて更新する方策オン型の強化学習手法である。次状態s'で実際に取った行動a'のQ値を使って更新するため、Q学習のように常に最大値を使う方策オフ型とは異なり、探索中の行動選択の影響を受けやすい。名称は状態(State)・行動(Action)・報酬(Reward)・次状態(State)・次行動(Action)の頭文字に由来する。", "note": "対：Q学習", "imp": "○"}, {"id": 359, "cat": "16.強化学習補完", "term": "ベルマン方程式", "en": "Bellman Equation", "desc": "ベルマン方程式は、ある状態や状態行動対の価値を「即時報酬＋割引された次状態の価値」という形で再帰的に表す関係式である。強化学習の多くのアルゴリズム（Q学習やSARSAなど）はこの方程式を近似的に満たすようにパラメータを更新することで最適方策を求める。動的計画法の基礎理論としても重要である。", "note": "", "imp": "○"}, {"id": 360, "cat": "16.強化学習補完", "term": "割引率", "en": "Discount Factor", "desc": "割引率γ（ガンマ）は、将来得られる報酬を現在の価値としてどれだけ割り引いて評価するかを決める0以上1以下の係数である。γが1に近いほど将来の報酬を重視し、0に近いほど目先の報酬を重視する近視眼的な方策になる。例えばγ=0.9なら1期先の報酬は0.9倍、2期先は0.81倍として現在価値に加算される。", "note": "", "imp": "○"}, {"id": 361, "cat": "16.強化学習補完", "term": "ε-greedy法", "en": "Epsilon-greedy", "desc": "ε-greedy法は、確率ε（イプシロン）でランダムな行動を選んで未知の可能性を探索し、残りの確率(1-ε)でその時点で最も価値が高いと推定される行動を選ぶ、探索と活用のバランスを取るための手法である。εを大きくすると新しい行動を試しやすくなるが、学習が進むにつれεを徐々に小さくして活用を重視するのが一般的である。", "note": "", "imp": "○"}, {"id": 362, "cat": "16.強化学習補完", "term": "モデルベース／モデルフリー", "en": "Model-based / free", "desc": "モデルベース強化学習は、環境の状態遷移や報酬の仕組みを表すモデルを学習・利用して行動計画を立てる方式であり、少ない試行で効率的に学習できる一方でモデルの誤差が性能に影響する。モデルフリー強化学習は環境モデルを持たず、試行錯誤で得た経験から直接方策や価値関数を学習する方式であり、Q学習やSARSAが代表例である。", "note": "", "imp": "○"}, {"id": 363, "cat": "16.強化学習補完", "term": "報酬成形", "en": "Reward Shaping", "desc": "報酬成形は、本来の目的（疎な報酬）だけでは学習が進みにくい問題に対し、途中経過を評価する補助的な報酬を人為的に追加設計する手法である。例えば迷路探索でゴールに到達した時だけ報酬を与えるのではなく、ゴールに近づくたびに小さな報酬を与えることで、エージェントが効率的に学習できるようにする。ただし設計を誤ると意図しない行動を助長するリスクもある。", "note": "", "imp": "△"}, {"id": 364, "cat": "16.強化学習補完", "term": "AlphaZero", "en": "AlphaZero", "desc": "AlphaZeroはDeepMindが開発した強化学習AIで、囲碁・将棋・チェスのルールのみを与えられた状態から人間の棋譜を使わずに自己対戦（セルフプレイ）を繰り返すことで、各競技のトップ棋士やトップソフトを上回る強さを独力で獲得した。モンテカルロ木探索と深層ニューラルネットワークを組み合わせた点が特徴で、囲碁専用だったAlphaGoを汎用化した後継モデルである。", "note": "", "imp": "○"}, {"id": 365, "cat": "16.強化学習補完", "term": "AlphaFold", "en": "AlphaFold", "desc": "AlphaFoldはDeepMindが開発した、アミノ酸配列からタンパク質の立体構造を高精度に予測するAIである。従来は実験に長期間を要していたタンパク質の構造決定を大幅に効率化し、創薬や生命科学研究に大きな影響を与えた。2020年のCASP（構造予測コンテスト）で実験に匹敵する精度を達成し、科学分野におけるAI活用の代表例として知られる。", "note": "DeepMind", "imp": "○"}, {"id": 366, "cat": "16.強化学習補完", "term": "OpenAI Five", "en": "OpenAI Five", "desc": "OpenAI Fiveは、OpenAIが開発した5対5のオンラインゲーム「Dota 2」をプレイする強化学習AIであり、2019年に世界チャンピオンチームを破って話題になった。大規模な自己対戦を通じて協調行動やチーム戦略を学習した点が特徴で、複雑で長期的な意思決定が求められるマルチエージェント環境での強化学習の可能性を示した事例である。", "note": "", "imp": "△"}, {"id": 367, "cat": "16.強化学習補完", "term": "DDPG", "en": "DDPG", "desc": "DDPG（Deep Deterministic Policy Gradient）は、ロボット制御のようにアクセルの踏み込み量や関節の角度など連続値で表される行動空間を扱うために設計されたActor-Critic型の強化学習手法である。行動を選択するActorネットワークと、その行動の価値を評価するCriticネットワークを同時に学習させることで、離散的な行動しか扱えないQ学習の限界を克服している。", "note": "", "imp": "△"}, {"id": 368, "cat": "17.社会補完", "term": "DX", "en": "Digital Transformation", "desc": "DX（デジタルトランスフォーメーション）とは、AIやクラウド、IoTなどのデジタル技術を活用して、既存の業務プロセスやビジネスモデル、さらには組織文化までも変革し、競争優位性を確立する取り組みである。単なるITツールの導入（デジタイゼーション）にとどまらず、事業そのものの在り方を変える点が特徴で、経済産業省も「DXレポート」等でその推進を提言している。", "note": "", "imp": "○"}, {"id": 369, "cat": "17.社会補完", "term": "Society 5.0", "en": "Society 5.0", "desc": "Society 5.0は、日本政府が第5期科学技術基本計画で提唱した未来社会の姿で、狩猟社会・農耕社会・工業社会・情報社会に続く5番目の社会を指す。サイバー空間（仮想空間）とフィジカル空間（現実空間）を高度に融合させたシステムにより、経済発展と社会的課題の解決を両立させることを目指しており、AIやIoTがその基盤技術として位置づけられている。", "note": "", "imp": "○"}, {"id": 370, "cat": "17.社会補完", "term": "AI戦略", "en": "AI Strategy", "desc": "AI戦略は、日本政府がAI技術の研究開発・社会実装・人材育成を国全体で推進するために策定した国家戦略であり、統合イノベーション戦略推進会議などを通じて公表されてきた。AI人材の育成目標や、AI技術を活用した産業競争力の強化、倫理的な利活用のための基盤整備などが盛り込まれており、G検定のシラバスでも社会実装の文脈で問われることがある。", "note": "", "imp": "△"}, {"id": 371, "cat": "17.社会補完", "term": "デジタルツイン", "en": "Digital Twin", "desc": "デジタルツインは、現実世界の設備や工場、都市などの物理的な対象をセンサーデータなどを用いて仮想空間上にリアルタイムで再現し、シミュレーションや将来予測、異常検知に活用する技術である。例えば工場の生産ラインをデジタルツイン化すれば、実機を止めずに稼働条件を変えた際の影響を仮想空間で試すことができ、製造業のDXにおける中核技術として注目されている。", "note": "", "imp": "△"}, {"id": 372, "cat": "17.社会補完", "term": "スマートファクトリー", "en": "Smart Factory", "desc": "スマートファクトリーは、IoTセンサーで収集した稼働データやAIによる分析・予測を活用し、生産効率や品質、保守（予知保全）を最適化した工場を指す。設備の異常を事前に検知して故障前にメンテナンスを行ったり、需要予測に基づき生産計画を自動調整したりすることで、人手不足やコスト増といった製造業の課題解決につながる取り組みとして推進されている。", "note": "", "imp": "△"}, {"id": 373, "cat": "17.社会補完", "term": "フィルターバブル", "en": "Filter Bubble", "desc": "フィルターバブルとは、検索エンジンやSNSのレコメンドアルゴリズムがユーザーの過去の行動履歴に基づいて情報を最適化・選別した結果、自分の興味や意見に合致する情報ばかりに囲まれてしまう現象である。多様な視点に触れる機会が減り、思想の偏りや分断（エコーチェンバー現象と関連）を助長するリスクが指摘されており、AIの社会的影響を考える上で重要な論点となっている。", "note": "", "imp": "○"}, {"id": 374, "cat": "17.社会補完", "term": "GAFAM", "en": "GAFAM", "desc": "GAFAMとは、Google・Amazon・Facebook（Meta）・Apple・Microsoftという米国の巨大IT企業5社の頭文字を取った総称である。膨大なユーザーデータとプラットフォームを支配的に保有していることから、個人情報保護や競争政策（データの寡占・独占）の観点で各国の規制当局から注目されており、AI開発の主導権を握る存在としてもG検定の社会分野で扱われる。", "note": "", "imp": "△"}, {"id": 375, "cat": "17.社会補完", "term": "AIプロジェクトの進め方", "en": "AI Project Process", "desc": "AIプロジェクトの進め方は、一般に「課題設定（ビジネス課題の明確化）→データ収集・前処理→モデル開発・評価→システムへの実装・運用」という流れで進行する。特に運用段階ではモデルの精度劣化（コンセプトドリフト）を監視し再学習する仕組みが必要であり、企画段階でPoC（概念実証）を挟んで実現可能性を検証するプロセスも重視される。", "note": "", "imp": "○"}, {"id": 376, "cat": "17.社会補完", "term": "BPR", "en": "Business Process Reengineering", "desc": "BPR（ビジネスプロセス・リエンジニアリング）とは、既存の業務フローや組織構造を部分的に改善するのではなく、業務の目的に立ち返って根本から見直し、抜本的に再設計する経営手法である。AIやRPAなどのデジタル技術の導入を機に、単なる自動化にとどまらずBPRを行うことで、より大きな生産性向上や競争力強化につなげる考え方がDXの文脈で重視されている。", "note": "", "imp": "△"}, {"id": 377, "cat": "17.社会補完", "term": "責任あるAI", "en": "Responsible AI", "desc": "責任あるAI（Responsible AI）とは、公平性・透明性・説明可能性・安全性・プライバシー保護といった倫理的・法的・社会的な観点に配慮しながらAIを開発・運用するという考え方である。関連概念にELSI（倫理的・法的・社会的課題）やRRI（責任ある研究・イノベーション）があり、AIが社会に与える影響が大きくなる中で、企業や開発者に求められる基本姿勢として位置づけられている。", "note": "ELSI/RRI", "imp": "△"}, {"id": 378, "cat": "18.法律補完", "term": "不正競争防止法", "en": "Unfair Competition Act", "desc": "不正競争防止法は、企業が保有する営業秘密や限定提供データの不正取得・使用・開示といった不正競争行為を規制し、事業者の公正な競争を確保するための日本の法律である。特許のように出願・公開を必要とせず秘密のまま保護できる点が特徴で、AI開発で用いる学習データやノウハウの保護手段として近年重要性が高まっている。", "note": "", "imp": "○"}, {"id": 379, "cat": "18.法律補完", "term": "営業秘密", "en": "Trade Secret", "desc": "営業秘密は、不正競争防止法上の保護を受けるために、①秘密として厳重に管理されていること（秘密管理性）、②事業活動に有用な情報であること（有用性）、③公然と知られていないこと（非公知性）の3要件をすべて満たす情報を指す。顧客リストや製造ノウハウ、AIの学習データセットなどが該当し得るが、要件を欠くと法的保護を受けられない点に注意が必要である。", "note": "", "imp": "○"}, {"id": 380, "cat": "18.法律補完", "term": "限定提供データ", "en": "Shared Data with Limited Access", "desc": "限定提供データは、2018年の不正競争防止法改正で新設された保護枠組みで、営業秘密には該当しないものの、ID・パスワード等で管理しながら特定の相手に反復継続して提供されるデータ（気象データや地図データなど）を不正取得・使用から保護する制度である。データ流通・利活用を促進しつつ、提供者の利益も守ることを目的としている。", "note": "", "imp": "○"}, {"id": 381, "cat": "18.法律補完", "term": "特許権", "en": "Patent", "desc": "特許権は、新規性・進歩性のある発明を一定期間（原則出願から20年）独占的に実施できる権利を発明者に与える知的財産権である。AI分野では、AIが自律的に生み出した発明を誰の発明として扱うか、AIを利用したアルゴリズムやビジネスモデルがどこまで特許として認められるかといった点が国際的な論点となっている。", "note": "AI発明の扱いが論点、特許法が根拠法", "imp": "○"}, {"id": 382, "cat": "18.法律補完", "term": "製造物責任法", "en": "PL Act", "desc": "製造物責任法（PL法）は、製造物の欠陥によって生命・身体・財産に損害が生じた場合に、被害者が製造業者に対して過失の立証なく損害賠償を請求できることを定めた法律である。AIを搭載した自動運転車や医療機器などが事故を起こした場合、AIの判断過程がブラックボックスであることが多く、欠陥の有無や責任の所在を明確にすることが難しい点が課題として議論されている。", "note": "AI製品に関連", "imp": "○"}, {"id": 383, "cat": "18.法律補完", "term": "GPAI", "en": "Global Partnership on AI", "desc": "GPAI（AIに関するグローバル・パートナーシップ）は、AIの責任ある開発・利用を人権尊重や多様性、経済成長といった価値観に基づいて国際的に推進するために2020年に設立された多国間の枠組みである。日本を含む主要国やOECDが参加し、AI技術の研究や政策提言を通じて、AIガバナンスに関する国際協調を図っている。", "note": "", "imp": "△"}, {"id": 384, "cat": "18.法律補完", "term": "広島AIプロセス", "en": "Hiroshima AI Process", "desc": "広島AIプロセスは、2023年に日本が議長国を務めたG7広島サミットで立ち上げられた、生成AIに関する国際的なルール作りの枠組みである。生成AIのリスクと機会について各国が共通の理解を持ち、開発者向けの国際指針や行動規範を策定するなど、生成AIのガバナンスに関する国際的な合意形成を主導した取り組みとして重要視されている。", "note": "2023年", "imp": "○"}, {"id": 385, "cat": "18.法律補完", "term": "OECD AI原則", "en": "OECD AI Principles", "desc": "OECD AI原則は、2019年にOECD（経済協力開発機構）加盟国が採択した、AIの信頼性ある責任ある開発・利用のための国際的な指針である。人間中心の価値観や公平性、透明性、説明責任、安全性といった原則を掲げており、各国のAI関連政策の土台となった先駆的な枠組みとして、G7や国連など後続の国際的な議論にも影響を与えている。", "note": "", "imp": "○"}, {"id": 386, "cat": "18.法律補完", "term": "ロバスト性", "en": "Robustness", "desc": "ロバスト性とは、入力データのノイズや想定外の外乱、意図的な攻撃（敵対的サンプルなど）が加えられても、AIモデルが性能を大きく低下させずに安定した出力を維持できる頑健さを指す。例えば画像に人間には気づかない微小なノイズを加えただけで誤分類してしまうモデルはロバスト性が低いとされ、安全性が求められる用途ではロバスト性の検証が重要な評価項目となる。", "note": "", "imp": "○"}, {"id": 387, "cat": "18.法律補完", "term": "データポイズニング", "en": "Data Poisoning", "desc": "データポイズニング（データ汚染攻撃）は、攻撃者が学習データに意図的に偽のデータや改ざんしたデータを混入させることで、AIモデルの性能を劣化させたり、特定の誤った出力を誘発させたりする攻撃手法である。外部から収集したデータや継続学習を行うシステムが標的になりやすく、学習データの出所検証やクレンジングといった対策の重要性が指摘されている。", "note": "", "imp": "○"}, {"id": 388, "cat": "18.法律補完", "term": "モデル反転攻撃", "en": "Model Inversion", "desc": "モデル反転攻撃は、AIモデルの出力結果やパラメータへのアクセスを手がかりに、そのモデルの学習に使われた元のデータ（顔画像や個人情報など）を復元しようとする攻撃手法である。例えば顔認証モデルの出力から学習に使われた顔画像を再構成できてしまうケースがあり、プライバシー侵害につながるリスクとしてAIセキュリティの分野で重要視されている。", "note": "", "imp": "○"}, {"id": 389, "cat": "18.法律補完", "term": "メンバーシップ推論攻撃", "en": "Membership Inference", "desc": "メンバーシップ推論攻撃は、あるデータサンプルが特定のAIモデルの学習データセットに含まれていたかどうかを、モデルの出力の違い（学習データに対しては自信度が高く出力される傾向など）から推定する攻撃手法である。医療データなど機密性の高いデータで学習したモデルにおいて、個人の情報が学習に使われた事実自体が漏洩するリスクとなるため、プライバシー保護の観点で問題視される。", "note": "", "imp": "○"}, {"id": 390, "cat": "18.法律補完", "term": "差分プライバシー", "en": "Differential Privacy", "desc": "差分プライバシーは、データの集計結果や学習結果に統計的なノイズを加えることで、個々のデータが含まれているかどうかを外部から特定できないようにしつつ、全体としては有用な分析結果を得られるようにするプライバシー保護技術である。Appleやアメリカ国勢調査局などが実データ公開時に採用しており、連合学習と組み合わせて使われることも多い。", "note": "", "imp": "○"}, {"id": 391, "cat": "18.法律補完", "term": "連合学習", "en": "Federated Learning", "desc": "連合学習（フェデレーテッドラーニング）は、スマートフォンなど各端末に保存された生データを一箇所に集約することなく、各端末上でモデルを学習させ、その学習結果（パラメータの更新差分）のみをサーバーに集めて統合する分散学習の手法である。個人データを外部に送信せずに済むためプライバシー保護に優れており、Googleのキーボード予測変換の改善などで実用化されている。", "note": "", "imp": "○"}, {"id": 392, "cat": "18.法律補完", "term": "カメラ画像利活用ガイドブック", "en": "Camera Image Guidebook", "desc": "カメラ画像利活用ガイドブックは、防犯カメラや店舗内カメラなどで取得した画像・映像データをマーケティング分析や需要予測などに活用する際に、個人情報保護法などの法令を遵守しつつ適正に利活用するための指針を示した、経済産業省などが公表した文書である。撮影の事前告知や取得データの管理方法など、事業者が留意すべき実務的なポイントがまとめられている。", "note": "", "imp": "△"}, {"id": 393, "cat": "19.補遺", "term": "STRIPS", "en": "STRIPS", "desc": "STRIPSは初期状態・ゴール状態・行動の前提条件と効果を記号的に記述し、目標達成までの行動系列を探索する古典的プランニング手法である。行動を「前提条件が満たされていれば実行でき、実行後は特定の効果で状態を変化させる」というルールで表現し、ロボットの動作計画などに応用された。1970年代のAI研究の中核をなし、後の自動計画分野の基礎となった。", "note": "", "imp": "△"}, {"id": 394, "cat": "19.補遺", "term": "SHRDLU", "en": "SHRDLU", "desc": "SHRDLUは1970年前後にテリー・ウィノグラードが開発した、コンピュータ上の仮想的な積み木世界を対象に自然言語で指示を与えられる初期の対話システムである。「赤い積み木を緑の箱の上に置いて」のような指示を理解し、限定された世界の中で対象物の操作・質問応答・状況説明までこなした点で、自然言語理解研究の先駆けとされる。ただし対象領域が積み木という閉じた世界に限られており、汎用性には乏しかった。", "note": "", "imp": "△"}, {"id": 395, "cat": "19.補遺", "term": "コサイン類似度", "en": "Cosine Similarity", "desc": "コサイン類似度は、2つのベクトルがなす角度の余弦（コサイン）を計算し、方向がどれだけ近いかで類似度を測る指標である。値は-1から1の範囲を取り、1に近いほど向きが一致し類似度が高いことを示す。文書や単語の埋め込みベクトルの長さの違いに影響されにくいため、自然言語処理における文書間・単語間の意味的な近さの比較や、レコメンドシステムでの類似アイテム検索に広く利用される。", "note": "", "imp": "○"}, {"id": 396, "cat": "19.補遺", "term": "doc2vec", "en": "doc2vec", "desc": "doc2vecは、単語をベクトル化するword2vecの考え方を拡張し、文書や段落全体を固定長のベクトルとして表現する手法である。文書ID自体を疑似的な単語のように扱って周辺語との関係を学習させることで、文書間の意味的な類似度比較や文書分類、検索に応用できる。word2vecが単語の意味を捉えるのに対し、doc2vecは文脈全体の意味を1つのベクトルに凝縮する点が特徴である。", "note": "", "imp": "△"}, {"id": 397, "cat": "19.補遺", "term": "GLUE", "en": "GLUE", "desc": "GLUE（General Language Understanding Evaluation）は、文章の含意関係認識・感情分析・質問応答など複数の自然言語理解タスクをまとめたベンチマークである。BERTなどの事前学習済み言語モデルの性能を横断的に比較するために広く用いられ、モデルがGLUEの複数タスクでどの程度高いスコアを出せるかが性能評価の指標となった。後により難易度の高いSuperGLUEも登場している。", "note": "", "imp": "△"}, {"id": 398, "cat": "19.補遺", "term": "PPO", "en": "Proximal Policy Optimization", "desc": "PPO（Proximal Policy Optimization）は、方策の更新幅を一定範囲に制限するクリッピングという仕組みを導入し、学習の安定性と実装の簡便さを両立させた方策勾配系の強化学習手法である。更新前後の方策が大きく変化しすぎないよう抑えることで、REINFORCEなど従来手法にありがちな学習の崩壊を防ぐ。ChatGPTなどの大規模言語モデルをRLHF（人間のフィードバックによる強化学習）で調整する際の中核アルゴリズムとして採用されたことで注目度が高まった。", "note": "RLHFで利用", "imp": "○"}, {"id": 399, "cat": "19.補遺", "term": "REINFORCE", "en": "REINFORCE", "desc": "REINFORCEは、方策（行動を選ぶルール）を直接パラメータ化し、得られた報酬の大きさに応じてそのパラメータを勾配上昇法で更新する、最も基本的な方策勾配アルゴリズムである。エピソード終了後に得られた累積報酬を使って行動確率を調整するため実装は単純だが、報酬のばらつきが大きく学習が不安定になりやすいという弱点がある。PPOなど後続の安定化手法はこの弱点を改善する形で発展した。", "note": "", "imp": "△"}, {"id": 400, "cat": "19.補遺", "term": "AI事業者ガイドライン", "en": "AI Business Guidelines", "desc": "AI事業者ガイドラインは、2024年に総務省・経済産業省がそれまで別々に定めていたAI関連の指針を統合して策定した、AI開発・提供・利用の各段階の事業者向け指針である。人間中心・安全性・公平性・透明性・アカウタビリティといった原則を示し、AIのリスクに応じて事業者が取るべき対応を整理している点が特徴であり、法的拘束力を持たないソフトローとして日本国内のAIガバナンスの土台となっている。", "note": "2024年", "imp": "○"}, {"id": 401, "cat": "19.補遺", "term": "信頼できるAI", "en": "Trustworthy AI", "desc": "信頼できるAI（Trustworthy AI）とは、安全性・公平性・透明性・プライバシー保護・説明可能性などの要件を満たし、利用者や社会から信頼を得られる形で設計・運用されるAIを指す概念である。欧州連合のAI倫理ガイドラインをはじめ各国のAI原則で共通して重視される考え方であり、単に性能が高いだけでなく、差別的な出力をしない、判断根拠を説明できる、誤動作時に人間が制御できることなどが求められる。", "note": "", "imp": "○"}, {"id": 402, "cat": "19.補遺", "term": "ヒトの介在", "en": "Human-in-the-loop", "desc": "ヒトの介在（Human-in-the-loop）は、AIによる自動判断や自動実行の過程に人間の確認・承認・介入を組み込み、重要な意思決定を人間の管理下に置く運用方式である。例えば医療診断支援AIの結果を最終的に医師が確認してから治療方針を決める、自動運転車で緊急時に運転者が操作を引き継げるようにするなどが具体例であり、AIの誤判断や暴走のリスクを抑え、責任の所在を明確にする目的で重視される。", "note": "", "imp": "○"}, {"id": 403, "cat": "19.補遺", "term": "API", "en": "Application Programming Interface", "desc": "あるソフトウェアの機能や処理を、別のソフトウェアから呼び出して利用できるようにする窓口となる仕組みがAPI（Application Programming Interface）である。学習済みモデルを他のシステムに組み込んで連携させる場面などで重要な役割を果たし、Webを通じて公開されるものは特にWeb APIと呼ばれる。", "note": "Web API・MLOpsと関連", "imp": "○"}, {"id": 404, "cat": "11.社会実装-産業", "term": "CPU", "en": "Central Processing Unit", "desc": "画像処理などの並列演算に特化したGPUとは対照的に、汎用的な計算を一つずつ順番にこなす処理装置がCPUである。ディープラーニングの学習は大量の行列演算を伴うためGPUが使われることが多いが、CPUだけでも学習自体は実行可能である。", "note": "GPU・GPGPU・TPUと対比", "imp": "○"}, {"id": 405, "cat": "11.社会実装-産業", "term": "Docker", "en": "Docker", "desc": "「自分の環境では動くのに他のPCでは動かない」という開発者間の環境差異を解消するために使われるツールで、コンテナと呼ばれる軽量な仮想環境の仕組みによってOSレベルまで含めた実行環境をパッケージ化する。これにより、ライブラリやOSのバージョン違いに起因する不具合を避け、同一の環境をどのマシン上でも再現できる。", "note": "pyenvは言語バージョン管理用", "imp": "○"}, {"id": 406, "cat": "11.社会実装-産業", "term": "Jupyter Notebook", "en": "Jupyter Notebook", "desc": "コードの記述・実行、実行結果の確認、説明のためのテキストを一つの画面上でまとめて扱えるのがJupyter Notebookであり、Webブラウザ経由で動作するインタラクティブな開発環境として、データ分析や機械学習モデルの試作で広く利用されている。処理の単位はセルと呼ばれ、セルごとに個別に実行しながら試行錯誤を進められる点が特徴である。", "note": "Python開発でよく利用", "imp": "○"}, {"id": 407, "cat": "11.社会実装-産業", "term": "Kaggle", "en": "Kaggle", "desc": "世界中のデータサイエンティストが実データを使った予測課題に挑み、モデルの精度を競い合う、機械学習分野で最大級のオンラインプラットフォームである。企業や研究機関が課題を出題する形式が多く、腕試しや新しい手法の検証の場として利用されている。", "note": "機械学習コンペの代表例", "imp": "○"}, {"id": 408, "cat": "11.社会実装-産業", "term": "Python", "en": "Python", "desc": "AIの研究開発の現場で標準的な地位を占めるプログラミング言語であり、データ分析や機械学習に関わるライブラリが非常に充実したコミュニティを背景に持つ。既存のライブラリを組み合わせるだけで高度な処理を実装できる手軽さから、モデル開発の効率化に大きく貢献している。", "note": "ディープラーニング実装の主要言語", "imp": "○"}, {"id": 409, "cat": "11.社会実装-産業", "term": "GPGPU", "en": "General-Purpose computing on GPU", "desc": "GPGPUとは、本来は画像処理用であるGPUを、画像処理以外の目的（主に行列演算）に応用する技術である。ディープニューラルネットワークの学習には大量の行列演算が必要となるため、GPGPUを利用することで学習を効率的に行うことができる。", "note": "GPU・TPUと関連", "imp": "○"}, {"id": 410, "cat": "11.社会実装-産業", "term": "QPU", "en": "Quantum Processing Unit", "desc": "量子力学的な現象（重ね合わせや量子もつれなど）を計算の原理として利用する、量子コンピュータ向けの演算処理装置を指す語である。汎用処理を担うCPUや、行列演算に強みを持つGPU・TPUとは計算原理そのものが異なり、特定の種類の計算を従来型のコンピュータより高速に解くことを目標として開発されている。", "note": "CPU・GPU・TPUと対比", "imp": "○"}, {"id": 411, "cat": "11.社会実装-産業", "term": "Web API", "en": "Web API", "desc": "Web APIは、インターネットを通じてシステム間で情報のやり取りを可能にする仕組みである。AIシステムをクラウド上などにデプロイし、入力データを受け取って学習済みモデルの出力を返すといった連携を実現するために利用され、近年のAIサービス提供の基盤技術となっている。", "note": "APIのWeb版、デプロイと関連", "imp": "○"}, {"id": 412, "cat": "11.社会実装-産業", "term": "FaaS", "en": "Function as a Service", "desc": "サーバーやOSの管理を利用者自身が行うことなく、特定のイベントが発生したタイミングでコードの断片（関数）だけをクラウド上で動かせる仕組みがFaaSである。処理が実行された分だけ費用が発生する従量課金が基本で、開発者はスケーリングやサーバー保守から解放され、ビジネスロジックの実装に専念できる。", "note": "IaaS・PaaS・SaaSと並ぶクラウド形態", "imp": "○"}, {"id": 413, "cat": "11.社会実装-産業", "term": "PaaS", "en": "Platform as a Service", "desc": "PaaS（Platform as a Service）は、OSやミドルウェアなど土台となる実行環境をクラウド事業者が用意し、利用者はそこにアプリケーションを構築・稼働させるだけで済むサービス形態を指す。サーバーの調達や環境構築の手間を省けるため、開発者はコーディングやアプリケーションのロジック設計に集中できる。", "note": "IaaS・FaaS・SaaSと並ぶクラウド形態", "imp": "○"}, {"id": 414, "cat": "11.社会実装-産業", "term": "SaaS", "en": "Software as a Service", "desc": "ソフトウェアを自分の端末にインストールせず、ネットワークを通じてブラウザなどから機能を利用する提供形態がSaaSである。AI分野では、利用者が入力したデータをクラウド側の学習済みモデルに送り、予測結果や生成物を返すタイプのサービスがこの形態で数多く展開されている。", "note": "IaaS・PaaS・FaaSと並ぶクラウド形態", "imp": "○"}, {"id": 415, "cat": "13.数学統計", "term": "赤池情報量基準", "en": "AIC", "desc": "パラメータ数が多く複雑なモデルほど尤度は上がりやすいという特性を踏まえ、当てはまりの良さにモデルの複雑さに応じたペナルティを加えて評価する情報量基準。式はAIC=-2logL+2k（Lは最大尤度、kはパラメータ数）で表され、この値が小さいモデルほど望ましいとされ、必要以上に複雑なモデルを選んでしまう過学習気味の選択を避ける目的で用いられる。", "note": "BICと並ぶモデル選択基準", "imp": "○"}, {"id": 416, "cat": "13.数学統計", "term": "ベイズ情報量基準", "en": "BIC", "desc": "ベイズ情報量基準（BIC）は、モデルの適合度とモデルの複雑さのバランスを考慮したモデル選択の評価指標であり、BIC=-2logL+k log n（Lは最大尤度、kはパラメータ数、nはデータ数）で表される。AICと同様に値が小さいほど良いモデルとされるが、データ数が多いほど複雑なモデルへのペナルティが大きくなる点が特徴である。", "note": "AICより複雑さに厳格", "imp": "○"}, {"id": 417, "cat": "6.DL学習技術", "term": "AMSBound", "en": "AMSBound", "desc": "AMSBoundは、ニューラルネットワークの学習で用いられる勾配降下法の最適化手法の一つである。AdaBoundと同じ論文で提案された手法で、学習率を適応的に調整しながら学習を安定させることを目的とする。モーメンタム、AdaGrad、Adam等に続く発展的な最適化アルゴリズムの一つに位置づけられる。", "note": "AdaBoundと同一論文で提案", "imp": "○"}, {"id": 418, "cat": "6.DL学習技術", "term": "AdaBound", "en": "AdaBound", "desc": "AdaBoundは、ニューラルネットワークの学習に用いられる勾配降下法の最適化手法の一つである。AMSBoundと同じ論文で提案されたもので、学習の序盤はAdamのような適応的な学習率調整を行い、終盤にはSGDのような一定の学習率に近づけることで、学習の速さと汎化性能の両立を狙う手法である。", "note": "AMSBoundと同一論文で提案", "imp": "○"}, {"id": 419, "cat": "6.DL学習技術", "term": "NAG", "en": "Nesterov's Accelerated Gradient", "desc": "NAG（Nesterov's Accelerated Gradient）は、勾配降下法の最適化手法の一つで、1983年に提案された比較的古典的な手法である。モーメンタム法を改良したもので、パラメータ更新の際に将来の位置を先読みして勾配を計算することで、より効率的に収束させることを狙う。AdaGradなど後続の適応的手法よりも古くから存在する。", "note": "モーメンタム法の改良版", "imp": "○"}, {"id": 420, "cat": "15.DL発展", "term": "Adversarial Attack", "en": "Adversarial Attack", "desc": "画像分類モデルに人の目には分からないほど微小な変化を加えた入力を与え、誤った判定を引き起こす手口を指すのがAdversarial Attackである。こうした加工済みの入力はAdversarial Example（敵対的サンプル）と呼ばれ、これを使ってモデルの出力を狂わせる攻撃全般を総称する言葉として使われる。", "note": "データ汚染・モデル汚染とは別概念", "imp": "○"}, {"id": 421, "cat": "16.強化学習補完", "term": "Agent57", "en": "Agent57", "desc": "強化学習を土台とするゲームAIの一つで、Atari2600用に用意された57本のタイトルすべてにおいて、人間の熟練者が記録するスコアを上回る結果を残した点で高く評価されている。複数の探索戦略を組み合わせ、目先の報酬と将来的な報酬への配慮を状況に応じて調整する仕組みを備え、汎用性の高いゲームAIとしての発展を象徴する存在とされる。", "note": "Atari2600全制覇のゲームAI", "imp": "○"}, {"id": 422, "cat": "16.強化学習補完", "term": "Ape-X", "en": "Ape-X", "desc": "Ape-Xは、多数のアクターを並列に走らせて経験を大量収集し、それらを中央の学習器に集約して学習を進める分散アーキテクチャを採用したDQN系の深層強化学習手法である。ダブルDQNやデュエリングネットワークなど既存の改良手法を統合しており、Atariの各タイトルにおいて高いスコアを達成したことで知られる。", "note": "Rainbow・ダブルDQNと関連", "imp": "○"}, {"id": 423, "cat": "16.強化学習補完", "term": "Rainbow", "en": "Rainbow", "desc": "Rainbowは、ダブルDQN、ノイジーネットワーク、デュエリングネットワークなど、DQNを改良する7つの手法を統合した深層強化学習アルゴリズムである。個々の改良手法を組み合わせることで、単独で用いるよりも高い性能と学習の安定性を実現できることを示した代表的な手法として知られる。", "note": "DQN派生手法の集大成", "imp": "○"}, {"id": 424, "cat": "16.強化学習補完", "term": "Dota2", "en": "Dota 2", "desc": "複数人が同時に参加するオンライン対戦ゲームで、OpenAIが開発したAI「OpenAI Five」が2018年、当時最強とされていたプロ選手たちのチームを打ち破った舞台として知られる。味方同士の協力と敵チームとの対立が絡み合うゲームであるため、複数のエージェントが互いに影響を与えながら学習を進めるマルチエージェント強化学習の実例として紹介されることが多い。", "note": "OpenAI Fiveの対戦ゲーム", "imp": "○"}, {"id": 425, "cat": "16.強化学習補完", "term": "Atari 2600", "en": "Atari 2600", "desc": "DQNやRainbowなどの強化学習アルゴリズムは、人間のスコアを上回れるかどうかで強さを測られることが多く、その舞台としてよく選ばれるのが実在の家庭用ゲーム機Atari 2600である。収録タイトルのうち57種類が定番の評価用タスク群として定着している。", "note": "DQN系手法の評価基準", "imp": "○"}, {"id": 426, "cat": "16.強化学習補完", "term": "AlphaStar", "en": "AlphaStar", "desc": "深層強化学習を土台に構築されたゲームAIの一つで、eスポーツの対戦タイトルとして知られるRTS（リアルタイムストラテジー）ゲーム「スタークラフトII」において世界最高水準のプロ選手を打ち破ったのがAlphaStarである。畳み込み構造やLSTMなど複数種類のニューラルネットワークを統合したアーキテクチャで構築されている。", "note": "AlphaGoと並ぶゲームAI", "imp": "○"}, {"id": 427, "cat": "16.強化学習補完", "term": "UCB方策", "en": "Upper Confidence Bound", "desc": "UCB方策(Upper Confidence Bound)は、多腕バンディット問題を解くために用いられるアルゴリズムの一つである。各選択肢の期待報酬の推定値に加えて、試行回数の少なさに基づく不確実性の大きさを考慮し、探索と活用のバランスを取りながらより当たりを引きやすい選択肢を選んでいく。", "note": "ε-greedy方策と並ぶ手法", "imp": "○"}, {"id": 428, "cat": "16.強化学習補完", "term": "多腕バンディット問題", "en": "Multi-armed Bandit Problem", "desc": "多腕バンディット問題とは、複数のスロットマシンの中から、決められた試行回数内でできるだけ多く当たりを引くにはどう行動すべきかを考える問題である。開始時点では各選択肢の当たる確率が不明なため、試行によって確率を推定する探索と、推定結果をもとに有利な選択肢を選ぶ活用のバランスが課題となり、UCB方策やε-greedy方策などのアルゴリズムで解かれる。", "note": "UCB方策・ε-greedy方策で解く", "imp": "○"}, {"id": 429, "cat": "16.強化学習補完", "term": "マルコフ決定過程", "en": "Markov Decision Process", "desc": "次にどの状態へ移るかの確率が、これまでの経緯とは無関係に「今の状態」と「今とった行動」だけで決まるという性質（マルコフ性）を前提に、意思決定の問題を数式で表現する枠組みである。強化学習アルゴリズムの大半はこの枠組みを土台に構築されており、状態・行動・報酬・遷移確率という要素の組み合わせで問題設定を記述する。", "note": "強化学習の理論的基盤", "imp": "○"}, {"id": 430, "cat": "16.強化学習補完", "term": "完全情報ゲーム", "en": "Perfect Information Game", "desc": "対局者の誰から見ても、その時点までの手や状況が隠されずに共有されているゲームを指す。将棋や囲碁が典型例であり、各局面を自分にとっての有利さを示す数値（スコア）に置き換え、自分の得点は最大に、相手の得点は最小になるよう手を掘り下げて探索するMini-Max法などの手法が適用できる。", "note": "Mini-Max法で探索される", "imp": "○"}, {"id": 431, "cat": "16.強化学習補完", "term": "残差強化学習", "en": "Residual Reinforcement Learning", "desc": "ロボット制御のように、すでにある程度の性能を発揮する既存の制御則が用意されている場合に、それをゼロから置き換えるのではなく土台として活用し、目標の動作に至るまでの不足分だけを強化学習で補って仕上げる手法を残差強化学習と呼ぶ。信頼できる制御が下支えになるため、学習初期に危険な動きをするリスクを抑えながら効率的に性能を伸ばせる。", "note": "既存制御手法との組み合わせ", "imp": "○"}, {"id": 432, "cat": "16.強化学習補完", "term": "状態表現学習", "en": "State Representation Learning", "desc": "状態表現学習は、センサーデータなど生の観測情報から、強化学習で扱いやすい状態を表す特徴量を抽出する過程そのものを学習によって獲得する手法である。人手で状態表現を設計する代わりに、ニューラルネットワークなどを用いて有用な特徴量表現を自動的に学習させる点が特徴である。", "note": "特徴量抽出の自動学習", "imp": "○"}, {"id": 433, "cat": "16.強化学習補完", "term": "ドメインランダマイゼーション", "en": "Domain Randomization", "desc": "ドメインランダマイゼーションは、シミュレータ上で強化学習を行う際に、物体の色や質量、摩擦係数などのパラメータをランダムに変化させながら多様なシミュレーション環境を生成して学習する手法である。実環境とシミュレータの違い(sim2realギャップ)に頑健な方策を獲得し、シミュレータで学習した方策を実世界のロボットなどにそのまま適用しやすくすることを目的とする。", "note": "sim2realの実現手法", "imp": "○"}, {"id": 434, "cat": "16.強化学習補完", "term": "ノイジーネットワーク", "en": "Noisy Networks", "desc": "ノイジーネットワークは、DQNを改良した深層強化学習の手法の一つであり、ネットワークの重みにノイズを加えることで探索行動を促す仕組みを持つ。従来のε-greedy方策のようにランダムに行動を選ぶのではなく、ネットワーク自体にノイズを組み込むことで、状況に応じた効率的な探索を実現する。", "note": "Rainbowの構成要素の一つ", "imp": "○"}, {"id": 435, "cat": "16.強化学習補完", "term": "デュエリングネットワーク", "en": "Dueling Network", "desc": "デュエリングネットワークは、DQNを改良した深層強化学習の手法であり、行動価値関数を状態価値関数とアドバンテージ関数の2つに分けてネットワーク内で別々に推定し、それらを組み合わせて出力する構造を持つ。行動によらない状態自体の価値を分離して学習できるため、学習の効率と安定性が向上する。", "note": "Ape-X・Rainbowの構成要素", "imp": "○"}, {"id": 436, "cat": "16.強化学習補完", "term": "ダブルDQN", "en": "Double DQN", "desc": "ダブルDQNは、DQNを改良した深層強化学習手法であり、行動価値の過大評価という問題を緩和するために、行動の選択と価値の評価を異なるネットワークで行う工夫を導入している。Ape-XやRainbowなど、後続の多くのDQN派生手法にこの考え方が取り入れられている。", "note": "行動価値の過大評価を緩和", "imp": "○"}, {"id": 437, "cat": "16.強化学習補完", "term": "プランニング", "en": "Planning", "desc": "プランニングとは、ロボットなどの行動計画を探索によって作成する技術である。第一次AIブームにおける代表的な研究テーマの一つであり、STRIPSやSHRDLUといったシステムがプランニング技術を活用した例として知られ、SHRDLUは「積み木の世界」の中で英語の指示に従って物体を動かすことができた。", "note": "STRIPS・SHRDLUが代表例", "imp": "○"}, {"id": 438, "cat": "8.応用-画像", "term": "CAM (Class Activation Map)", "en": "Class Activation Map", "desc": "CNNがどの画像領域に着目して分類結果を出したのかをヒートマップとして描き出す説明可能AI（XAI）の手法がCAM（Class Activation Map）である。畳み込み層から得られる各チャンネルの特徴マップを重み付きで足し合わせることで、判断根拠となった領域を可視化する。この考え方をさらに発展させたのがGrad-CAMである。", "note": "改良版にGrad-CAM", "imp": "○"}, {"id": 439, "cat": "9.応用-言語音声", "term": "CTC (Connectionist Temporal Classification)", "en": "Connectionist Temporal Classification", "desc": "音声のフレーム列と、対応する音素やテキストの列の長さがそろわないという音声認識特有の課題に対応するために考案された学習手法である。出力にブランク（空白）ラベルを設け、同一ラベルの連続を1つにまとめる操作を組み合わせることで、系列長が一致しないデータでもRNNを用いた学習を可能にした。", "note": "RNNによる音声認識で使用", "imp": "○"}, {"id": 440, "cat": "11.社会実装-産業", "term": "CRISP-ML", "en": "CRISP-ML", "desc": "CRISP-ML(CRoss-Industry Standard Process for Machine Learning)は、データマイニングの標準プロセスであるCRISP-DMを機械学習プロジェクト向けに拡張したフレームワークである。モデルの運用後のモニタリングなど、AIの活用に特有の工程を加味しており、機械学習プロジェクトを計画的かつ品質を担保しながら進めるための指針として提案されている。", "note": "CRISP-DMの機械学習版", "imp": "○"}, {"id": 441, "cat": "7.DLの手法", "term": "Contrastive Loss", "en": "Contrastive Loss", "desc": "2つのデータの組みを用い、埋め込みベクトル間の距離をもとに計算する損失関数であり、2015年に提案された。同じクラスに属するペアは距離が近づき、異なるクラスに属するペアはマージン(ハイパーパラメータm)以上離れるように学習を進める。画像データをニューラルネットワークでベクトル化し、深層距離学習によって類似度を獲得する際に用いられる代表的な手法である。", "note": "Triplet Loss、深層距離学習と関連", "imp": "○"}, {"id": 442, "cat": "8.応用-画像", "term": "CutMix", "en": "CutMix", "desc": "画像データ拡張手法の一つで、画像の一部をCutout(切り取り)してマスクした領域に、別の画像の一部を組み合わせて新たな画像を生成する。MixupやCutout、Random Rotationなどと並ぶ代表的な拡張手法であり、汎化性能の向上を目的として訓練データのバリエーションを増やす際に使われる。", "note": "Mixup・Cutoutと組み合わせた手法", "imp": "○"}, {"id": 443, "cat": "8.応用-画像", "term": "Cutout", "en": "Cutout", "desc": "画像の中に矩形の領域をランダムに選び、その部分の画素をゼロなどの固定値で塗りつぶすことでデータ拡張を行う手法がCutoutである。Random Erasingと発想が近く、モデルが特定の局所領域だけに依存した判断をするのを抑え、汎化性能の向上につなげる狙いがある。RandAugment（2019年にGoogleが提案）は、Cutoutを含む拡張手法の中から適用するものを自動的に選び出す仕組みとして知られる。", "note": "Random Erasing、RandAugmentと関連", "imp": "○"}, {"id": 444, "cat": "8.応用-画像", "term": "DenseNet", "en": "DenseNet", "desc": "Densely Connected Convolutional Networksの略で、ResNetを改善した画像認識向けのネットワークである。スキップ結合を改良したDenseブロックを導入し、各層の出力を後続の全ての層に直接接続することで、少ないパラメータ数でも効率的な特徴の再利用と勾配伝播を実現する。", "note": "ResNetのスキップ結合を改良", "imp": "○"}, {"id": 445, "cat": "8.応用-画像", "term": "Depthwise Separable Convolution", "en": "Depthwise Separable Convolution", "desc": "通常の畳み込み処理を空間方向(Depthwise)とチャンネル方向(Pointwise)に分解し、それぞれ独立に畳み込みを行う手法である。MobileNetに採用されており、従来の畳み込みと比較して非常に少ない計算量で同等の出力を得られるため、スマートフォンなど計算資源が限られるモバイル端末での画像認識に適する。", "note": "MobileNetの中核技術", "imp": "○"}, {"id": 446, "cat": "8.応用-画像", "term": "FPN (Feature Pyramid Networks)", "en": "Feature Pyramid Networks", "desc": "物体検出において、候補領域の提案とクラス識別を段階的に行う2段階モデルの代表的なネットワークの一つである。異なる解像度の特徴マップをピラミッド状に統合することで、大小さまざまなサイズの物体を精度良く検出できるようにする。R-CNN系のネットワークと並んで2段階モデルに分類される。", "note": "R-CNN系と並ぶ2段階モデル", "imp": "○"}, {"id": 447, "cat": "8.応用-画像", "term": "Fast R-CNN", "en": "Fast R-CNN", "desc": "候補領域ごとに個別にCNNを通していた非効率を解消するため、画像全体を一度だけCNNに通してから各領域の特徴を切り出す設計を採用した物体検出ネットワーク。処理時間を大幅に短縮し、後継のFaster R-CNNへの発展的な土台となったが、ピクセル単位の領域分割(セグメンテーション)を出力する仕組みは持たない。", "note": "R-CNNの後継、Faster R-CNNへ発展", "imp": "○"}, {"id": 448, "cat": "8.応用-画像", "term": "Faster R-CNN", "en": "Faster R-CNN", "desc": "R-CNN、Fast R-CNNに続く物体検出ネットワークであり、候補領域の提案処理をニューラルネットワーク(Region Proposal Network)に組み込むことで、Selective Searchに依存していたFast R-CNNよりもさらに高速な物体検出を実現した。2段階モデルの代表例としてFPNなどと並んで扱われる。", "note": "Fast R-CNNをさらに高速化", "imp": "○"}, {"id": 449, "cat": "9.応用-言語音声", "term": "Flamingo", "en": "Flamingo", "desc": "DALL-Eが文章から画像を生成するのに対し、逆に画像や動画を読み込んで説明文を出力するマルチモーダルモデルがFlamingoである。ディープマインド社の手によるもので、Image Captioningに加えVisual Question Answeringのようなタスクにも対応するが、画像そのものを作り出す機能は持たない。", "note": "Image Captioning、VQAに対応", "imp": "○"}, {"id": 450, "cat": "8.応用-画像", "term": "Random Flip", "en": "Random Flip", "desc": "画像を左右反転（時に上下反転）させて新たな学習用画像を作り出す、データオーグメンテーションの手法の一つ。撮影する向きが変わっても対象を正しく認識できるようモデルを鍛える効果があり、画素値を欠損させるRandom Erasing/Cutoutや、切り出し範囲を変えるRandom Cropなど、他の拡張手法と組み合わせて使われることが多い。", "note": "Random Crop等と並ぶ拡張手法", "imp": "○"}, {"id": 451, "cat": "10.応用-強化生成", "term": "Flowベース生成モデル", "en": "Flow-based Generative Model", "desc": "VAEと同様に潜在変数を用いて画像などのデータを生成するネットワークだが、エンコーダ・デコーダの構造を持たない点が特徴である。可逆な変換を重ねることでデータ分布と潜在変数分布を相互に変換し、尤度を直接計算しながら生成を行う。G検定では単に「Flow」と呼ばれることもある。", "note": "VAE・GANと並ぶ生成モデル", "imp": "○"}, {"id": 452, "cat": "8.応用-画像", "term": "Image Captioning", "en": "Image Captioning", "desc": "入力された画像に対して、その内容を説明する文章を生成するマルチモーダルタスクである。文章から画像を生成するText-to-Imageとは逆方向のタスクであり、画像から文字を抽出するOCRとも異なる。ディープマインド社のFlamingoなどがこのタスクを解くネットワークとして知られる。", "note": "Text-to-Imageの逆方向タスク", "imp": "○"}, {"id": 453, "cat": "8.応用-画像", "term": "Inceptionモジュール", "en": "Inception Module", "desc": "2014年のILSVRCで優勝したGoogLeNetの中核をなす構造で、フィルタサイズの異なる畳み込み層を1つの層内で並列に走らせ、その出力をまとめて次の層へ渡す設計になっている。異なる大きさの視野を同時に処理できるため、細かい模様から大きな輪郭まで幅広い特徴を捉えやすい。翌2015年のILSVRCで優勝し、代わりにスキップ結合を採用したResNetとよく対比される。", "note": "GoogLeNetの中核構造", "imp": "○"}, {"id": 454, "cat": "10.応用-強化生成", "term": "InfoVAE", "en": "InfoVAE", "desc": "VAEの派生ネットワークの一つで、潜在変数と観測データの相互情報量を考慮するようβ-VAEをさらに拡張したモデルである。VAEでは学習時に潜在変数の情報が無視されてしまう現象(posterior collapse)が起こることがあり、InfoVAEはこれを緩和する目的を持つ。β-VAEやVQ-VAEなど他のVAE派生とあわせて出題される。", "note": "β-VAEを拡張したVAE派生", "imp": "○"}, {"id": 455, "cat": "2.探索推論知識表現", "term": "LOD (Linked Open Data)", "en": "Linked Open Data", "desc": "オープンなデータをウェブ上で相互にリンクさせ、機械が処理しやすい形で公開・流通させる仕組みである。セマンティックウェブの考え方を実現する取り組みの一つであり、Cycプロジェクトやウェブマイニングと並んで知識表現・オープンデータの文脈で扱われる。", "note": "セマンティックウェブ関連の概念", "imp": "○"}, {"id": 456, "cat": "4.評価と前処理", "term": "MAE (Mean Absolute Error)", "en": "Mean Absolute Error", "desc": "回帰タスクで使用される評価指標であり、予測値と正解値の誤差の絶対値を平均して算出する。MSE(平均二乗誤差)のように誤差を二乗しないため外れ値の影響を受けにくいという性質があり、外れ値を多く含むデータを扱う際に適した指標として使われる。", "note": "平均絶対誤差、MSEより外れ値に強い", "imp": "○"}, {"id": 457, "cat": "4.評価と前処理", "term": "平均絶対誤差", "en": "MAE", "desc": "MAE(Mean Absolute Error)の日本語名であり、予測値と教師データの差の絶対値を平均して求める回帰タスク向けの評価指標である。誤差を二乗する平均二乗誤差と比較して、外れ値の影響を受けにくいという特性を持ち、外れ値の多いデータセットの評価に用いられる。", "note": "MAEと同義", "imp": "○"}, {"id": 458, "cat": "4.評価と前処理", "term": "RMSE (Root Mean Squared Error)", "en": "Root Mean Squared Error", "desc": "回帰問題の予測精度を測る代表的な指標の一つで、各データ点での予測と正解のずれを二乗してから平均を取り(MSE)、さらにその値の平方根を計算したもの。二乗を経由するため大きな外れ値の影響を受けやすい一方、平方根を取ることで元のデータと同じ単位に戻せるため、誤差の大きさを直感的に解釈しやすいという利点がある。", "note": "平均平方二乗誤差、MSEの平方根", "imp": "○"}, {"id": 459, "cat": "8.応用-画像", "term": "Mask R-CNN", "en": "Mask R-CNN", "desc": "物体検出とセグメンテーションを同時に行うインスタンスセグメンテーション向けのネットワークである。Faster R-CNNをベースに、検出した各物体領域に対してマスク(画素単位の領域)を予測する分岐を追加した構造を持つ。U-Netのセマンティックセグメンテーションとは異なり、物体ごとの個別領域を区別できる点が特徴である。", "note": "インスタンスセグメンテーションの代表例", "imp": "○"}, {"id": 460, "cat": "8.応用-画像", "term": "MnasNet", "en": "MnasNet", "desc": "MnasNetは、NAS（Neural Architecture Search）の技術を用いてネットワーク構造を自動探索することで得られた画像認識モデルである。計算量を抑えながら高精度を実現することを目的として探索が行われ、その結果、高精度でありながら軽量というモバイル向けに適した特徴を持つネットワークが得られた。NASNetと並んでNASの代表的な成果として挙げられる。", "note": "NASNet・EfficientNetと関連", "imp": "○"}, {"id": 461, "cat": "7.DLの手法", "term": "Multi-Head Attention", "en": "Multi-Head Attention", "desc": "Transformerの核心を担う仕組みの一つで、複数のSelf-Attentionを同時に並行させて動かす構造を持つ。それぞれのヘッドが異なる観点から単語同士の関係性を捉えるため、単一のAttentionでは見落とされがちな多面的な依存関係を表現でき、自然言語処理モデルの性能向上に寄与している。", "note": "Self-Attentionを並列配置", "imp": "○"}, {"id": 462, "cat": "7.DLの手法", "term": "NAS (Neural Architecture Search)", "en": "Neural Architecture Search", "desc": "NASは、ニューラルネットワークの最適な構造そのものを学習によって自動的に探索する技術である。ネットワーク構造は自由度が非常に高く人手で最適な設計を見つけるのは難しいため、探索アルゴリズムを用いて構造を求める研究が進められている。この技術によって得られた代表的なネットワークにNASNetやMnasNetがある。", "note": "NASNet・MnasNetを生成する技術", "imp": "○"}, {"id": 463, "cat": "8.応用-画像", "term": "NASNet", "en": "NASNet", "desc": "NASNetは、NAS（Neural Architecture Search）の技術を利用した構造探索によって得られた画像認識用ネットワークである。人手による設計ではなく、学習によってネットワーク構造そのものを自動的に求めるアプローチを採用した点が特徴で、MnasNetと並んでNASの代表的な成果として挙げられる。", "note": "MnasNetと同様にNASの成果", "imp": "○"}, {"id": 464, "cat": "8.応用-画像", "term": "NERF (Neural Radiance Fields)", "en": "Neural Radiance Fields", "desc": "NeRF（Neural Radiance Fields）は、複数視点から撮影した画像をもとに3次元シーンを表現し、任意の視点から見た画像を生成できる技術である。ニューラルネットワークによってシーン内の位置と視線方向から色と密度を推定する暗黙的な3次元表現を学習する点が特徴で、ある視点の画像群から別視点のシーンを再現するタスクに用いられる。", "note": "新規視点画像生成に利用", "imp": "○"}, {"id": 465, "cat": "9.応用-言語音声", "term": "NSP (Next Sentence Prediction)", "en": "Next Sentence Prediction", "desc": "NSPは、BERTの事前学習で用いられるタスクの一つで、入力された2つの文が文書中で連続しているかどうかを判別する。文章の一部を隠して周辺の文脈から当てるMLM（Masked Language Model）と組み合わせて学習することで、単語レベルだけでなく文同士のつながりを捉える能力をモデルに獲得させる。", "note": "BERTの事前学習タスク、MLMと対", "imp": "○"}, {"id": 466, "cat": "8.応用-画像", "term": "OCR (Optical Character Recognition)", "en": "Optical Character Recognition", "desc": "紙に書かれた手書き文字や印刷文字を画像として取り込み、そこに写っている文字列をコンピュータが扱えるテキストへと自動的に起こし直す技術群の総称がOCR(光学文字認識)である。書類の電子化や名刺・レシートの読み取りといった場面で日常的に活用されており、画像から文章を取り出すという点でマルチモーダル処理の一分野とも関連づけられる。", "note": "画像からテキストへの変換技術", "imp": "○"}, {"id": 467, "cat": "7.DLの手法", "term": "One-shot Learning", "en": "One-shot Learning", "desc": "新しいクラスやタスクについて、教材となるサンプルをたった1個しか与えずに認識・分類させようとする学習方式である。事前に大規模データで汎用的な特徴表現を獲得したネットワークに、そのわずかな例だけを追加で見せて対応させる形で実現されることが多く、十分な量のラベル付きデータが確保できない場面に向いている。サンプルを一つも見せずに対応させるZero-shot Learningとともに、極端に少ないデータでの学習手法の代表例として扱われる。", "note": "Zero-shot・Few-shot学習と対比", "imp": "○"}, {"id": 468, "cat": "4.評価と前処理", "term": "PI (Permutation Importance)", "en": "Permutation Importance", "desc": "ある特徴量をわざと使えない状態にしたときに、モデルの予測性能がどれだけ悪化するかを見て、その特徴量の重要さを測ろうという発想の手法である。具体的には検証用データの中で対象の特徴量の値をランダムに入れ替えてから予測させ、シャッフル前との精度差の大きさを重要度の指標として扱う。", "note": "特徴量重要度の評価手法", "imp": "○"}, {"id": 469, "cat": "8.応用-画像", "term": "PSPNet", "en": "PSPNet", "desc": "PSPNet（Pyramid Scene Parsing Network）は、セマンティックセグメンテーションに用いられるエンコーダ・デコーダ構造のネットワークである。エンコーダとデコーダの間にPyramid Pooling Moduleと呼ばれる、複数の解像度で特徴を捉える機構を追加している点が特徴で、SegNetやU-Netと並ぶ代表的なセグメンテーションモデルとして挙げられる。", "note": "SegNet・U-Netと並ぶセグメンテーション手法", "imp": "○"}, {"id": 470, "cat": "9.応用-言語音声", "term": "PaLM (Pathways Language Model)", "en": "Pathways Language Model", "desc": "PaLM(Pathways Language Model)は、グーグルが2022年に公開した大規模言語モデルで、パラメータ数はおよそ5,400億にも達する。桁外れの規模のパラメータと学習データを背景に高度な言語理解・生成を実現し、GPT-3などと並ぶ大規模言語モデルの代表例として位置づけられる。", "note": "2022年グーグル発表、5400億パラメータ", "imp": "○"}, {"id": 471, "cat": "9.応用-言語音声", "term": "Paraphrasing", "en": "Paraphrasing", "desc": "Paraphrasingは、自然言語処理におけるテキストデータ拡張手法の一つで、文中の単語を意味の近い別の単語に置き換えることでデータのバリエーションを増やす。例えば「服」を「セーター」に置き換えるといった操作を行う。単語をランダムに入れ替え・削除・挿入するNoisingや、分布推定に基づくSamplingと並んで用いられる。", "note": "テキスト拡張手法、Noising・Samplingと関連", "imp": "○"}, {"id": 472, "cat": "10.応用-強化生成", "term": "Pix2Pix", "en": "Pix2Pix", "desc": "Pix2Pixと呼ばれる、画像から画像への変換(image-to-image translation)を学習するGANの一種で、変換前後の画像を1組の教師データとして与える点が特徴である。昼に撮った風景写真とそれに対応する夜景のペアを用意して学習させれば、昼の景色を夜景へ描き換えるといった変換が可能になる。", "note": "画像対応データで学習するGAN派生", "imp": "○"}, {"id": 473, "cat": "8.応用-画像", "term": "Pointwise Convolution", "en": "Pointwise Convolution", "desc": "1×1サイズのフィルタを使い、空間位置は固定したままチャンネル方向の情報だけを混ぜ合わせる処理がPointwise Convolutionである。空間方向を担当するDepthwise Convolutionと組み合わせた構成がDepthwise Separable Convolutionと呼ばれ、通常の畳み込みより計算量を抑えつつ特徴を統合できるため、MobileNetなど軽量なネットワークで採用されている。", "note": "Depthwise Convolutionと対で使用", "imp": "○"}, {"id": 474, "cat": "8.応用-画像", "term": "RandAugment", "en": "RandAugment", "desc": "RandAugmentは、2019年にグーグルが発表した画像データ向けのデータ拡張戦略であり、多数存在するデータ拡張手法の中から最適な組み合わせを効率的に探索することを目的とする。ミニバッチごとに、用意された拡張手法の候補からランダムに一定個数を選び、一定の強さで適用することで、ハイパーパラメータ探索の手間を削減しながら高い汎化性能を実現する。", "note": "データ拡張の自動選択手法", "imp": "○"}, {"id": 475, "cat": "8.応用-画像", "term": "Random Crop", "en": "Random Crop", "desc": "Random Cropは、画像データ拡張手法の一つで、元画像の一部をランダムな位置・サイズで切り取ることで、サイズや構図の異なる学習データを新たに生成する。画素値を0やランダム値に置き換えるRandom Erasingや、画像を反転させるRandom Flipなどと並び、画像分類・物体検出の学習でよく使われる基本的な拡張手法である。", "note": "画像の一部切り取りによる拡張", "imp": "○"}, {"id": 476, "cat": "8.応用-画像", "term": "Random Erasing", "en": "Random Erasing", "desc": "Random Erasingは、画像データ拡張手法の一つで、画像内のランダムな領域の画素値を0またはランダムな値で置き換えることでデータのバリエーションを増やす。同様の効果を持つCutoutと近い手法であり、モデルが画像の一部が欠損・遮蔽された状況でも頑健に認識できるようにする狙いがある。2019年にグーグルが発表した。", "note": "Cutoutと類似、2019年グーグル発表", "imp": "○"}, {"id": 477, "cat": "8.応用-画像", "term": "Rotation", "en": "Rotation", "desc": "Rotation（Random Rotation）は、画像データ拡張手法の一つで、元画像をランダムな角度で回転させることで新たな学習データを生成する。撮影角度の違いに対するモデルの頑健性を高める効果があり、Random CropやRandom Flipなど他の幾何変換系のデータ拡張手法と組み合わせて用いられることが多い。", "note": "画像回転によるデータ拡張", "imp": "○"}, {"id": 478, "cat": "8.応用-画像", "term": "SENet", "en": "Squeeze-and-Excitation Network", "desc": "SENet（Squeeze-and-Excitation Network）は、畳み込み層の出力チャンネルごとに重要度を重み付けするAttention機構（Squeeze-and-Excitation構造）を導入した画像認識ネットワークであり、2017年のILSVRCで優勝した。チャンネル間の依存関係を明示的にモデル化することで、既存のCNNアーキテクチャに組み込むだけで精度向上を図れる点が特徴である。", "note": "ILSVRC2017優勝、チャンネルAttention", "imp": "○"}, {"id": 479, "cat": "4.評価と前処理", "term": "SHAP (SHapley Additive explanations)", "en": "SHapley Additive exPlanations", "desc": "機械学習モデルの予測結果に対して、各特徴量がどの程度・どの方向に影響したかを定量的に示す説明可能AI(XAI)の代表的手法である。ゲーム理論のShapley値の考え方を応用し、ある特徴量が予測値に与えた貢献度を協力ゲームにおける各プレイヤーの取り分として計算する。例えば回帰タスクでは、特定の特徴量が予測値を正負どちらの方向にどれだけ動かしたかを可視化でき、モデルの判断根拠を人間に説明する際に使われる。", "note": "LIME・XAI・permutation importance", "imp": "○"}, {"id": 480, "cat": "8.応用-画像", "term": "SegNet", "en": "SegNet", "desc": "セマンティックセグメンテーションに用いられるエンコーダ・デコーダ構造のニューラルネットワークである。画像をエンコーダで圧縮した後、デコーダで元の解像度まで復元しながらピクセル単位のクラス分類を行う点が特徴で、U-NetやPSPNet(Pyramid Scene Parsing Network)と並ぶ代表例として扱われる。エンコーダ側のプーリング時の位置情報をデコーダでのアップサンプリングに利用することで、境界を保ちながら高精度な領域分割を実現する。", "note": "U-Net・PSPNet・FCNと同系統", "imp": "○"}, {"id": 481, "cat": "8.応用-画像", "term": "Selective Search", "en": "Selective Search", "desc": "画像中で物体が存在しそうな候補領域を複数抽出するためのアルゴリズムであり、物体検出モデルR-CNNの前処理として使用される。画像の色やテクスチャなどの類似性をもとに小領域を統合していくことで、物体らしい矩形候補を効率的に絞り込む。YOLOのように候補領域の抽出とクラス識別を一度に行う手法とは異なり、Selective SearchはR-CNN系の2段階アプローチにおける最初のステップとして位置づけられる。", "note": "R-CNNの候補領域抽出に使用", "imp": "○"}, {"id": 482, "cat": "4.評価と前処理", "term": "Series Split", "en": "Series Split", "desc": "時系列データを学習用と評価用に分ける際の手法で、Time Series Splitという別名でも知られる。前後関係のあるデータをランダムに混ぜて分割すると未来の情報が学習側に漏れてしまうため、時間軸に沿って古い区間を学習用、新しい区間を評価用に割り当てることでこのリークを防ぐ。売上予測やアクセス数予測など、時間の経過とともに変化する対象をモデル化する際に欠かせない考え方である。", "note": "Time Series Splitとも呼ぶ", "imp": "○"}, {"id": 483, "cat": "7.DLの手法", "term": "Source-Target Attention", "en": "Source-Target Attention", "desc": "Transformerで使われるAttention機構のうち、入力側と出力側という異なる2つの系列間の対応関係を捉えるものを指す。queryをデコーダ側、keyとvalueをエンコーダ側から取って計算するため、出力を1語生成するたびに入力文のどこに注目すべきかを決める役割を果たす。同じ系列内の単語どうしの関連を捉えるSelf-Attentionとは対象が異なり、Encoder-Decoder Attentionの別称でも呼ばれる。", "note": "Encoder-Decoder Attentionと同義", "imp": "○"}, {"id": 484, "cat": "10.応用-強化生成", "term": "Text-to-Image", "en": "Text-to-Image", "desc": "入力された文章の内容を反映した画像を生成するマルチモーダルタスクである。代表的なネットワークとしてオープンAIが開発したDALL-Eがあり、テキストの意味を画像特徴に変換して出力する仕組みを持つ。画像から説明文を生成するImage Captioningとは逆方向のタスクにあたり、画像とテキストを結びつけて学習するCLIPなどの技術と組み合わせて実現されることが多い。", "note": "DALL-Eが代表例、逆はImage Captioning", "imp": "○"}, {"id": 485, "cat": "7.DLの手法", "term": "Triplet Loss", "en": "Triplet Loss", "desc": "3つのデータの組み(アンカー、正例、負例)を用いて画像などの埋め込みベクトル間の距離を学習させる損失関数である。アンカー画像と同じクラスの正例画像との距離を近づけ、異なるクラスの負例画像との距離を遠ざけるように学習を進める点が特徴で、マージンを設けることで単純に距離をゼロにするのではなく適度な差を保つよう調整する。2つのデータの組みで計算するContrastive Lossと対比される、顔認識などの距離学習で用いられる代表的な損失である。", "note": "Contrastive Lossと対比される距離学習の損失", "imp": "○"}, {"id": 486, "cat": "9.応用-言語音声", "term": "Unified-IO", "en": "Unified-IO", "desc": "姿勢推定や物体検出、質問応答、Text-to-Imageなど複数の異なるタスクを単一のモデルで統一的に扱えるように設計されたマルチモーダルなネットワークである。個別のタスクごとに専用モデルを用意するのではなく、多様な入出力形式を共通のアーキテクチャで処理できる点が特徴で、汎用的なAIモデルを目指す研究動向の一例として位置づけられる。", "note": "マルチタスク・マルチモーダルモデル", "imp": "○"}, {"id": 487, "cat": "10.応用-強化生成", "term": "VQ-VAE", "en": "Vector Quantized VAE", "desc": "潜在変数が離散的な値になるように拡張したVAE(変分オートエンコーダ)の一種である。通常のVAEでは連続的な潜在変数を扱うが、学習時に潜在変数の情報を無視してしまう現象(posterior collapse)が起こることがある。VQ-VAEはベクトル量子化により潜在変数を離散化することでこの問題を緩和し、より安定した表現学習を可能にする。画像や音声の生成モデルの構成要素として利用される。", "note": "離散潜在変数を持つVAEの拡張", "imp": "○"}, {"id": 488, "cat": "8.応用-画像", "term": "WideResNet", "en": "WideResNet", "desc": "WideResNetは、層を深く積むことを重視してきたResNet(Residual Network)とは方向性を変え、深さの代わりに各畳み込み層のチャンネル数、つまり幅を広げることで性能を高めたネットワークである。深く積むほど精度が上がるとは限らないという知見を踏まえ、深さと幅のバランスを見直すことで、より少ない層数でも高速かつ高精度な学習を実現している。", "note": "ResNetの層数を減らし幅を増やした改良版", "imp": "○"}, {"id": 489, "cat": "11.社会実装-産業", "term": "アジャイル開発", "en": "Agile Development", "desc": "設計から実装、テスト、リリースまでの開発サイクルを小規模に繰り返しながら進めるシステム開発手法である。計画を事前に全て確定させるウォーターフォール開発とは対照的に、短い期間で開発と検証を反復することで仕様変更や不確実性の高いAI開発に柔軟に対応できる点が利点とされる。試行錯誤を伴うことが多い機械学習プロジェクトでは、この反復的な進め方が特に採用されやすい。", "note": "ウォーターフォール開発と対比される手法", "imp": "○"}, {"id": 490, "cat": "11.社会実装-産業", "term": "ウォーターフォール開発", "en": "Waterfall Development", "desc": "開発サイクルを短く繰り返しながら進めるアジャイル開発とは対照的に、要件定義から設計・実装・テスト・リリースまでの各工程を最初にすべて計画してから、その順序通りに進めていく開発手法がウォーターフォール開発である。進行管理はしやすいが、途中で仕様が変わる状況には対応しづらく、要件が変わりやすいAI開発ではアジャイル開発が採用される場面も多い。", "note": "アジャイル開発と対比される手法", "imp": "○"}, {"id": 491, "cat": "1.AIとAIの動向", "term": "アラン・チューリング", "en": "Alan Turing", "desc": "対話の内容だけから相手が人間か機械かを判定し、機械の知的なふるまいを外部から評価する方法「チューリングテスト」を提案した人物。この発想を記念して、1991年からチューリングテストの成績を競う「ローブナーコンテスト」が毎年催されている。", "note": "チューリングテストの考案者", "imp": "○"}, {"id": 492, "cat": "12.法律倫理", "term": "アルゴリズムバイアス", "en": "Algorithmic Bias", "desc": "AIモデルの判断が、性別や人種といった特定の属性を持つ人々に対して系統的に不利益な結果を導いてしまう現象を指す。採用選考や与信審査のように人の生活に影響する場面で生じると社会的な不公平につながるため、AI倫理・公平性の観点から是正が求められる。データの取得段階に起因するサンプリングバイアスとは異なり、モデルの出力そのものに偏りが表れる点が特徴である。", "note": "センシティブ情報に関する公平性の問題", "imp": "○"}, {"id": 493, "cat": "17.社会補完", "term": "インクルージョン", "en": "Inclusion", "desc": "AI開発・活用において、多様な人々を排除せず包摂する姿勢を指す概念であり、ダイバーシティ(多様性)と並んでAI倫理の重要な観点の一つとされる。開発チームや評価プロセスに多様な属性・立場の視点を取り入れることで、特定の集団に不利益をもたらすアルゴリズムバイアスなどのリスクを低減できる。AI倫理アセスメントを外部委託することも、公平性確保のために多様な視点を取り入れる手段の一つとされる。", "note": "ダイバーシティと並ぶAI倫理の観点", "imp": "○"}, {"id": 494, "cat": "6.DL学習技術", "term": "インスタンス正規化", "en": "Instance Normalization", "desc": "1つのデータの1チャンネルごとに、画像内の全画素にわたって正規化を行う手法である。バッチ正規化がミニバッチ全体の統計量を使うのに対し、インスタンス正規化はサンプル単独で完結するためバッチサイズに依存せず、画風変換(スタイル変換)のように画像ごとの色調・コントラストの個体差を消したいタスクで特に効果を発揮する。", "note": "スタイル変換で多用", "imp": "○"}, {"id": 495, "cat": "3.機械学習の手法", "term": "ウェブマイニング", "en": "Web Mining", "desc": "ウェブ上に存在する大量のデータを解析し、そこから有用な知識やパターンを取り出す技術を指す。ウェブページのテキストやリンク構造、利用者の行動履歴などを対象に分析を行い、検索エンジンの改善やレコメンデーションなどに応用される。コンピュータ処理に適した形でデータを公開・共有するLOD(Linked Open Data)や、常識をコンピュータに取り込むCycプロジェクトなど、知識処理に関する他の技術と並んで紹介されることが多い。", "note": "LOD・Cycプロジェクトと並ぶ知識処理技術", "imp": "○"}, {"id": 496, "cat": "14.ML補完", "term": "ウォード法", "en": "Ward's Method", "desc": "階層ありクラスタリングの代表的な手法の一つで、クラスタ内のデータのばらつき(分散)ができるだけ小さくなるように、似た者同士のクラスタを順に併合していく。k-meansのように事前にクラスタ数を決める必要がなく、併合過程を樹形図(デンドログラム)として表すことで、任意の段階でクラスタ数を選べる柔軟性がある。教師なし学習の一手法として、データ集合をグループ分けする際に用いられる。", "note": "階層ありクラスタリングの代表手法", "imp": "○"}, {"id": 497, "cat": "17.社会補完", "term": "エコーチェンバー", "en": "Echo Chamber", "desc": "ソーシャルメディアなどを利用する際に、自分と似た意見を持つ人々とのやり取りが繰り返されることで、特定の意見や価値観が増幅・強化されてしまう情報環境を指す。似た興味関心の情報ばかりが表示されるフィルターバブルと近い概念だが、エコーチェンバーは主に人と人との意見交換の場での閉鎖性に着目する点が異なる。いずれも社会の分断を助長し得る現象として問題視されている。", "note": "フィルターバブルと類似する概念", "imp": "○"}, {"id": 498, "cat": "7.DLの手法", "term": "エルマンネットワーク", "en": "Elman Network", "desc": "1990年に発表された初期のシンプルなRNN（再帰型ニューラルネットワーク）である。時系列データを扱うために、隠れ層の出力をコンテキスト層と呼ばれる層に1対1で対応させ、それを隠れ層へ再帰的に接続することで過去の情報を伝播させる仕組みを持つ。ジョルダンネットワークと並び、LSTMなど後の高度なRNNの原型として位置づけられる。", "note": "ジョルダンネットワーク、LSTMと対比", "imp": "○"}, {"id": 499, "cat": "7.DLの手法", "term": "ジョルダンネットワーク", "en": "Jordan Network", "desc": "エルマンネットワークと類似した初期のRNNの一種であり、時系列データの学習に用いられる。エルマンネットワークが隠れ層の出力をコンテキスト層経由で隠れ層に戻すのに対し、ジョルダンネットワークは出力層の値を隠れ層に接続する構造を持つ点が異なる。両者はLSTMなど現在主流のRNNが登場する以前の基礎的なモデルである。", "note": "エルマンネットワークと構造対比", "imp": "○"}, {"id": 500, "cat": "16.強化学習補完", "term": "オフライン強化学習", "en": "Offline Reinforcement Learning", "desc": "エージェントが環境と実際に相互作用することなく、あらかじめ収集された固定のデータセットのみを用いて方策を学習する強化学習の手法である。実環境での試行錯誤が危険・高コストな自動運転やロボット制御などの分野で、安全に学習を進める手段として重要視される。残差強化学習やマルチエージェント強化学習と並ぶ強化学習の応用手法の一つである。", "note": "残差強化学習、マルチエージェント強化学習と対比", "imp": "○"}, {"id": 501, "cat": "3.機械学習の手法", "term": "オンライン学習", "en": "Online Learning", "desc": "パラメータの更新において、訓練データ全体からたった1件だけを取り出し、それをもとに逐次更新していく学習の方式である。全データをまとめて使うバッチ学習や、一部をランダムに取り出すミニバッチ学習という概念と並べて語られ、抽出件数を1件に絞ったミニバッチ学習の特殊形とも捉えられる。データが次々と到着するような状況でリアルタイムに学習を反映させたい場合に適している。", "note": "バッチ学習・ミニバッチ学習と対比", "imp": "○"}, {"id": 502, "cat": "11.社会実装-産業", "term": "オープンイノベーション", "en": "Open Innovation", "desc": "自社内に技術やアイデアを閉じ込めず、外部の組織や個人が持つ知見を積極的に取り込むことで、革新的な成果をより効率的に生み出そうとする経営上の考え方である。AI分野ではオープンソースの共同開発、企業と大学の連携（産学連携）、異業種間のパートナーシップなどの形で広く実践されている。", "note": "産学連携、OSS共同開発と関連", "imp": "○"}, {"id": 503, "cat": "6.DL学習技術", "term": "グループ正規化", "en": "Group Normalization", "desc": "層の出力を正規化する手法の一つで、チャンネル全体を複数の小さな集合に区切り、それぞれの集合の中でサンプルごとに統計量を求めて正規化する。インスタンス正規化とレイヤー正規化、両者の発想を組み合わせた設計とされ、バッチサイズが極端に小さい条件でも学習を安定させられる点が強みである。", "note": "バッチ/レイヤー/インスタンス正規化と対比", "imp": "○"}, {"id": 504, "cat": "3.機械学習の手法", "term": "コンテンツベースフィルタリング", "en": "Content-based Filtering", "desc": "協調フィルタリングが他の利用者たちの購買データを頼りに推薦するのに対し、コンテンツベースフィルタリングは推薦対象となる商品やコンテンツそのものが持つ特徴量だけを根拠に、利用者自身の購買履歴と結び付けて似た商品を選び出す手法である。その強みは、商品の情報だけで推薦が成立し、ほかの利用者の行動データを必要としない点にある。", "note": "協調フィルタリングと対比", "imp": "○"}, {"id": 505, "cat": "9.応用-言語音声", "term": "コーパス", "en": "Corpus", "desc": "機械学習、特に自然言語処理で使用される、自然言語に関するデータセットの総称である。大量のテキストデータを収集・整備したもので、統計的手法やルールベース手法による機械翻訳など、自然言語処理モデルの学習・評価の基盤として用いられる。音声データを集めたものは音声コーパスと呼ばれる。", "note": "自然言語処理の学習データ集合", "imp": "○"}, {"id": 506, "cat": "13.数学統計", "term": "サンプリングバイアス", "en": "Sampling Bias", "desc": "機械学習のためにデータを収集する際、収集方法の偏りによってデータに生じてしまう偏りのことである。目的とするタスクの性質を網羅的に表すデータを集めることが重要だが、例えば特定の年代層に偏った調査を行うと、全体の傾向を正しく反映しないデータセットができあがってしまう。", "note": "アルゴリズムバイアスと混同注意", "imp": "○"}, {"id": 507, "cat": "1.AIとAIの動向", "term": "スティーブン・ハルナッド", "en": "Stevan Harnad", "desc": "1990年にシンボルグラウンディング問題を提起・議論した研究者である。シンボルグラウンディング問題とは、記号として処理される概念（シンボル）が、現実世界の実際の対象や意味と結びついていないという、記号処理型AIが抱える根本的な課題を指す概念であり、AIの意味理解の限界を論じる際にしばしば引用される。", "note": "シンボルグラウンディング問題の提唱者", "imp": "○"}, {"id": 508, "cat": "11.社会実装-産業", "term": "スパムフィルタ", "en": "Spam Filter", "desc": "メールの内容を分析し、そのメールが不適切な迷惑メール（スパム）かどうかを機械学習によって判定する仕組みである。テキスト分類タスクの代表的な応用例の一つで、単語の出現頻度や特徴的なパターンをもとに、正常なメールとスパムメールを自動的に振り分ける。", "note": "テキスト分類の代表的応用例", "imp": "○"}, {"id": 509, "cat": "9.応用-言語音声", "term": "スペクトル包絡", "en": "Spectral Envelope", "desc": "音声データの周波数スペクトル上における、音の強さの変化の全体的な様子を表すもので、音色を表していると解釈できる。メル周波数ケプストラム係数（MFCC）によって得ることができ、そのピークはフォルマントと呼ばれる。音声認識や音声合成の分野で音声の特徴を捉えるために利用される概念である。", "note": "MFCC・フォルマントと関連", "imp": "○"}, {"id": 510, "cat": "12.法律倫理", "term": "センシティブ属性", "en": "Sensitive Attribute", "desc": "人種、性別、国籍、年齢、政治的信念、宗教など、それをもとに不当な差別が生じうる属性情報のことで、センシティブ情報と同義で用いられる場合もある。機械学習モデルの公平性を議論する際の重要なキーワードであり、こうした属性やその代理変数が特徴量に含まれていないかを検証することが、公平なAIシステムの構築に求められる。", "note": "センシティブ情報とほぼ同義", "imp": "○"}, {"id": 511, "cat": "12.法律倫理", "term": "センシティブ情報", "en": "Sensitive Information", "desc": "人種・性別・国籍・年齢・信条・宗教といった、扱い方を誤ると不当な差別に直結しかねない機微な属性情報のことである。内閣府がまとめた「人間中心のAI社会原則」の公平性等に関する原則の中でも、こうした属性の違いによって人が不利に扱われないようにすることが求められており、AIモデルを開発する際にはこれらの情報や、それと強く相関する代理変数が特徴量に混入していないかを確認する必要がある。", "note": "代理変数の混入に注意", "imp": "○"}, {"id": 512, "cat": "18.法律補完", "term": "ソフトロー", "en": "Soft Law", "desc": "法的な強制力を持たず、業界団体や企業などによって自主的に遵守される規範・ガイドラインを指す用語である。法的拘束力を持つハードローと対をなす概念で、AI原則や倫理ガイドラインの多くはソフトローとして提示されており、技術の進展が速いAI分野では柔軟に対応できるガバナンス手段として重視されている。", "note": "ハードローと対比", "imp": "○"}, {"id": 513, "cat": "18.法律補完", "term": "ハードロー", "en": "Hard Law", "desc": "法律や条約など、国家によって強制力を伴って執行される規範を指す用語である。自主規制であるソフトローと対をなす概念で、AIガバナンスの議論では、リスクの大きさに応じてハードローとソフトローを使い分けるリスクベースアプローチが検討されている。", "note": "ソフトローと対比", "imp": "○"}, {"id": 514, "cat": "17.社会補完", "term": "ダイバーシティ", "en": "Diversity", "desc": "性別、国籍、年齢、価値観など人材や属性の多様性を指す用語である。AI開発においては、開発者集団の出身や経歴が偏るとAIモデルにも偏った視点が反映されやすくなるため、ダイバーシティとインクルージョンを確保し、多様な人材が開発に関わることが公平なAIシステム構築の観点から重要とされる。", "note": "インクルージョンとセットで語られる", "imp": "○"}, {"id": 515, "cat": "11.社会実装-産業", "term": "データサイエンティスト", "en": "Data Scientist", "desc": "データ分析やAIに関する専門知識を持ち、AI活用プロジェクトの中核としてAIの開発を担う人材である。本格的な開発着手前には、目標とする精度をAIが達成できるかを実験的に検証するPoC（概念実証）を、データサイエンティストを中心に実施することが一般的である。マネージャーやエンジニア、デザイナーと並ぶAIプロジェクトに必要不可欠な役職とされる。", "note": "PoC（概念実証）と関連", "imp": "○"}, {"id": 516, "cat": "3.機械学習の手法", "term": "データマイニング", "en": "Data Mining", "desc": "統計や機械学習の技術を駆使して、大量のデータの山から役立つ規則性やパターン、新たな知見を掘り出す手法・技術群を総称する言葉である。Web上の情報を対象としたウェブマイニング、知識を体系立てて整理するCycプロジェクト、データの公開・連携を進めるLOD（Linked Open Data）などと同じ文脈で語られ、簡易的な知識体系（ライトウェイトオントロジー）を扱うテーマの一つに位置づけられる。", "note": "ウェブマイニング等と関連概念", "imp": "○"}, {"id": 517, "cat": "12.法律倫理", "term": "トレーサビリティ", "en": "Traceability", "desc": "ある物事の経緯や履歴を後から追跡できる性質のことである。AIの利用においては、学習データの出所やモデルの判断過程を追跡できることが説明責任や信頼性の確保に重要となる。G検定ではこの追跡可能性を指す用語として出題される可能性があるため注意が必要である。", "note": "追跡可能性、AI倫理・ガバナンス、監査可能性と関連", "imp": "○"}, {"id": 518, "cat": "9.応用-言語音声", "term": "ニューラル機械翻訳", "en": "Neural Machine Translation", "desc": "深層学習を用いて翻訳を行う機械翻訳技術であり、機械翻訳はルールベース機械翻訳、統計的機械翻訳を経てニューラル機械翻訳へと発展してきた。エンコーダ・デコーダ構造などを用いて文脈を捉えた翻訳が可能になり、従来手法に比べて翻訳精度が大きく向上した。", "note": "ルールベース→統計的→NMTの変遷", "imp": "○"}, {"id": 519, "cat": "9.応用-言語音声", "term": "統計的機械翻訳", "en": "Statistical Machine Translation", "desc": "対訳データの統計的な傾向をもとに翻訳を行う機械翻訳手法であり、ルールベース機械翻訳とニューラル機械翻訳の間に主流となった技術である。精度向上には膨大な対訳データと、それを知識として獲得できる仕組みが必要だが、これは知識獲得のボトルネックと呼ばれる困難を伴った。", "note": "知識獲得のボトルネックが課題", "imp": "○"}, {"id": 520, "cat": "8.応用-画像", "term": "バウンディングボックス", "en": "Bounding Box", "desc": "物体検出タスクにおいて、画像中の物体の位置を囲んで示す矩形領域のことである。物体検出では、この矩形で物体の位置を特定するとともに、その物体が何のクラスに属するかを識別する。画像認識モデルの出力として物体ごとに座標とクラスラベルが与えられる形で用いられる。", "note": "物体検出タスクの位置表現", "imp": "○"}, {"id": 521, "cat": "8.応用-画像", "term": "パノプティックセグメンテーション", "en": "Panoptic Segmentation", "desc": "シーン中の背景から個々の物体まで、画像のあらゆる画素に意味を持たせて認識する画像認識タスクがパノプティックセグメンテーションである。背景も含めて画素ごとにクラスを割り当てるセマンティックセグメンテーションの網羅性と、同一クラス内の物体を個体ごとに区別するインスタンスセグメンテーションの識別力を両立させた手法として位置づけられる。", "note": "セマンティック+インスタンスの統合", "imp": "○"}, {"id": 522, "cat": "18.法律補完", "term": "パブリシティ権", "en": "Right of Publicity", "desc": "氏名や肖像がもつ知名度を第三者に無断で利用されない権利のことであり、本人の死後にも存続する可能性があるとされる。故人に関連するAI（音声合成や生成AIによる復元など）を開発する際には、このパブリシティ権やプライバシーの侵害、宗教的崇敬感情への配慮が必要になる。", "note": "故人AI開発時の法的配慮事項", "imp": "○"}, {"id": 523, "cat": "9.応用-言語音声", "term": "パルス符号変調", "en": "Pulse Code Modulation", "desc": "アナログの音声信号をデジタルデータに変換する代表的な符号化方式であり、PCM（Pulse Code Modulation）と略される。標本化・量子化・符号化という手順でアナログ信号を離散的な数値列に変換する処理であり、A-D変換の具体的な手法として音声認識や音声処理の前段で用いられる。", "note": "A-D変換の代表的手法", "imp": "○"}, {"id": 524, "cat": "13.数学統計", "term": "ヒストグラム", "en": "Histogram", "desc": "データの度数分布を、階級ごとの度数を棒グラフの形で可視化した図である。データ全体の分布の形状やばらつきを直感的に把握するために用いられ、決定木やデンドログラムのようなツリー構造による表現とは異なり、量的データの分布そのものを表現する点が特徴である。", "note": "度数分布の可視化", "imp": "○"}, {"id": 525, "cat": "9.応用-言語音声", "term": "フォルマント周波数", "en": "Formant Frequency", "desc": "音声のスペクトル包絡におけるピーク（フォルマント）に対応する周波数のことである。声道の形状によって決まり、母音の種類を特徴づける重要な情報となる。人間が感じる音の高さを表すメル尺度や、周波数成分を分析するFFTとあわせて、音声分析の基礎概念として扱われる。", "note": "母音識別に関わる音響特徴", "imp": "○"}, {"id": 526, "cat": "13.数学統計", "term": "ベクトル自己回帰モデル", "en": "Vector AutoRegressive model", "desc": "複数の時系列データを同時に扱う回帰分析の手法であり、VAR（Vector AutoRegressive model）と呼ばれる。単一の時系列データのみを扱う自己回帰モデル（AR）を拡張したもので、たとえばGDPと為替レートのように相互に関連する複数の時系列データから将来予測を行う際に用いられる。", "note": "ARを複数系列に拡張した手法", "imp": "○"}, {"id": 527, "cat": "13.数学統計", "term": "自己回帰モデル", "en": "AutoRegressive model", "desc": "数時間先の気温を、それ以前の気温の推移から予測するように、単一の時系列データだけを用いて未来の値を推測する手法がAR（自己回帰モデル）である。着目する時点の値を、それより前の時点の値の重み付き線形結合とランダムな誤差項で表現する点が特徴で、複数系列を扱うVARの土台となる考え方である。", "note": "単一系列を扱うVARの基礎形", "imp": "○"}, {"id": 528, "cat": "13.数学統計", "term": "ベルヌーイ分布", "en": "Bernoulli Distribution", "desc": "1回の試行の結果が成功か失敗かのように二つの状態のどちらかしか取らない場合に、その結果を表す確率変数が従う離散型の分布がベルヌーイ分布である。片方の事象が起こる確率をpとすれば、もう一方はその余事象として1-pの確率で起こると仮定し、二項分布やポアソン分布と並ぶ基本的な離散分布として、n回の試行を集約する二項分布の土台になっている。", "note": "二項分布の基礎、離散型分布", "imp": "○"}, {"id": 529, "cat": "7.DLの手法", "term": "ボトルネック構造", "en": "Bottleneck Structure", "desc": "特徴マップのチャンネル数を、両側から小さいフィルタの畳み込みで挟むようにして一時的に絞り込み、計算量を抑えてから元の次元に戻す設計である。ResNetのスキップ結合と組み合わせて使われ、勾配消失と計算コストという2つの課題を同時に緩和することで、50層や152層規模の深いネットワークでも学習を回せるようにしている。", "note": "ResNetの計算効率化構造", "imp": "○"}, {"id": 530, "cat": "13.数学統計", "term": "ポアソン分布", "en": "Poisson Distribution", "desc": "ある確率で生じる事象が、一定期間内に発生する回数を表す確率変数が従う離散型の確率分布である。ベルヌーイ分布や二項分布とともに代表的な離散型分布としてあげられ、たとえば一定時間内に店舗に来店する客数のような、稀にしか起きない事象の発生回数のモデル化に用いられる。", "note": "発生回数のモデル化、離散型分布", "imp": "○"}, {"id": 531, "cat": "13.数学統計", "term": "マハラノビス距離", "en": "Mahalanobis Distance", "desc": "変数（特徴量）間の相関関係を考慮したうえで2点間の距離を測る指標である。単純な直線距離であるユークリッド距離とは異なり、データの分布のばらつきや相関を反映するため、外れ値検出や異常検知において、データが密集する領域からの隔たりをより適切に評価できる。", "note": "相関を考慮した距離指標", "imp": "○"}, {"id": 532, "cat": "8.応用-画像", "term": "マルチスペクトル画像", "en": "Multispectral Image", "desc": "可視光に加えて赤外線などいくつもの波長帯の光（電磁波）の情報を、それぞれ独立したチャンネルとして同時に記録した画像のことである。人間の視覚では感知できない波長のデータも含んでいるため、たとえば農地の作物がどれくらい元気に育っているかを見極めるといった、目視だけでは分からない情報を読み取る用途に応用されている。", "note": "農業分野での生育状況測定に活用", "imp": "○"}, {"id": 533, "cat": "3.機械学習の手法", "term": "マルチタスク学習", "en": "Multi-task Learning", "desc": "単一のネットワークに複数の課題を並行して解かせるように学習させる手法の総称。似た性質を持つタスクどうしで特徴表現を共有させることで、それぞれを個別に学習するよりも効率よく汎化性能を伸ばせる場合があり、例えば物体検出で見つけた領域に対して同じネットワークがそのままセグメンテーションも担うといった使い方が考えられる。", "note": "1ネットワークで複数タスクを処理", "imp": "○"}, {"id": 534, "cat": "9.応用-言語音声", "term": "メル尺度", "en": "Mel Scale", "desc": "人間が感じる音の高さの差を表現するための尺度である。人間の聴覚特性は周波数に対して線形ではないため、この尺度を用いて周波数を変換することで、音声認識などにおいて人間の知覚に近い形で音声の特徴量（メル周波数ケプストラム係数など）を扱うことができる。", "note": "MFCC算出の基礎となる尺度", "imp": "○"}, {"id": 535, "cat": "6.DL学習技術", "term": "モデル圧縮", "en": "Model Compression", "desc": "限られた計算資源しか持たない環境でも機械学習モデルを動かせるようにするため、性能の低下を抑えつつモデルの容量そのものを削減する一連の技術を指す総称である。スマートフォンや組み込み機器などのエッジAI用途で重要とされ、知識蒸留・量子化・プルーニングといった手法が代表的な実現手段としてあげられる。", "note": "知識蒸留・量子化・プルーニング", "imp": "○"}, {"id": 536, "cat": "12.法律倫理", "term": "モデル汚染", "en": "Model Contamination", "desc": "モデル汚染とは、学習済みAIモデルのパラメータや振る舞いを攻撃者が意図的に改ざん・操作するセキュリティ上の脅威である。学習データを不正に操作するデータ汚染とは異なり、モデル自体に不正な入出力関係を埋め込む点が特徴である。AIシステムの透明性やセキュリティを確保するうえで、こうした攻撃手法への対策が重要視される。", "note": "データ汚染・モデル窃取と対比", "imp": "○"}, {"id": 537, "cat": "12.法律倫理", "term": "モデル窃取", "en": "Model Extraction", "desc": "モデル窃取とは、学習済みモデルに対して大量の入力データを与
