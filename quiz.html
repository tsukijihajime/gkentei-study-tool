<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>G検定 問題集</title>
<style>
:root{--bg:#0f172a;--panel:#1e293b;--panel2:#273449;--line:#334155;--text:#e2e8f0;
  --muted:#94a3b8;--accent:#38bdf8;--accent2:#0ea5e9;--imp-a:#f87171;--imp-b:#fbbf24;--imp-c:#34d399;
  --ok:#34d399;--ng:#f87171;}
*{box-sizing:border-box}
body{margin:0;font-family:"Meiryo UI","Segoe UI",system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
header{position:sticky;top:0;z-index:10;background:rgba(15,23,42,.96);backdrop-filter:blur(6px);
  border-bottom:1px solid var(--line);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:10px}
h1{margin:0;font-size:18px;display:flex;align-items:center;gap:10px}
h1 a{color:inherit;text-decoration:none}
h1 a:hover{color:var(--accent)}
h1 .badge{font-size:11px;background:var(--accent2);color:#02283a;padding:2px 8px;border-radius:10px;font-weight:700}
.timer{font-size:15px;font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums;display:none}
main{max-width:720px;margin:0 auto;padding:24px 20px 60px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:22px}
h2{margin:0 0 16px;font-size:16px;color:var(--accent)}
.grp{margin-bottom:20px}
.grp .label{font-size:13px;color:var(--muted);margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.grp .label button{background:none;border:none;color:var(--accent);font-size:12px;cursor:pointer;padding:0}
.grp .label .labelbtns{display:flex;gap:10px}
.chips{display:flex;flex-wrap:wrap;gap:7px}
.chips label{display:flex;align-items:center;gap:5px;background:var(--panel2);border:1px solid var(--line);
  padding:6px 11px;border-radius:8px;font-size:13px;cursor:pointer;user-select:none}
.chips input{accent-color:var(--accent)}
select{padding:9px 12px;border-radius:9px;border:1px solid var(--line);background:var(--panel2);color:var(--text);font-size:14px}
.poolcount{color:var(--muted);font-size:13px;margin-top:4px}
.startbtn{margin-top:8px;width:100%;padding:13px;font-size:15px;font-weight:700;border-radius:10px;border:none;
  background:var(--accent2);color:#02283a;cursor:pointer}
.startbtn:disabled{background:var(--line);color:var(--muted);cursor:not-allowed}
.imp{font-size:11px;font-weight:700;border-radius:6px;padding:1px 7px;color:#0b1220}
.imp.a{background:var(--imp-a)}.imp.b{background:var(--imp-b)}.imp.c{background:var(--imp-c)}
.qhead{display:flex;justify-content:space-between;align-items:center;color:var(--muted);font-size:13px;margin-bottom:10px}
.qcat{font-size:11px;color:var(--accent);background:rgba(56,189,248,.12);padding:1px 8px;border-radius:6px}
.qdesc{font-size:16px;margin:10px 0 20px;padding:16px;background:var(--panel2);border-radius:10px;border:1px solid var(--line)}
.choices{display:flex;flex-direction:column;gap:9px}
.choice{text-align:left;padding:12px 15px;border-radius:9px;border:1px solid var(--line);background:var(--panel2);
  color:var(--text);font-size:15px;cursor:pointer;transition:.12s}
.choice:hover:not(:disabled){border-color:var(--accent)}
.choice:disabled{cursor:default}
.choice.correct{border-color:var(--ok);background:rgba(52,211,153,.15);color:#a7f3d0}
.choice.wrong{border-color:var(--ng);background:rgba(248,113,113,.15);color:#fecaca}
.result{margin-top:18px;padding:16px;border-radius:10px;border:1px dashed var(--line)}
.result .verdict{font-weight:700;font-size:15px;margin-bottom:8px}
.result .verdict.ok{color:var(--ok)}
.result .verdict.ng{color:var(--ng)}
.result dt{color:var(--accent);font-size:12px;margin-top:10px;font-weight:700}
.result dd{margin:4px 0 0;font-size:14px}
.nextbtn{margin-top:16px;width:100%;padding:12px;font-size:14px;font-weight:700;border-radius:9px;border:none;
  background:var(--accent2);color:#02283a;cursor:pointer}
.scorebig{font-size:44px;font-weight:700;text-align:center;margin:10px 0}
.scoresub{text-align:center;color:var(--muted);margin-bottom:8px}
.timeinfo{display:flex;justify-content:center;gap:22px;color:var(--muted);font-size:13px;margin-bottom:4px}
.timeinfo b{color:var(--text)}
.pace{text-align:center;font-size:13px;margin-bottom:22px}
.pace.ok{color:var(--ok)}
.pace.ng{color:var(--ng)}
.pace b{font-weight:700}
.resultbtns{display:flex;gap:10px}
.resultbtns button{flex:1;padding:12px;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer;border:1px solid var(--line)}
.resultbtns .again{background:var(--accent2);color:#02283a;border:none}
.resultbtns .back{background:var(--panel2);color:var(--text)}
.progressbar{height:6px;border-radius:3px;background:var(--line);overflow:hidden;margin-bottom:18px}
.progressbar .fill{height:100%;background:var(--accent2);transition:width .2s}
</style>
</head>

<main id="app"></main>
<script>
const DATA = [{"id": 1, "cat": "1.AIとAIの動向", "term": "人工知能(AI)", "en": "Artificial Intelligence", "desc": "人間が持つ学習・推論・判断といった知的活動をコンピュータ上で模倣・再現しようとする技術および学問分野の総称である。専門家の間でも「知能とは何か」自体の合意がなく、探索・推論を重視する立場から統計的学習を重視する立場まで定義は多岐にわたる。実例として、画像認識・自動翻訳・将棋AIなどはいずれも広義のAIに含まれる。", "note": "明確な定義は無く研究者で見解が分かれる", "imp": "◎"}, {"id": 2, "cat": "1.AIとAIの動向", "term": "強いAI／弱いAI", "en": "Strong AI / Weak AI", "desc": "哲学者ジョン・サールによる分類で、強いAIは人間と同様の意識・自我を持ち多様な課題を自ら考えて解決できる汎用的な知能を指し、弱いAIは意識を持たず特定の目的に特化して処理を行うものを指す。現在実用化されているAI（画像分類・音声認識・将棋AIなど）はすべて弱いAIに分類され、意識を伴う強いAIはまだ実現していない。", "note": "ジョン・サールが提唱", "imp": "○"}, {"id": 3, "cat": "1.AIとAIの動向", "term": "汎用人工知能", "en": "AGI", "desc": "特定の作業に限定されず、人間のように未知の課題にも自律的に対応し多様な分野で学習・応用できる知能を指す概念である。現在実用化されているAIは画像認識や翻訳など単一タスクに特化した特化型AI（弱いAI）にとどまり、AGIは研究段階の目標として位置づけられている。AGIをさらに超えて人間の知能を凌駕する存在は超知能（ASI）と呼ばれる。", "note": "ASIは超知能", "imp": "○"}, {"id": 4, "cat": "1.AIとAIの動向", "term": "エニアック", "en": "ENIAC", "desc": "1946年にアメリカのペンシルベニア大学で開発された、真空管を用いた世界初級の汎用電子計算機である。弾道計算などの数値計算のために作られたが、プログラムを変更することで様々な計算に対応できる汎用性を備えており、後のコンピュータおよびAI研究の基盤となった。AI研究そのものより前の、計算機科学の黎明期を象徴する存在として位置づけられる。", "note": "AI研究の前史", "imp": "△"}, {"id": 5, "cat": "1.AIとAIの動向", "term": "ダートマス会議", "en": "Dartmouth Conference", "desc": "1956年にアメリカのダートマス大学で開催された会議で、ジョン・マッカーシーが「Artificial Intelligence（人工知能）」という言葉を初めて公式に使用したことから、AI研究の出発点とされる。マービン・ミンスキーやクロード・シャノンら当時の第一線の研究者が集まり、機械が学習し推論する可能性について議論した。この会議を契機に第1次AIブームが始まったとされる。", "note": "AI研究の起点", "imp": "◎"}, {"id": 6, "cat": "1.AIとAIの動向", "term": "ジョン・マッカーシー", "en": "John McCarthy", "desc": "1956年のダートマス会議を主催し「人工知能（Artificial Intelligence）」という語を初めて提唱した計算機科学者である。関数型プログラミング言語LISPを開発したことでも知られ、LISPは記号処理に適した特性から長らくAI研究の中心的な実装言語として用いられた。探索や論理推論に基づくAI研究の礎を築いた人物と評される。", "note": "ダートマス会議主催", "imp": "○"}, {"id": 7, "cat": "1.AIとAIの動向", "term": "第1次AIブーム", "en": "1st AI Boom", "desc": "1950年代後半から1960年代にかけて起きたAI研究の最初の盛り上がりで、迷路探索やパズルのように明確なルールに基づく問題を、コンピュータで体系的に探索・推論して解く手法が中心であった。しかし現実社会の問題は条件が複雑で単純なルール化が難しく、簡単な問題（トイプロブレム）しか解けないことが露呈し、1970年代には研究資金や関心が急速に失われる「AIの冬」を迎えた。", "note": "トイプロブレムの限界で冬の時代へ", "imp": "◎"}, {"id": 8, "cat": "1.AIとAIの動向", "term": "第2次AIブーム", "en": "2nd AI Boom", "desc": "1980年代に起きた2度目のAI研究ブームで、専門家の知識をif-thenルールとしてコンピュータに蓄積し推論させるエキスパートシステムが中心的な技術であった。医療診断支援のMYCINなど実用システムも登場したが、知識を人手で網羅的にルール化する作業（知識獲得のボトルネック）が膨大な労力を要し、限界に達して再び停滞期に入った。", "note": "知識獲得のボトルネックで停滞", "imp": "◎"}, {"id": 9, "cat": "1.AIとAIの動向", "term": "第3次AIブーム", "en": "3rd AI Boom", "desc": "2000年代以降、現在まで続いているAI研究の盛り上がりで、大量のデータ（ビッグデータ）とGPUによる並列計算能力の向上を背景に、機械学習とりわけディープラーニング（深層学習）が急速に発展したことが特徴である。2012年の画像認識コンペティションILSVRCでディープラーニングが圧倒的な精度を示したことが象徴的な転換点とされ、以降、画像認識・自然言語処理・生成AIなど幅広い分野で実用化が進んでいる。", "note": "ビッグデータとGPUが背景", "imp": "◎"}, {"id": 10, "cat": "1.AIとAIの動向", "term": "トイプロブレム", "en": "Toy Problem", "desc": "迷路やパズル、ハノイの塔のように、ルールや条件があらかじめ明確に定義された単純な問題を指す。第1次AIブームの探索・推論技術はこうした問題は解けたが、条件が曖昧で情報量が膨大な現実世界の問題（例えば日常会話の理解や交渉ごと）には対応できず、この限界が第1次ブーム終焉の一因となった。", "note": "第1次ブームの限界", "imp": "○"}, {"id": 11, "cat": "1.AIとAIの動向", "term": "AI効果", "en": "AI Effect", "desc": "ある技術がAIとして解明・実用化されると「それは単なる自動処理であって本当の知能ではない」と評価が下がってしまう心理的傾向を指す。例えば、かつては知的作業とされた将棋や計算が、アルゴリズムとして解明されると「知能」という扱いを受けにくくなる現象がこれにあたり、AIの定義そのものが常に「未解明の部分」に依存していることを示す一例とされる。", "note": "", "imp": "○"}, {"id": 12, "cat": "1.AIとAIの動向", "term": "チューリングテスト", "en": "Turing Test", "desc": "1950年に数学者アラン・チューリングが提案した、機械が知的かどうかを判定するための試験である。判定者が別室の人間と機械の両方と文字だけで対話し、どちらが機械か区別できなければ、その機械は知能を持つとみなすという方法をとる。近年の対話型AI（チャットボット）の性能評価の議論でも、しばしばこのテストが引き合いに出される。", "note": "アラン・チューリングが提案", "imp": "◎"}, {"id": 13, "cat": "1.AIとAIの動向", "term": "ローブナーコンテスト", "en": "Loebner Prize", "desc": "チューリングテストの考え方に基づいて実施される、会話AI（チャットボット）同士の性能を競うコンテストである。審査員が人間とプログラムのテキスト対話を見分けられるかを競い、最も人間らしいと判定されたプログラムに賞が与えられる。1990年代から続く歴史あるイベントであり、対話AI研究の実践的な評価の場として知られる。", "note": "", "imp": "△"}, {"id": 14, "cat": "1.AIとAIの動向", "term": "中国語の部屋", "en": "Chinese Room", "desc": "哲学者ジョン・サールが1980年に提唱した思考実験で、中国語を理解しない人が、中国語の記号を規則に従って機械的に変換するマニュアルだけを使い、部屋の外の人と中国語で受け答えできたとしても、その人は中国語を「理解」しているとは言えないという例え話である。記号を規則通りに処理できても意味の理解を伴うとは限らないことを示し、意識を持つ「強いAI」の実現可能性に対する批判として引用される。", "note": "サールが強いAIを批判", "imp": "○"}, {"id": 15, "cat": "1.AIとAIの動向", "term": "シンギュラリティ", "en": "Singularity", "desc": "AIが自己改善を繰り返すなどして人間の知能を大きく超え、技術進歩の速度が人間の予測や制御を超えてしまう転換点を指す概念である。発明家レイ・カーツワイルは著書でこの技術的特異点が2045年に到来すると予測したことで広く知られるようになった。実現の是非や時期については研究者の間でも意見が分かれる、AIの将来像をめぐる議論の代表的なキーワードである。", "note": "カーツワイルが2045年と予測", "imp": "○"}, {"id": 16, "cat": "1.AIとAIの動向", "term": "フレーム問題", "en": "Frame Problem", "desc": "現実世界のあらゆる事象の中から、今取り組んでいる課題に関係する情報だけを過不足なく取り出すことが、原理的に非常に難しいという問題である。ジョン・マッカーシーらが1969年に指摘し、例えば「部屋を掃除する」という単純な指示でも、関係しそうな無数の可能性（家具を壊さない、ペットに注意する等）を全て考慮しようとすると処理が終わらなくなる。AIが実世界で柔軟に振る舞う上での根本的な壁とされ、強いAI実現の困難さを示す論点として頻繁に引用される。", "note": "マッカーシーらが提起", "imp": "◎"}, {"id": 17, "cat": "1.AIとAIの動向", "term": "シンボルグラウンディング問題", "en": "Symbol Grounding", "desc": "コンピュータが扱う記号（例えば「りんご」という文字列）と、それが指し示す実世界の意味や対象（実際の赤い果物、味、重さなど）とを結びつけられないという問題である。認知科学者スティーブン・ハルナッドが1990年に提起し、記号処理だけに基づくAIが本当の意味で「理解」しているとは言えない根拠として議論される。ディープラーニングによる画像と言語の関連学習（マルチモーダル学習）は、この問題への一つのアプローチとされる。", "note": "ハルナッドが提起", "imp": "◎"}, {"id": 18, "cat": "1.AIとAIの動向", "term": "身体性", "en": "Embodiment", "desc": "知能は脳内の記号処理だけで成立するのではなく、身体を持って外界と物理的に相互作用する経験を通じて初めて獲得・発揮されるとする考え方である。人間が「熱い」という概念を単なる知識としてではなく実際に触れた経験から理解するように、ロボットが身体を使って環境と関わることで知能を発達させるアプローチの根拠とされる。シンボルグラウンディング問題への一つの解決の方向性としても位置づけられる。", "note": "", "imp": "○"}, {"id": 19, "cat": "1.AIとAIの動向", "term": "知識獲得のボトルネック", "en": "Knowledge Acquisition", "desc": "エキスパートシステムを構築する際、専門家が持つ膨大かつ暗黙的な知識を人手で洗い出し、if-thenルールとして体系的に記述する作業に限界が生じる問題である。専門知識には言語化しにくい経験や勘（暗黙知）が多く含まれ、ルール化には膨大な時間とコストがかかる。この問題が、知識ベース中心のアプローチであった第2次AIブームが停滞した主要因の一つとされる。", "note": "第2次ブームの停滞要因", "imp": "○"}, {"id": 20, "cat": "1.AIとAIの動向", "term": "ムーアの法則", "en": "Moore's Law", "desc": "半導体の集積回路上に搭載できるトランジスタの数が、おおよそ1.5年から2年ごとに倍増するという、インテル共同創業者ゴードン・ムーアが1965年に提唱した経験則である。厳密な物理法則ではないが長年にわたり半導体産業の目安として機能し、計算機の処理能力向上とコスト低下を通じて、ビッグデータ処理やディープラーニングの学習に必要な計算資源の確保を支える背景要因の一つとなった。", "note": "計算資源増大の背景", "imp": "△"}, {"id": 21, "cat": "2.探索推論知識表現", "term": "探索木", "en": "Search Tree", "desc": "問題解決における状態遷移を、各状態をノード（節点）、状態間の操作をエッジ（枝）として木構造で表現したものである。例えば将棋であれば、現在の盤面がノード、指し手がエッジとなり、そこから可能な手を辿ることで先の展開を体系的に検討できる。幅優先探索や深さ優先探索、Mini-Max法など多くの探索アルゴリズムの基礎となる表現形式である。", "note": "", "imp": "○"}, {"id": 22, "cat": "2.探索推論知識表現", "term": "幅優先探索", "en": "Breadth First Search", "desc": "探索木において、スタート地点に近い浅い階層のノードから順にすべて調べ、それが終わってから次の深さへ進む探索方法である。層ごとに漏れなく調べるため最短手数の解を必ず発見できるという利点がある一方、階層が深くなるほど調べるべきノード数が指数的に増え、メモリ消費が大きくなる欠点を持つ。迷路の最短経路探索などに用いられる代表的な手法である。", "note": "BFS", "imp": "◎"}, {"id": 23, "cat": "2.探索推論知識表現", "term": "深さ優先探索", "en": "Depth First Search", "desc": "探索木において、一つの経路を可能な限り深く進み、行き止まりに達したら手前に戻って別の経路を試す探索方法である。同時に保持しておく情報が少なくて済むためメモリ効率が良い一方、最短経路を見つける保証がなく、無駄に深い経路に迷い込む可能性がある。バックトラック法によるパズル解法などで広く利用される。", "note": "DFS", "imp": "◎"}, {"id": 24, "cat": "2.探索推論知識表現", "term": "ハノイの塔", "en": "Tower of Hanoi", "desc": "3本の杭と大きさの異なる複数の円盤を使い、決められたルールに従って全ての円盤を別の杭に移す、探索アルゴリズムの学習によく使われる代表的なトイプロブレムである。円盤の数をn枚とすると最小手数は2のn乗マイナス1回となることが数学的に知られており、状態空間探索の考え方を具体的に体験できる題材として教育やAI研究の入門例に用いられる。", "note": "", "imp": "△"}, {"id": 25, "cat": "2.探索推論知識表現", "term": "ヒューリスティック", "en": "Heuristic", "desc": "厳密な正解を保証はしないが、経験則や大まかな見積もりに基づいて探索の効率を高める判断基準や手がかりを指す。例えば地図上の最短経路探索で「目的地までの直線距離が近い方向を優先的に調べる」といった工夫がこれにあたり、全ての可能性を総当たりで調べるより大幅に計算時間を短縮できる。A*アルゴリズムなど多くの効率的な探索手法の中核をなす考え方である。", "note": "", "imp": "○"}, {"id": 26, "cat": "2.探索推論知識表現", "term": "A*アルゴリズム", "en": "A-star", "desc": "スタートからの実際の移動コストと、ゴールまでの推定コスト（ヒューリスティック関数）を足し合わせた評価値をもとに、次に調べるノードを選びながら最短経路を効率よく探索するアルゴリズムである。カーナビの経路探索やゲームのキャラクター移動など幅広く実用化されており、ヒューリスティックの見積もりが適切であれば幅優先探索より大幅に少ない計算量で最適解に到達できる。", "note": "ヒューリスティック探索", "imp": "○"}, {"id": 27, "cat": "2.探索推論知識表現", "term": "Mini-Max法", "en": "Minimax", "desc": "2人零和ゲームにおいて、自分の手番では自分の利得（評価値）が最大になる手を選び、相手の手番では相手が自分に最も不利な手（自分の評価値が最小になる手）を選ぶと仮定して、先の展開を交互にシミュレーションしながら最善手を決める探索手法である。三目並べやチェスなどのボードゲームAIの基本原理であり、盤面を深く読むほど精度は上がるが計算量も指数的に増大する。", "note": "", "imp": "◎"}, {"id": 28, "cat": "2.探索推論知識表現", "term": "αβ法", "en": "Alpha-Beta Pruning", "desc": "Mini-Max法による探索において、既に調べた分岐の評価値から見て「これ以上探索しても最終的な結論を変えられない」と判明した枝を計算せずに打ち切ることで、探索を大幅に高速化する手法である。自分に不利な結果が確定した枝を切り捨てるのがαカット、相手に不利な結果が確定した枝を切り捨てるのがβカットと呼ばれる。将棋やチェスAIにおいて、同じ精度をより少ない計算量で実現するための基本技術として用いられる。", "note": "αカット/βカット", "imp": "◎"}, {"id": 29, "cat": "2.探索推論知識表現", "term": "モンテカルロ法", "en": "Monte Carlo Method", "desc": "全ての可能性を厳密に計算するのが困難な場合に、ランダムに手を進めるプレイアウト（シミュレーション）を多数回試行し、その勝率の統計から各手の良し悪しを評価する手法である。特に囲碁のように盤面のパターンが膨大でMini-Max法では計算量が爆発してしまうゲームにおいて有効性が示され、モンテカルロ木探索（MCTS）として発展し、AlphaGoなどの囲碁AIの中核技術の一つとなった。", "note": "囲碁AIで活躍", "imp": "◎"}, {"id": 30, "cat": "2.探索推論知識表現", "term": "ブルートフォース", "en": "Brute Force", "desc": "工夫や効率化を行わず、考えられる全ての可能性を単純に総当たりで調べ尽くす力任せの探索手法である。問題の規模が小さければ確実に正解を見つけられるが、組み合わせの数が増えると計算量が爆発的に増加し現実的な時間で解けなくなるため、ヒューリスティックや枝刈りなどの効率化技術と対比して語られることが多い。", "note": "", "imp": "△"}, {"id": 31, "cat": "2.探索推論知識表現", "term": "ディープブルー", "en": "Deep Blue", "desc": "IBMが開発したチェス専用コンピュータで、1997年に当時のチェス世界チャンピオンであったガルリ・カスパロフに公式戦で勝利したことで世界的に注目された。膨大な計算資源を用いたMini-Max探索とαβ法による高速な先読みが強さの源泉であり、コンピュータが特定分野で人間のトップレベルを超えられることを示した象徴的な出来事として知られる。", "note": "", "imp": "○"}, {"id": 32, "cat": "2.探索推論知識表現", "term": "エキスパートシステム", "en": "Expert System", "desc": "特定分野の専門家が持つ知識をif-thenルールの形で知識ベースに蓄積し、それをもとに推論エンジンが結論を導き出すことで、専門家のような判断を再現しようとするシステムである。第2次AIブームの中心技術であり、感染症診断を支援したMYCINなどが代表例として知られる。ルールが明確な分野では有効だったが、知識を網羅的に人手で整備するコストの大きさが後に限界として露呈した。", "note": "第2次ブームの中心", "imp": "◎"}, {"id": 33, "cat": "2.探索推論知識表現", "term": "マイシン", "en": "MYCIN", "desc": "血液感染症を引き起こす細菌を特定し、適切な抗生物質の選択を支援するために構築されたエキスパートシステムがマイシンである。スタンフォード大学の研究チームが1970年代に開発したもので、医師とのやり取りを通じて収集した情報にif-thenルールを適用しながら病原菌を推定する仕組みを持ち、専門医に近い診断精度を示した事例としてルールベースAIの有効性を象徴する存在となった。", "note": "", "imp": "○"}, {"id": 34, "cat": "2.探索推論知識表現", "term": "DENDRAL", "en": "DENDRAL", "desc": "スタンフォード大学の研究グループが手がけた、質量分析データから未知の有機化合物の構造を推定する初期のエキスパートシステムがDENDRALである。開発の中心人物はエドワード・ファイゲンバウムで、専門家の化学知識をif-thenルールとして組み込み推論する方式は、後年のMYCINなどエキスパートシステム研究全体の出発点となった。", "note": "ファイゲンバウム", "imp": "△"}, {"id": 35, "cat": "2.探索推論知識表現", "term": "知識ベース", "en": "Knowledge Base", "desc": "エキスパートシステムにおいて、専門家から集めたルールや事実、経験則などを体系的に蓄積したデータの集合体を指す。推論エンジンがこの知識ベースを参照して結論を導き出す構造になっており、いわばシステムの「知識の源」にあたる部分である。知識ベースの質と網羅性が、システム全体の判断精度を大きく左右する。", "note": "推論エンジンと対", "imp": "○"}, {"id": 36, "cat": "2.探索推論知識表現", "term": "推論エンジン", "en": "Inference Engine", "desc": "エキスパートシステムにおいて、知識ベースに蓄積されたルールや事実を組み合わせ、与えられた条件から論理的に結論を導き出す処理を担う仕組みである。例えば「発熱があり、かつ特定の症状がある場合はある病気の疑いが高い」といったルールを次々と適用し、最終的な診断や判断結果を出力する。知識ベースとセットでエキスパートシステムの根幹をなす。", "note": "", "imp": "○"}, {"id": 37, "cat": "2.探索推論知識表現", "term": "意味ネットワーク", "en": "Semantic Network", "desc": "概念（言葉や事物）をノードとして表し、それらの間の関係性を「is-a（〜の一種である）」や「part-of（〜の一部である）」といったリンク（矢印）で結んで知識を表現する手法である。例えば「カナリア is-a 鳥」「鳥 is-a 動物」のようにつなぐことで、上位概念の性質（動物は動く、など）を下位概念が自動的に継承していると解釈できる。人間の連想的な知識構造をコンピュータ上で表現する初期の代表的手法である。", "note": "is-a / part-of関係", "imp": "△"}, {"id": 38, "cat": "2.探索推論知識表現", "term": "オントロジー", "en": "Ontology", "desc": "ある分野に含まれる概念とその関係性を、誰が見ても解釈が一致するよう体系的・形式的に整理し記述する知識表現の枠組みである。哲学用語の「存在論」に由来し、コンピュータが知識を共有・再利用できるようにすることを目的とする。セマンティックWebやCycプロジェクトなど、機械が意味を扱うための基盤技術として位置づけられる。", "note": "", "imp": "◎"}, {"id": 39, "cat": "2.探索推論知識表現", "term": "ヘビーウェイトオントロジー", "en": "Heavyweight Ontology", "desc": "専門家が時間をかけて厳密に定義・検証しながら構築する、精度の高い網羅的なオントロジーを指す。代表例としてCycプロジェクトが挙げられ、一般常識を漏れなく体系化しようとするため構築に膨大な人手とコストがかかる。データから自動生成される簡易的なライトウェイトオントロジーと対比して語られる。", "note": "対：ライトウェイト", "imp": "○"}, {"id": 40, "cat": "2.探索推論知識表現", "term": "ライトウェイトオントロジー", "en": "Lightweight Ontology", "desc": "人手による厳密な定義を最小限にとどめ、Web上のデータやテキストからの自動抽出・機械学習などにより比較的簡易に構築されるオントロジーを指す。ウェブマイニングなどの技術を用いることで、ヘビーウェイトオントロジーに比べて低コストかつ迅速に知識体系を整備できる利点がある一方、厳密性や一貫性はやや劣る傾向がある。", "note": "Cyc/ウェブマイニング", "imp": "○"}, {"id": 41, "cat": "2.探索推論知識表現", "term": "Cycプロジェクト", "en": "Cyc Project", "desc": "1984年にダグラス・レナットが開始した、人間が当たり前に持っている一般常識（例えば「水は下に流れる」など）を網羅的にデータベース化し、機械に常識的な推論をさせようとする長期プロジェクトである。ヘビーウェイトオントロジーの代表例として知られ、40年以上にわたり継続しているが、常識の範囲が膨大であるため完成には至っていない。知識獲得の困難さを象徴する事例として頻繁に言及される。", "note": "1984年〜", "imp": "△"}, {"id": 42, "cat": "2.探索推論知識表現", "term": "セマンティックWeb", "en": "Semantic Web", "desc": "Web上の情報に「意味」を持たせるためのメタデータ（RDFやOWLといった記述形式）を付与し、コンピュータがWebページの内容を人間のように理解・処理できるようにしようとする構想である。従来のWebが人間の閲覧を前提としていたのに対し、機械同士が情報を自動的にやり取りし関連付けられる仕組みを目指すもので、オントロジー技術の応用分野の一つに位置づけられる。", "note": "RDF/OWL", "imp": "△"}, {"id": 43, "cat": "2.探索推論知識表現", "term": "ワトソン", "en": "Watson", "desc": "IBMが開発した質問応答システムで、2011年にアメリカのクイズ番組「Jeopardy!」において人間のチャンピオンを破り勝利したことで大きな話題となった。大量の自然言語テキストを解析し、曖昧な言い回しの質問に対しても確信度を計算しながら最も妥当な回答を導き出す技術が搭載されており、後に医療診断支援など企業向けAIサービスにも応用された。", "note": "", "imp": "○"}, {"id": 44, "cat": "2.探索推論知識表現", "term": "東ロボくん", "en": "Todai Robot", "desc": "国立情報学研究所が中心となり2011年から進められた、AIに大学入試センター試験（東京大学合格）を突破させることを目指したプロジェクトである。統計的な処理や知識ベースを組み合わせて多くの科目で一定の成績を残したが、文章の意味を本質的に理解する必要がある問題群では限界に直面し、2016年に東大合格を目標とする活動が凍結された。AIの言語理解の壁を具体的に示した事例として知られる。", "note": "意味理解の壁で断念", "imp": "△"}, {"id": 45, "cat": "2.探索推論知識表現", "term": "イライザ", "en": "ELIZA", "desc": "1966年にジョセフ・ワイゼンバウムが開発した初期の対話プログラムで、相手の発言中のキーワードを検出し、あらかじめ用意されたパターンに当てはめて応答を返す単純な仕組みでありながら、あたかもカウンセラーのように人間らしい会話を成立させた。利用者が単純な仕組みと知りながらも機械に感情や理解力があるかのように錯覚してしまう現象は「イライザ効果」と呼ばれ、対話AIの評価における注意点として今も引用される。", "note": "イライザ効果", "imp": "△"}, {"id": 46, "cat": "3.機械学習の手法", "term": "機械学習", "en": "Machine Learning", "desc": "人間が明示的にルールを書く代わりに、大量のデータから統計的なパターンや規則性をコンピュータ自身に発見させる技術群である。ディープラーニングもその一分野であり、画像認識のように「猫の特徴を条件式で列挙する」のが困難な問題でも、データを与えるだけでモデルが判断基準を獲得できる点が重要である。教師あり学習・教師なし学習・強化学習の3種類に大別される。", "note": "", "imp": "◎"}, {"id": 47, "cat": "3.機械学習の手法", "term": "教師あり学習", "en": "Supervised Learning", "desc": "入力データとその正解（ラベル）のペアを大量に与え、入力から正解を予測する関数をモデルに学習させる方法である。例えば「家の広さ」と「価格」のペアから価格を予測する、あるいは「メール文面」と「迷惑メールか否か」のペアから判定器を作るなど、身近な予測タスクの多くがこれにあたる。出力が連続値なら回帰、離散的なカテゴリなら分類と呼ばれる。", "note": "回帰・分類", "imp": "◎"}, {"id": 48, "cat": "3.機械学習の手法", "term": "教師なし学習", "en": "Unsupervised Learning", "desc": "正解ラベルを一切与えず、データそのものに内在する構造や規則性を見つけ出す学習方法である。例えば顧客の購買データを似た傾向ごとにグループ分けするクラスタリングや、高次元データの本質的な特徴を少数の軸に圧縮する次元削減が代表例となる。正解が存在しない、あるいは用意するコストが高い実世界データの分析に広く使われる。", "note": "クラスタリング・次元削減", "imp": "◎"}, {"id": 49, "cat": "3.機械学習の手法", "term": "強化学習", "en": "Reinforcement Learning", "desc": "エージェントが環境の中で行動し、その結果得られる報酬（スコア）を手がかりに、将来得られる報酬の総和を最大化する行動方針を試行錯誤で学習する枠組みである。囲碁AIのAlphaGoが対局を繰り返しながら勝率を高めていく仕組みや、ロボット制御の学習がその代表例である。正解データではなく報酬信号だけを頼りに学ぶ点が教師あり学習と大きく異なる。", "note": "", "imp": "◎"}, {"id": 50, "cat": "3.機械学習の手法", "term": "半教師あり学習", "en": "Semi-supervised", "desc": "ラベル付けにはコストや手間がかかるため、少量のラベル付きデータと大量のラベル無しデータを組み合わせて学習効率を高める手法である。例えば数百枚だけ手動で分類した画像と、ラベルの無い数万枚の画像を併用してモデルの精度を底上げするような場面で使われる。教師あり学習と教師なし学習の中間に位置づけられる。", "note": "", "imp": "○"}, {"id": 51, "cat": "3.機械学習の手法", "term": "回帰", "en": "Regression", "desc": "身長から体重を予測する、気温からアイスクリームの売上を予測するといった、連続的な数値を出力する教師あり学習のタスクである。予測値と実際の値との誤差（例えば二乗誤差）を最小化するようにモデルのパラメータを調整して学習が進む。出力がカテゴリになる分類タスクと対をなす基本概念である。", "note": "対：分類", "imp": "◎"}, {"id": 52, "cat": "3.機械学習の手法", "term": "分類", "en": "Classification", "desc": "入力データを「犬か猫か」「スパムか正常なメールか」のように、あらかじめ定められた離散的なカテゴリのどれに属するかを判定する教師あり学習のタスクである。2クラスに分ける二値分類と、3つ以上に分ける多クラス分類がある。出力が連続値となる回帰タスクと対比される、機械学習の最も基本的な問題設定の一つである。", "note": "", "imp": "◎"}, {"id": 53, "cat": "3.機械学習の手法", "term": "線形回帰", "en": "Linear Regression", "desc": "入力変数と出力変数の関係を直線（多変数なら平面や超平面）で近似するもっとも基本的な回帰手法である。予測値と実際の値との差（残差）の二乗和を最小にするようにパラメータを求める最小二乗法が代表的な学習方法であり、住宅の広さから価格を予測するような単純な関係のモデル化に使われる。モデルの解釈がしやすい反面、非線形な関係の表現には限界がある。", "note": "最小二乗法", "imp": "◎"}, {"id": 54, "cat": "3.機械学習の手法", "term": "ロジスティック回帰", "en": "Logistic Regression", "desc": "線形結合した入力をシグモイド関数に通し、0から1の範囲の確率として出力することで分類問題を解く手法である。名前に「回帰」とあるが実際には分類タスクに使われ、例えば顧客データから解約するかどうかの確率を予測するような二値分類でよく用いられる。出力確率にしきい値（通常0.5）を設けてクラスを決定する仕組みが特徴である。", "note": "名前は回帰だが分類", "imp": "◎"}, {"id": 55, "cat": "3.機械学習の手法", "term": "ラッソ回帰", "en": "Lasso Regression", "desc": "線形回帰の損失関数に係数の絶対値の和（L1正則化項）を加えることで、重要度の低い特徴量の係数を厳密に0に押し下げる回帰手法である。結果としてモデルがスパース（疎）になり、自動的に特徴選択を行ったのと同じ効果が得られる。特徴量の数が非常に多いデータで、本質的に効いている変数を絞り込みたい場合に有効である。", "note": "スパース化", "imp": "○"}, {"id": 56, "cat": "3.機械学習の手法", "term": "リッジ回帰", "en": "Ridge Regression", "desc": "線形回帰の損失関数に係数の二乗和（L2正則化項）を加え、係数の値全体を小さく滑らかに抑えることで過学習を防ぐ回帰手法である。ラッソ回帰と異なり係数が完全に0にはならず、多重共線性（特徴量同士の強い相関）がある場合でも安定した学習ができる点が特徴である。", "note": "過学習抑制", "imp": "○"}, {"id": 57, "cat": "3.機械学習の手法", "term": "Elastic Net", "en": "Elastic Net", "desc": "ラッソ回帰のL1正則化とリッジ回帰のL2正則化を一定の割合で組み合わせた回帰手法である。L1による特徴選択の効果とL2による係数の安定化を両立させることができ、相関の強い特徴量が多数存在するデータに対してラッソ単体よりも頑健な結果が得られる。", "note": "", "imp": "△"}, {"id": 58, "cat": "3.機械学習の手法", "term": "サポートベクターマシン", "en": "SVM", "desc": "異なるクラスのデータ群を分ける境界線（超平面）を引く際に、境界と各クラスの最も近いデータ点との距離（マージン）を最大化するように学習する分類・回帰手法である。線形分離できないデータに対してはカーネル法を組み合わせて非線形な境界を扱うことができ、比較的少ないデータでも高い汎化性能を発揮しやすいことで知られる。", "note": "カーネル法と併用", "imp": "◎"}, {"id": 59, "cat": "3.機械学習の手法", "term": "マージン最大化", "en": "Margin Maximization", "desc": "分類の境界線と、それに最も近い各クラスのデータ点（サポートベクター）との距離を可能な限り広くとろうとする考え方である。マージンが広いほど未知のデータに対しても誤分類しにくくなると考えられており、SVMがなぜ高い汎化性能を持つかを説明する基本原理となっている。", "note": "SVMの基本原理", "imp": "○"}, {"id": 60, "cat": "3.機械学習の手法", "term": "カーネルトリック", "en": "Kernel Trick", "desc": "データを高次元空間へ実際に写像する計算をせずに、その空間での内積計算だけを効率的に行うことで非線形な分離を可能にする技法である。例えば2次元では直線で分けられないデータでも、カーネル関数（ガウスカーネルや多項式カーネルなど）を通すことで高次元上では線形分離可能になったのと同じ効果を、低コストな計算で得られる。SVMを非線形問題に拡張する際の中核技術である。", "note": "SVM", "imp": "◎"}, {"id": 61, "cat": "3.機械学習の手法", "term": "スラック変数", "en": "Slack Variable", "desc": "SVMにおいて、一部のデータが境界を越えて誤分類されることを許容するために導入される変数である。現実のデータは完全にはきれいに分離できないことが多いため、この変数を使って誤分類の度合いにペナルティを課しつつ許容する「ソフトマージン」を実現し、モデルの過学習を防ぎながら柔軟な境界を引けるようにする。", "note": "", "imp": "○"}, {"id": 62, "cat": "3.機械学習の手法", "term": "決定木", "en": "Decision Tree", "desc": "「もし年齢が30歳以上なら」といった条件分岐を木構造で連ねて、データを分類または回帰する手法である。根（ルート）から葉（リーフ）までの分岐をたどることで予測結果が得られ、分岐の理由がそのまま目に見えるため、なぜその予測に至ったかを人間が説明しやすい「解釈性の高さ」が大きな利点である。ランダムフォレストなどアンサンブル手法の構成要素としてもよく使われる。", "note": "解釈性が高い", "imp": "◎"}, {"id": 63, "cat": "3.機械学習の手法", "term": "情報利得", "en": "Information Gain", "desc": "決定木がある特徴量で分岐した際に、データの「不純度」（クラスの混ざり具合）がどれだけ減少したかを表す指標である。不純度の測り方にはエントロピーやジニ不純度があり、情報利得が最大となる特徴量と分岐点を選ぶことで、木の各ノードがより効率的にクラスを分けられるように学習が進む。", "note": "エントロピー/ジニ", "imp": "○"}, {"id": 64, "cat": "3.機械学習の手法", "term": "ランダムフォレスト", "en": "Random Forest", "desc": "ブートストラップサンプリングで作った複数の異なる訓練データセットから多数の決定木を独立に学習させ、それらの予測を多数決（分類）や平均（回帰）で統合するバギング系のアンサンブル手法である。単体の決定木よりも過学習しにくく汎化性能が高いため、実務でも幅広く使われる代表的な機械学習アルゴリズムの一つである。", "note": "", "imp": "◎"}, {"id": 65, "cat": "3.機械学習の手法", "term": "アンサンブル学習", "en": "Ensemble Learning", "desc": "単一のモデルではなく、複数のモデルの予測を組み合わせることで、単体よりも高い精度や安定性を得ようとする手法の総称である。バギング（並列学習と多数決）、ブースティング（逐次的な誤り補正）、スタッキング（別モデルによる統合）などの方式があり、Kaggleなどのデータ分析コンペティションでも頻繁に用いられる。", "note": "", "imp": "◎"}, {"id": 66, "cat": "3.機械学習の手法", "term": "バギング", "en": "Bagging", "desc": "Bootstrap Aggregatingの略で、元データから重複を許して無作為に抽出（復元抽出）した複数の訓練セットを作り、それぞれで独立にモデルを学習させたうえで、分類なら多数決、回帰なら平均をとって最終予測とする手法である。並列に学習できるため計算効率がよく、個々のモデルのばらつき（分散）を抑えて過学習を防ぐ効果がある。ランダムフォレストはこの考え方を決定木に適用したものである。", "note": "Bootstrap Aggregating", "imp": "◎"}, {"id": 67, "cat": "3.機械学習の手法", "term": "ブースティング", "en": "Boosting", "desc": "単体では精度の低い弱学習器を1つずつ順番に学習させ、前段の学習器が誤分類したデータに重点を置いて次の学習器を学習させることで、全体として強力な予測モデルを作り上げる手法である。代表的な手法にAdaBoostや勾配ブースティングがあり、バギングが並列処理であるのに対しブースティングは逐次処理である点が対照的である。", "note": "AdaBoost/勾配ブースティング", "imp": "◎"}, {"id": 68, "cat": "3.機械学習の手法", "term": "勾配ブースティング", "en": "Gradient Boosting", "desc": "前段までのモデルの予測誤差（残差）を勾配降下法の考え方で近似するように、新しい決定木を1本ずつ追加していくブースティング手法である。XGBoostやLightGBM、CatBoostといった高性能な実装ライブラリが広く普及しており、テーブルデータを扱うコンペティションや実務のモデリングで非常に高い精度を発揮することで知られる。", "note": "XGBoost/LightGBM", "imp": "○"}, {"id": 69, "cat": "3.機械学習の手法", "term": "スタッキング", "en": "Stacking", "desc": "複数の異なる種類のモデル（決定木、SVM、ニューラルネットワークなど）の予測結果を新たな入力データとして扱い、それらをまとめ上げる別のメタモデルに学習させて最終予測を行う手法である。単純な多数決や平均よりも柔軟にモデル間の相性を学習できるため、コンペティションなどで精度を追求する際によく使われる。", "note": "", "imp": "○"}, {"id": 70, "cat": "3.機械学習の手法", "term": "k近傍法", "en": "k-NN", "desc": "予測したいデータ点に距離が近い順にk個の既知データを選び、それらの多数決（分類）や平均（回帰）で結果を決める非常にシンプルな手法である。事前に明示的な学習（パラメータ推定）を行わずに予測時にすべての計算を行うことから怠惰学習（レイジーラーニング）とも呼ばれ、kの値の選び方が精度に大きく影響する。", "note": "怠惰学習", "imp": "◎"}, {"id": 71, "cat": "3.機械学習の手法", "term": "ナイーブベイズ", "en": "Naive Bayes", "desc": "特徴量同士が互いに独立であるという単純化した仮定を置いたうえで、ベイズの定理を用いて各クラスに属する確率を計算し分類する手法である。実際には特徴量間に相関があっても実用上は驚くほど高い精度を示すことが多く、迷惑メールかどうかを単語の出現頻度から判定するスパムフィルタなどで古くから利用されている。", "note": "スパム判定", "imp": "○"}, {"id": 72, "cat": "3.機械学習の手法", "term": "k-means法", "en": "k-means", "desc": "データをあらかじめ指定したk個のクラスタに分割する代表的な教師なし学習手法である。各クラスタの重心（セントロイド）をランダムに初期配置し、各データ点を最も近い重心のクラスタに割り当てる処理と、割り当て結果から重心を再計算する処理を、割り当てが変化しなくなるまで反復することでクラスタを収束させる。顧客セグメンテーションなど幅広い分野で使われる。", "note": "重心更新を反復", "imp": "◎"}, {"id": 73, "cat": "3.機械学習の手法", "term": "階層的クラスタリング", "en": "Hierarchical Clustering", "desc": "最も距離の近いデータ同士やクラスタ同士を順番に併合していき、最終的にすべてが1つにまとまるまでの過程を樹形図（デンドログラム）として表現するクラスタリング手法である。k-means法と異なりクラスタ数をあらかじめ指定する必要がなく、樹形図の任意の高さで切ることで好きな数のクラスタを事後的に得られる点が特徴である。", "note": "デンドログラム", "imp": "○"}, {"id": 74, "cat": "3.機械学習の手法", "term": "デンドログラム", "en": "Dendrogram", "desc": "階層的クラスタリングの併合過程を、横軸にデータ、縦軸に併合時の距離（非類似度）をとって視覚的に表した樹形図である。どの高さで切るかによってクラスタの数や構成が変わるため、データ全体の類似構造を俯瞰しながらクラスタ数を柔軟に決められる利点がある。", "note": "", "imp": "△"}, {"id": 75, "cat": "3.機械学習の手法", "term": "主成分分析", "en": "PCA", "desc": "多数の特徴量を持つデータを、情報（分散）をできるだけ保ったまま少数の合成変数（主成分）に圧縮する次元削減の代表的な手法である。データの分散が最大になる方向を第1主成分、それと直交しつつ次に分散が大きい方向を第2主成分として順に求めていく仕組みで、可視化やノイズ除去、計算コストの削減などに広く応用される。", "note": "次元削減の代表", "imp": "◎"}, {"id": 76, "cat": "3.機械学習の手法", "term": "次元削減", "en": "Dimensionality Reduction", "desc": "データが持つ本質的な情報をできるだけ損なわないようにしながら、特徴量（次元）の数を減らす処理の総称である。主成分分析(PCA)やt-SNEなどが代表的な手法であり、後述する次元の呪いを緩和し、計算コストの削減やデータの可視化、過学習の抑制にもつながる重要な前処理である。", "note": "次元の呪い対策", "imp": "○"}, {"id": 77, "cat": "3.機械学習の手法", "term": "次元の呪い", "en": "Curse of Dimensionality", "desc": "特徴量の次元数が増えるほど、同じ量のデータではデータ点同士の間隔がスカスカ（疎）になり、距離に基づく学習や統計的な推定が困難になっていく現象である。例えばk近傍法のような距離を使う手法では次元が増えるほど「近い」データを見つけにくくなり、必要なデータ量が指数的に増大する。この対策として次元削減や特徴選択が行われる。", "note": "", "imp": "○"}, {"id": 78, "cat": "3.機械学習の手法", "term": "t-SNE", "en": "t-SNE", "desc": "高次元のデータ点同士の類似関係を、近いものは近く・遠いものは遠く保つように2次元や3次元へ落とし込み、人間が目で見て理解できる形に可視化するための次元削減手法である。線形なPCAでは捉えきれない複雑な非線形構造を表現できるのが強みで、高次元の埋め込みベクトルの分布を確認する際などによく用いられる。", "note": "", "imp": "○"}, {"id": 79, "cat": "3.機械学習の手法", "term": "協調フィルタリング", "en": "Collaborative Filtering", "desc": "自分と嗜好の似ている他のユーザーの行動履歴（購入・評価履歴など）を手がかりに、まだ見ていない商品やコンテンツを推薦する手法である。ECサイトの「この商品を買った人はこんな商品も買っています」という表示や、動画配信サービスのレコメンド機能などで実際に使われている代表的な推薦アルゴリズムである。", "note": "レコメンド", "imp": "○"}, {"id": 80, "cat": "3.機械学習の手法", "term": "コールドスタート問題", "en": "Cold Start", "desc": "新規に登録したばかりのユーザーや新しく追加された商品には過去の行動履歴・評価データがほとんど存在しないため、協調フィルタリングなどの推薦アルゴリズムが十分な精度で推薦を行えなくなる問題である。対策として、ユーザーの属性情報を利用する内容ベースフィルタリングとの併用などが行われる。", "note": "", "imp": "○"}, {"id": 81, "cat": "3.機械学習の手法", "term": "特徴量", "en": "Feature", "desc": "機械学習モデルへの入力として使われる、データの個々の属性や変数のことである。例えば住宅価格予測であれば「面積」「築年数」「最寄り駅までの距離」などが特徴量にあたり、どのような特徴量を用意するかがモデルの予測性能を大きく左右する。", "note": "", "imp": "◎"}, {"id": 82, "cat": "3.機械学習の手法", "term": "特徴量エンジニアリング", "en": "Feature Engineering", "desc": "生データから予測に有効な特徴量を人手で見出し、変換・加工・組み合わせてモデルに入力しやすい形に整える作業である。例えば日時データから「曜日」や「時間帯」を抽出したり、複数の変数の比率を新たな特徴量として作成したりする工程が該当し、モデルの選択と並んで予測精度を左右する重要な作業として位置づけられている。", "note": "", "imp": "○"}, {"id": 83, "cat": "3.機械学習の手法", "term": "ブートストラップ", "en": "Bootstrap", "desc": "手元にある1つのデータセットから、重複を許して無作為に何度もサンプルを抽出することで、あたかも複数の標本があるかのように見立てる統計的な再抽出手法である。バギングはこのブートストラップの考え方を機械学習に応用したものであり、限られたデータからモデルの性能や不確実性を推定する際の基礎ともなっている。", "note": "バギングの基礎", "imp": "○"}, {"id": 84, "cat": "4.評価と前処理", "term": "訓練データ／テストデータ", "en": "Train / Test Data", "desc": "モデルの実力を正しく測るため、手持ちのデータを学習に使う訓練データと、未知データへの対応力を確かめるテストデータに分けるのが基本である。テストデータは学習には一切使わず最後の評価専用に取っておくことで、モデルが単に暗記しただけなのか本当に汎化できているのかを判定できる。一般的には7:3や8:2程度の比率で分割することが多い。", "note": "", "imp": "◎"}, {"id": 85, "cat": "4.評価と前処理", "term": "検証データ", "en": "Validation Data", "desc": "訓練データだけで学習率や木の深さなどのハイパーパラメータを調整すると、そのパラメータ自体がテストデータに間接的に最適化されてしまい正当な評価ができなくなる。そこで訓練データの一部を検証データとして切り出し、モデル構造やパラメータ選びの良し悪しをここで確認してから、最終評価だけテストデータで行う。訓練・検証・テストの3分割はコンペや実務でも標準的な流れである。", "note": "", "imp": "○"}, {"id": 86, "cat": "4.評価と前処理", "term": "ホールドアウト法", "en": "Holdout", "desc": "手元のデータセットを訓練用と評価用に一度だけランダムに分割し、それぞれ固定して使う最もシンプルな評価手法である。実装が容易で計算コストも低い一方、たまたま偏った分割になると評価結果が運任せになりやすいという弱点がある。データ量が十分に多い場合に選ばれることが多い手法である。", "note": "", "imp": "○"}, {"id": 87, "cat": "4.評価と前処理", "term": "交差検証", "en": "Cross Validation", "desc": "ホールドアウト法の分割の偏りという弱点を補うため、データを複数のグループに分け、学習と評価の組み合わせを入れ替えながら何度も繰り返して評価する手法である。全データを一度は評価に使うことになるため、限られたデータでも安定した性能評価ができる。代表例がk分割交差検証である。", "note": "k-fold", "imp": "◎"}, {"id": 88, "cat": "4.評価と前処理", "term": "k分割交差検証", "en": "k-fold CV", "desc": "データをk個のグループ（フォールド）に均等に分割し、そのうち1個を検証用、残りk-1個を訓練用として学習・評価をk回繰り返し、最終的にk回分の評価結果を平均する手法である。例えばk=5なら5回学習・評価を行い、全データが1回ずつ検証に使われる。データが少ない場合でも評価の分散を抑えられるが、計算コストはk倍になる。", "note": "", "imp": "○"}, {"id": 89, "cat": "4.評価と前処理", "term": "過学習", "en": "Overfitting", "desc": "モデルが訓練データの細かなノイズや特殊なパターンまで学習しすぎてしまい、訓練データでは高い精度が出るのに未知データ（テストデータ）では精度が大きく落ちる現象である。パラメータ数が多く複雑なモデルほど起きやすく、ディープラーニングでは特に注意が必要となる。ドロップアウトや正則化、データ拡張、早期終了などが対策として用いられる。", "note": "", "imp": "◎"}, {"id": 90, "cat": "4.評価と前処理", "term": "未学習", "en": "Underfitting", "desc": "モデルの表現力が低すぎたり学習が不十分だったりして、訓練データに対してすら十分な精度が出せていない状態である。過学習とは逆の問題であり、例えば線形回帰で複雑な非線形関係を表そうとすると起こりやすい。モデルをより複雑にする、特徴量を増やす、学習を十分に行うといった対応で改善を図る。", "note": "", "imp": "○"}, {"id": 91, "cat": "4.評価と前処理", "term": "汎化性能", "en": "Generalization", "desc": "訓練時に見たことのない未知データに対して、モデルがどれだけ正確に予測できるかを示す能力である。機械学習の最終目的は訓練データへの当てはめではなく、この汎化性能を高めることにある。過学習は汎化性能を損なう典型的な原因であり、交差検証やテストデータでの評価は汎化性能を確認するための手段である。", "note": "", "imp": "◎"}, {"id": 92, "cat": "4.評価と前処理", "term": "バイアス・バリアンス", "en": "Bias-Variance", "desc": "モデルの予測誤差を、モデルの偏り（バイアス）とデータによる予測のばらつき（バリアンス）という2つの要因に分解して考える枠組みである。単純すぎるモデルはバイアスが大きく未学習になりやすく、複雑すぎるモデルはバリアンスが大きく過学習になりやすいというトレードオフの関係にある。両者のバランスが取れた地点が最も汎化性能の高いモデルとなる。", "note": "トレードオフ", "imp": "◎"}, {"id": 93, "cat": "4.評価と前処理", "term": "正則化", "en": "Regularization", "desc": "モデルのパラメータが大きくなりすぎることに罰則（ペナルティ）を課し、モデルを必要以上に複雑にさせないことで過学習を抑える手法である。損失関数にパラメータのノルムを加算する形で実装され、代表的なものにL1正則化とL2正則化がある。ニューラルネットワークにおけるドロップアウトも広い意味での正則化手法の一つとされる。", "note": "L1/L2", "imp": "◎"}, {"id": 94, "cat": "4.評価と前処理", "term": "L1正則化", "en": "L1 Regularization", "desc": "損失関数に係数（重み）の絶対値の総和を罰則項として加える正則化手法であり、この手法を用いた線形回帰は特にラッソ回帰と呼ばれる。罰則の性質上、重要度の低い特徴量の係数がちょうど0になりやすく、結果として不要な特徴量を自動的に取り除くスパースな（疎な）モデルが得られる点が特徴である。", "note": "ラッソ", "imp": "○"}, {"id": 95, "cat": "4.評価と前処理", "term": "L2正則化", "en": "L2 Regularization", "desc": "損失関数に係数（重み）の二乗和を罰則項として加える正則化手法であり、この手法を用いた線形回帰は特にリッジ回帰と呼ばれる。L1正則化のように係数を完全に0にするのではなく、全体的に係数を滑らかに小さく抑える働きを持つため、多重共線性がある場合の安定化にも有効である。", "note": "リッジ", "imp": "○"}, {"id": 96, "cat": "4.評価と前処理", "term": "混同行列", "en": "Confusion Matrix", "desc": "分類モデルの予測結果と実際の正解の組み合わせを表形式で集計したもので、True Positive（真陽性）、False Positive（偽陽性）、False Negative（偽陽性）、True Negative（真陰性）の4つのマスから構成される。この表を基に正解率・適合率・再現率・F値など多くの評価指標が計算されるため、分類モデル評価の出発点となる重要な概念である。", "note": "TP/FP/FN/TN", "imp": "◎"}, {"id": 97, "cat": "4.評価と前処理", "term": "正解率", "en": "Accuracy", "desc": "全予測件数のうち、正しく予測できた件数（TP＋TN）の割合を示す最も直感的な評価指標である。例えば100件中90件正解なら正解率は90%となる。ただし陽性が1%しかないような不均衡データでは、全てを陰性と予測するだけで99%の正解率が出てしまうため、そのようなデータでは適合率や再現率と併用する必要がある。", "note": "不均衡データに弱い", "imp": "◎"}, {"id": 98, "cat": "4.評価と前処理", "term": "適合率", "en": "Precision", "desc": "モデルが陽性と予測したもの（TP＋FP）のうち、実際に陽性だった（TP）割合を示す指標であり、TP/(TP+FP)で計算される。誤って陽性と判定すること（偽陽性）を極力避けたい場面、例えば迷惑メール判定で正常なメールを誤って迷惑メールに分類したくない場合などで重視される指標である。", "note": "", "imp": "◎"}, {"id": 99, "cat": "4.評価と前処理", "term": "再現率", "en": "Recall", "desc": "実際に陽性であるもの（TP＋FN）のうち、モデルが正しく陽性と予測できた（TP）割合を示す指標であり、TP/(TP+FN)で計算される。感度とも呼ばれ、病気の検査で陽性の患者を見逃したくない場合など、偽陰性（見逃し）を避けたい場面で重視される。適合率とはトレードオフの関係になりやすい。", "note": "感度", "imp": "◎"}, {"id": 100, "cat": "4.評価と前処理", "term": "F値", "en": "F1 Score", "desc": "トレードオフの関係にある適合率と再現率を、どちらか一方に偏らずバランスよく評価するために両者の調和平均を取った指標であり、2×適合率×再現率/(適合率+再現率)で計算される。不均衡データや、両指標を同時に高めたい場面でよく用いられ、正解率だけでは見えないモデルの実力を把握するのに役立つ。", "note": "", "imp": "◎"}, {"id": 101, "cat": "4.評価と前処理", "term": "ROC曲線／AUC", "en": "ROC / AUC", "desc": "分類の閾値を0から1まで連続的に変化させたときの偽陽性率（横軸）と真陽性率（縦軸）の変化を描いた曲線がROC曲線であり、その曲線の下部の面積がAUC（Area Under the Curve）である。AUCは0.5がランダム予測、1.0が完全な予測を意味し、閾値を固定せずにモデル全体の識別性能を比較できる点が利点である。", "note": "1に近いほど良い", "imp": "○"}, {"id": 102, "cat": "4.評価と前処理", "term": "平均二乗誤差", "en": "MSE", "desc": "回帰モデルにおいて、予測値と正解値の差（誤差）を2乗してから平均を取った指標であり、外れ値の影響を強く受けやすい性質を持つ。MSEの平方根を取ったものがRMSE（二乗平均平方根誤差）で元のデータと同じ単位になり解釈しやすく、誤差の絶対値の平均を取ったものがMAE（平均絶対誤差）で外れ値に対してより頑健である。", "note": "RMSE/MAE", "imp": "○"}, {"id": 103, "cat": "4.評価と前処理", "term": "決定係数", "en": "R-squared", "desc": "回帰モデルがデータのばらつきをどれだけ説明できているかを0から1の範囲で示す指標であり、決定係数R²が1に近いほどモデルの当てはまりが良いことを意味する。例えばR²=0.8であれば、目的変数の変動の80%をそのモデルで説明できていることを表す。ただし説明変数を増やすほど見かけ上大きくなる傾向があるため、変数の数を考慮した自由度調整済み決定係数が使われることもある。", "note": "", "imp": "○"}, {"id": 104, "cat": "4.評価と前処理", "term": "ハイパーパラメータ", "en": "Hyperparameter", "desc": "学習によって自動的に決まるパラメータ（重みなど）とは異なり、学習を始める前に人間が事前に設定しておく必要がある値である。ニューラルネットワークの学習率や層の数、決定木の深さなどが代表例で、この値の良し悪しがモデルの性能を大きく左右する。適切な値を探すためにグリッドサーチなどの手法が用いられる。", "note": "学習率など", "imp": "◎"}, {"id": 105, "cat": "4.評価と前処理", "term": "グリッドサーチ", "en": "Grid Search", "desc": "複数のハイパーパラメータについて、あらかじめ候補値の組み合わせを格子状に用意し、その全パターンを実際に学習・評価して最良の組み合わせを見つける探索手法である。網羅的に調べられる確実さがある一方、パラメータの種類や候補数が増えると組み合わせ数が爆発的に増え計算コストが高くなるため、より効率的なランダムサーチやベイズ最適化が使われることもある。", "note": "", "imp": "○"}, {"id": 106, "cat": "4.評価と前処理", "term": "正規化", "en": "Normalization", "desc": "特徴量ごとにスケール（値の範囲）が大きく異なると学習がうまく進まないモデルがあるため、各特徴量の値を最小値0・最大値1のように一定の範囲に変換する前処理である。例えば身長（cm）と年収（円）のように単位も桁も異なるデータを扱う際に、この処理でスケールを揃えることでモデルの学習が安定しやすくなる。", "note": "", "imp": "○"}, {"id": 107, "cat": "4.評価と前処理", "term": "標準化", "en": "Standardization", "desc": "特徴量の分布を平均0・分散（標準偏差）1になるように変換する前処理であり、各値から平均を引いて標準偏差で割ることで求められる。正規化とは異なり値の上限・下限は定まらないが、外れ値の影響を受けにくく、正規分布を仮定する手法やニューラルネットワークの学習前処理として広く使われる。", "note": "白色化と対比", "imp": "○"}, {"id": 108, "cat": "4.評価と前処理", "term": "欠損値", "en": "Missing Value", "desc": "アンケートの未回答項目やセンサーの故障などにより、本来あるはずのデータが記録されていない箇所を指す。多くの機械学習アルゴリズムは欠損値をそのまま扱えないため、平均値や中央値で穴埋めする補完（imputation）や、欠損の多い行・列を削除するなどの前処理が必要になる。", "note": "", "imp": "○"}, {"id": 109, "cat": "4.評価と前処理", "term": "外れ値", "en": "Outlier", "desc": "他の大多数のデータから大きく離れた値であり、センサーの誤作動や入力ミス、あるいは本当に稀な事象によって生じる。平均値や分散、線形回帰の係数など多くの統計量・モデルは外れ値の影響を強く受けるため、可視化や統計的手法（IQRやZスコアなど）で検出し、除去や補正を検討する必要がある。", "note": "", "imp": "○"}, {"id": 110, "cat": "4.評価と前処理", "term": "ワンホットエンコーディング", "en": "One-hot Encoding", "desc": "「赤・青・緑」のような順序のないカテゴリ変数を、該当する項目だけが1で他は全て0になるベクトルに変換する処理である。例えば色を[赤,青,緑]の3次元ベクトルで表すと赤は[1,0,0]、青は[0,1,0]となる。カテゴリに1,2,3のような数値をそのまま割り当てると誤った大小関係が生まれてしまうため、この変換で数値の大小に意味を持たせない形にする。", "note": "", "imp": "○"}, {"id": 111, "cat": "4.評価と前処理", "term": "データリーケージ", "en": "Data Leakage", "desc": "本来モデルが学習時に知り得ないはずのテストデータや未来の情報が、誤って訓練データに混入してしまう問題である。例えば正規化の統計量を訓練・テスト分割前の全データから計算してしまうケースなどが典型例で、この問題が起きると評価時の精度は非常に高く見えるのに、実運用では全く性能が出ないという事態を招く。", "note": "", "imp": "○"}, {"id": 112, "cat": "4.評価と前処理", "term": "不均衡データ", "en": "Imbalanced Data", "desc": "分類問題において、あるクラスのデータ数が他のクラスに比べて極端に少ない、あるいは多い状態を指す。例えば不正取引検知のように正常データが99%以上を占めるような場合、正解率だけでは正しく評価できず、少数クラスを人工的に増やすオーバーサンプリングや多数クラスを間引くアンダーサンプリングといった対策が取られる。", "note": "アンダー/オーバーサンプリング", "imp": "○"}, {"id": 113, "cat": "4.評価と前処理", "term": "オッカムの剃刀", "en": "Occam's Razor", "desc": "「同じ説明力を持つ複数の仮説（モデル）があるなら、より単純な方を選ぶべきである」という科学全般に通じる指針であり、機械学習ではモデル選択の考え方の一つとして引用される。不必要に複雑なモデルは過学習のリスクを高め解釈も難しくなるため、正則化などによりシンプルさを保つ設計思想の背景にある考え方である。", "note": "", "imp": "△"}, {"id": 114, "cat": "4.評価と前処理", "term": "ノーフリーランチ定理", "en": "No Free Lunch", "desc": "あらゆる問題設定において常に他の手法より優れているような万能なアルゴリズムは存在しない、ということを数学的に示した定理である。この定理は、扱う問題の性質やデータの特徴に応じて適切な手法を選び分ける必要があることを示しており、特定のコンペやタスクで良い成績を残した手法が別の問題でも常に最良とは限らない理由の裏付けとなる。", "note": "", "imp": "○"}, {"id": 115, "cat": "4.評価と前処理", "term": "醜いアヒルの子定理", "en": "Ugly Duckling", "desc": "分類対象について何の前提や仮定も置かなければ、どの2つの対象も同じ数だけ特徴を共有しており、客観的に「似ている」「似ていない」を決める本質的な基準は存在しないことを示す定理である。アヒルの子と白鳥の例えに由来し、機械学習における特徴量の選び方やクラス分類には必ず何らかの前提（バイアス）が入り込まざるを得ないことを示唆している。", "note": "", "imp": "○"}, {"id": 116, "cat": "5.DL概要", "term": "ニューラルネットワーク", "en": "Neural Network", "desc": "生物の脳内でニューロン同士が電気信号をやり取りする仕組みを数理的に模倣したモデルである。入力に重みを掛けて足し合わせ、活性化関数を通して出力するという単純なユニットを多数組み合わせることで、画像認識や音声認識のような複雑なパターン学習が可能になる。ディープラーニングを含む機械学習手法の基盤概念であり、G検定全体を通じて最も重要な用語の一つである。", "note": "", "imp": "◎"}, {"id": 117, "cat": "5.DL概要", "term": "ディープラーニング", "en": "Deep Learning", "desc": "中間層（隠れ層）を何層にも重ねたニューラルネットワークを用いて、データから特徴量を人手を介さず自動で抽出・学習する手法である。従来の機械学習では専門家が特徴量を設計する必要があったが、ディープラーニングでは画像のエッジや形状といった特徴を層ごとに階層的に自ら獲得する。ImageNetの画像認識コンペティションでAlexNetが2012年に圧勝したことをきっかけに広く注目された。", "note": "", "imp": "◎"}, {"id": 118, "cat": "5.DL概要", "term": "形式ニューロン", "en": "Formal Neuron", "desc": "1943年にウォーレン・マカロックとウォルター・ピッツが提案した、生体ニューロンを数式で表現した最初のモデルである。複数の入力信号を受け取り、それぞれに重みを掛けて合計した値が閾値を超えれば1、超えなければ0を出力するという仕組みで、後のパーセプトロンやニューラルネットワークの理論的基礎となった。学習則を持たない点が単純パーセプトロンとの大きな違いである。", "note": "", "imp": "○"}, {"id": 119, "cat": "5.DL概要", "term": "単純パーセプトロン", "en": "Simple Perceptron", "desc": "1957年にフランク・ローゼンブラットが考案した、形式ニューロンに学習則を組み込んだ初期の線形分類器である。入力ベクトルと重みの内積が閾値を超えるかどうかで2クラスに分類し、誤分類のたびに重みを修正することで境界線を学習する。ただしXOR問題のように直線1本では分けられない非線形なデータは扱えず、この限界がAIの冬を招く一因となった。", "note": "線形分離のみ", "imp": "◎"}, {"id": 120, "cat": "5.DL概要", "term": "多層パーセプトロン", "en": "MLP", "desc": "入力層と出力層の間に1つ以上の中間層（隠れ層）を持つニューラルネットワークであり、単純パーセプトロンでは解けなかったXOR問題のような非線形分類を可能にした。各層で活性化関数による非線形変換を挟むことで、直線では分離できない複雑な決定境界を表現できる。誤差逆伝播法の登場によって多層構造の学習が実用化され、現在のディープラーニングの原型となった。", "note": "XOR問題を解決", "imp": "◎"}, {"id": 121, "cat": "5.DL概要", "term": "線形分離可能", "en": "Linearly Separable", "desc": "2クラスのデータを1本の直線（2次元の場合）や平面・超平面（多次元の場合）で完全に分離できる状態を指す。ANDやORのような論理演算は線形分離可能だが、XOR（排他的論理和）は入力空間上で直線を1本引いても正しく分けられず線形分離不可能であることが知られている。この限界を打破するために中間層を持つ多層パーセプトロンが考案された。", "note": "XORは不可能", "imp": "○"}, {"id": 122, "cat": "5.DL概要", "term": "入力層・中間層・出力層", "en": "Input/Hidden/Output", "desc": "ニューラルネットワークを構成する3種類の層であり、データを受け取る入力層、計算処理を担う中間層（隠れ層）、最終的な予測結果を出す出力層からなる。中間層は外部から直接観測できないためこう呼ばれ、その数やユニット数を増やすことで表現力が高まる一方、多すぎると過学習や勾配消失のリスクも高まる。中間層を複数持つネットワークがディープニューラルネットワークである。", "note": "", "imp": "◎"}, {"id": 123, "cat": "5.DL概要", "term": "重みとバイアス", "en": "Weight & Bias", "desc": "ニューロンが入力を処理する際に用いる2種類のパラメータである。重みは各入力信号の重要度を表す係数で入力値に掛け合わされ、バイアスは全体の出力の基準値を調整する定数として加算される。例えば「y = w1x1 + w2x2 + b」という式のw1, w2が重み、bがバイアスにあたり、これらの値を誤差逆伝播法などで少しずつ更新していく過程がニューラルネットワークの学習そのものである。", "note": "", "imp": "◎"}, {"id": 124, "cat": "5.DL概要", "term": "活性化関数", "en": "Activation Function", "desc": "ニューロンの線形な出力（重み付き和）に非線形な変換を加える関数であり、これがなければ何層重ねても全体として線形変換にしかならず、多層化の意味が失われてしまう。シグモイド関数やReLUなど用途に応じて多様な種類があり、中間層と出力層で異なる関数を使い分けることが多い。この非線形性の導入こそが、ニューラルネットワークが複雑なパターンを表現できる理由である。", "note": "", "imp": "◎"}, {"id": 125, "cat": "5.DL概要", "term": "シグモイド関数", "en": "Sigmoid", "desc": "入力値をなめらかなS字カーブで0から1の範囲に変換する活性化関数であり、出力を確率のように解釈できるため2値分類の出力層などで古くから使われてきた。しかし入力の絶対値が大きくなると勾配がほぼ0に近づく性質があり、層を深く重ねると誤差逆伝播の際に勾配がどんどん小さくなる勾配消失問題を引き起こしやすい。この欠点からディープラーニングの中間層ではReLUに置き換えられることが多い。", "note": "勾配消失しやすい", "imp": "◎"}, {"id": 126, "cat": "5.DL概要", "term": "tanh関数", "en": "Hyperbolic Tangent", "desc": "入力値をなめらかな曲線で-1から1の範囲に変換する活性化関数であり、シグモイド関数を上下対称にスケールし直したような形をしている。出力が0を中心に分布するためシグモイド関数より学習が安定しやすいという利点があるが、入力が大きい・小さい領域では勾配がほぼ0になる点は同様で、深い層では依然として勾配消失問題が起こりやすい。", "note": "", "imp": "○"}, {"id": 127, "cat": "5.DL概要", "term": "ReLU", "en": "Rectified Linear Unit", "desc": "入力が0以下のときは0を出力し、正のときはそのまま入力値を出力する非常にシンプルな活性化関数であり、Rectified Linear Unitの略である。正の領域では勾配が常に1で一定のため、シグモイド関数のように勾配が急激に小さくなることがなく、勾配消失問題を大幅に緩和できる。計算も単純で高速なため、現在の多くの深層学習モデルの中間層で標準的に採用されている。", "note": "勾配消失を緩和", "imp": "◎"}, {"id": 128, "cat": "5.DL概要", "term": "Leaky ReLU", "en": "Leaky ReLU", "desc": "ReLUの弱点である「入力が負のとき勾配が完全に0になりニューロンが二度と学習しなくなるDying ReLU問題」を改善した活性化関数である。負の入力に対しても0.01倍程度のわずかな傾きを持たせることで、負の領域でもわずかに勾配が流れるようにし、ニューロンが完全に死んでしまうのを防ぐ工夫がなされている。", "note": "", "imp": "○"}, {"id": 129, "cat": "5.DL概要", "term": "ソフトマックス関数", "en": "Softmax", "desc": "複数の出力値を、合計が1になるような確率分布の形に変換する関数であり、多クラス分類問題のニューラルネットワークの出力層で標準的に使われる。各クラスのスコア（ロジット）を指数関数で変換してから正規化することで、例えば「犬80%、猫15%、鳥5%」のように各クラスに属する確率として解釈できる出力を得られる。交差エントロピー誤差と組み合わせて使われることが多い。", "note": "多クラス分類の出力層", "imp": "◎"}, {"id": 130, "cat": "5.DL概要", "term": "順伝播", "en": "Forward Propagation", "desc": "ニューラルネットワークにおいて、入力層から中間層を経て出力層へと、データが一方向に計算されていく処理のことである。各層で「重み付き和の計算＋活性化関数の適用」を繰り返しながら値を伝播させ、最終的な予測値を得る。学習時には順伝播で予測値を計算した後、その誤差を逆方向に伝える誤差逆伝播法とセットで用いられる。", "note": "", "imp": "○"}, {"id": 131, "cat": "5.DL概要", "term": "誤差逆伝播法", "en": "Backpropagation", "desc": "ニューラルネットワークの学習で中心的な役割を果たすアルゴリズムであり、出力層で計算した予測と正解の誤差を、出力層から入力層へと逆向きに伝播させながら各層の重みとバイアスをどれだけ修正すべきかを効率的に計算する手法である。微分の連鎖律を利用することで、多層のネットワークでも各パラメータの勾配を一度の逆方向計算でまとめて求められる。1986年にラメルハートらが発表し、深い層を持つネットワークの学習を実用的なものにした。", "note": "", "imp": "◎"}, {"id": 132, "cat": "5.DL概要", "term": "損失関数", "en": "Loss Function", "desc": "モデルの予測値と実際の正解データとのズレの大きさを数値化する関数であり、学習の目的はこの損失関数の値をできるだけ小さくするようにパラメータを調整することにある。回帰問題では二乗誤差、分類問題では交差エントロピー誤差がよく使われるなど、タスクの性質に応じて適切な損失関数を選ぶ必要がある。損失関数の値をもとに勾配降下法で重みが更新される。", "note": "", "imp": "◎"}, {"id": 133, "cat": "5.DL概要", "term": "二乗誤差／交差エントロピー", "en": "MSE / Cross Entropy", "desc": "損失関数の代表例であり、二乗誤差（平均二乗誤差、MSE）は予測値と正解値の差を2乗して平均したもので、回帰問題（数値予測）でよく使われる。交差エントロピー誤差は正解ラベルの確率分布と予測確率分布のズレを測る指標で、分類問題においてソフトマックス関数の出力と組み合わせて使われることが多い。タスクの種類（回帰か分類か）に応じてこれらを使い分けることが基本である。", "note": "", "imp": "○"}, {"id": 134, "cat": "5.DL概要", "term": "勾配降下法", "en": "Gradient Descent", "desc": "損失関数の値を最小化するために、損失関数をパラメータで微分して得られる勾配（傾き）の逆方向にパラメータを少しずつ動かしていく最適化アルゴリズムである。山を下るときに最も急な下り方向へ一歩ずつ進むイメージに例えられ、この「一歩の大きさ」が学習率にあたる。全データを使うか一部を使うかによってバッチ勾配降下法、確率的勾配降下法、ミニバッチ勾配降下法などに分類される。", "note": "", "imp": "◎"}, {"id": 135, "cat": "5.DL概要", "term": "学習率", "en": "Learning Rate", "desc": "勾配降下法においてパラメータを1回更新する際にどれだけ大きく動かすかを決める係数であり、ハイパーパラメータの一つとして人間が事前に設定する必要がある。学習率が大きすぎると最適解を飛び越えて損失が発散してしまい、逆に小さすぎると収束までに膨大な時間がかかったり局所最適解から抜け出せなくなったりする。学習の進行に応じて学習率を徐々に小さくする学習率スケジューリングもよく用いられる。", "note": "大小で発散/停滞", "imp": "◎"}, {"id": 136, "cat": "5.DL概要", "term": "確率的勾配降下法", "en": "SGD", "desc": "全ての訓練データを使って勾配を計算する通常の勾配降下法（バッチ勾配降下法）とは異なり、データセットからランダムに抽出した1件または少数のサンプルごとに勾配を計算してパラメータを更新する手法である。計算コストが低く更新の頻度が高いため学習が速く進みやすい一方、更新の方向にノイズが多く含まれるため、かえって局所最適解を抜け出しやすいという利点もある。Stochastic Gradient Descentの略。", "note": "", "imp": "◎"}, {"id": 137, "cat": "5.DL概要", "term": "ミニバッチ学習", "en": "Mini-batch", "desc": "全データ（バッチ学習）でも1件ずつ（確率的勾配降下法）でもなく、数十〜数百件程度の小さなデータの束（ミニバッチ）ごとに勾配を計算してパラメータを更新する学習方式である。GPUによる並列計算と相性がよく計算効率が高い上、確率的勾配降下法ほど更新方向のノイズが大きくならないため、現在の深層学習では最も広く使われる標準的な学習方法となっている。", "note": "", "imp": "○"}, {"id": 138, "cat": "5.DL概要", "term": "エポック", "en": "Epoch", "desc": "訓練用データセット全体を1回すべて学習に使い切ることを1エポックと数える単位である。例えば1000件のデータをミニバッチサイズ100で学習する場合、1エポックは10回のパラメータ更新（イテレーション）で構成される。エポック数を増やしすぎると訓練データに過剰適合してしまう過学習が起こりやすくなるため、検証データの精度を見ながら適切なエポック数を決める必要がある。", "note": "", "imp": "○"}, {"id": 139, "cat": "5.DL概要", "term": "イテレーション", "en": "Iteration", "desc": "ニューラルネットワークの学習においてパラメータ（重みとバイアス）を1回更新する処理の単位であり、通常は1つのミニバッチ分のデータを処理するごとに1イテレーションと数える。訓練データ数をミニバッチサイズで割った回数が1エポックあたりのイテレーション数となり、例えば1000件のデータをバッチサイズ100で学習すると1エポックは10イテレーションになる。", "note": "", "imp": "△"}, {"id": 140, "cat": "5.DL概要", "term": "勾配消失問題", "en": "Vanishing Gradient", "desc": "ネットワークの層が深くなるほど、誤差逆伝播で出力層から入力層に向かって勾配を伝える過程で勾配の値がどんどん小さくなり、入力層に近い層の重みがほとんど更新されなくなってしまう問題である。シグモイド関数やtanh関数のように微分値の最大値が小さい活性化関数を使うと、層を重ねるたびに勾配が掛け合わされて指数的に減衰するため特に顕著に現れる。ReLUの導入や残差接続（ResNet）、バッチ正規化などがこの問題への対策として知られている。", "note": "シグモイドで顕著", "imp": "◎"}, {"id": 141, "cat": "5.DL概要", "term": "勾配爆発", "en": "Exploding Gradient", "desc": "勾配消失問題とは逆に、誤差逆伝播の過程で勾配の値が層を重ねるごとに指数的に増大し、パラメータの更新幅が非常に大きくなって学習が不安定になったり発散したりする問題である。特にRNNのように同じ重みを繰り返し使う再帰的な構造で起こりやすい。対策としては、勾配の大きさに上限を設けて一定値を超えたらスケールを縮小する勾配クリッピングという手法がよく用いられる。", "note": "勾配クリッピング", "imp": "○"}, {"id": 142, "cat": "5.DL概要", "term": "局所最適解", "en": "Local Minimum", "desc": "損失関数の値が周辺の点と比べて最小になっているものの、探索範囲全体で見たときの最小値（大域最適解）ではない解のことである。勾配降下法は現在地から見て損失が下がる方向にしか進まないため、複雑な損失関数の地形では谷底（局所最適解）に落ち込んだまま抜け出せなくなることがある。モメンタムや確率的勾配降下法のノイズはこうした局所最適解から抜け出す助けになると考えられている。", "note": "対：大域最適", "imp": "○"}, {"id": 143, "cat": "5.DL概要", "term": "鞍点", "en": "Saddle Point", "desc": "ある方向から見ると谷底（極小）に見えるが、別の方向から見ると山頂（極大）に見えるような、勾配がゼロになる特殊な停留点である。高次元のパラメータ空間を持つ深層学習では、局所最適解よりも鞍点の方がはるかに多く存在し、学習が長時間停滞する原因になりやすいことが知られている。モメンタムを取り入れた最適化手法は、この鞍点付近での停滞を抜け出しやすくする効果がある。", "note": "", "imp": "○"}, {"id": 144, "cat": "5.DL概要", "term": "モメンタム", "en": "Momentum", "desc": "勾配降下法の改良手法の一つで、パラメータ更新の際に現在の勾配だけでなく過去の更新方向を慣性（勢い）として加味する工夫である。ボールが坂を転がり落ちる際に勢いがついて多少の凹凸を乗り越えられるイメージに例えられ、これにより振動を抑えつつ学習を加速させたり、局所最適解や鞍点から抜け出しやすくしたりする効果が期待できる。", "note": "", "imp": "○"}, {"id": 145, "cat": "5.DL概要", "term": "AdaGrad", "en": "AdaGrad", "desc": "パラメータごとにこれまでの更新頻度・更新量を記録し、頻繁に更新されるパラメータほど学習率を小さく、あまり更新されないパラメータほど学習率を大きく自動調整する最適化手法である。Adaptive Gradientの略で、疎なデータ（多くの値が0の特徴量）を扱う自然言語処理などのタスクで効果を発揮しやすい。ただし学習が進むにつれ学習率が単調に小さくなりすぎ、途中で学習が停滞しやすいという弱点がある。", "note": "", "imp": "○"}, {"id": 146, "cat": "5.DL概要", "term": "RMSProp", "en": "RMSProp", "desc": "AdaGradが抱える「学習率が単調に減少し続けて途中で停滞する」弱点を改善した最適化手法であり、過去の勾配の二乗を単純に累積するのではなく指数移動平均を取ることで、直近の勾配の大きさに応じて学習率を動的に調整する。これにより学習の後半でも適切な学習率を維持しやすくなり、RNNなど非定常な問題でも安定して学習が進みやすい。", "note": "", "imp": "○"}, {"id": 147, "cat": "5.DL概要", "term": "Adam", "en": "Adam", "desc": "モメンタム（過去の勾配の指数移動平均を使う慣性項）とRMSProp（勾配の二乗の指数移動平均で学習率を調整する仕組み）の長所を組み合わせた最適化アルゴリズムであり、Adaptive Moment Estimationの略である。多くのタスクで安定して高速に収束することから、現在の深層学習における最も標準的で広く使われるデフォルトの最適化手法となっている。", "note": "", "imp": "◎"}, {"id": 148, "cat": "5.DL概要", "term": "誤差関数の最適化", "en": "Optimizer", "desc": "損失関数の値を最小化するようにニューラルネットワークのパラメータを更新していくアルゴリズム全般を指す総称であり、オプティマイザとも呼ばれる。基本となる勾配降下法から派生し、モメンタム、AdaGrad、RMSProp、Adamなど更新方法の異なる様々な手法が提案されている。タスクやデータの性質に応じて適切なオプティマイザとその学習率を選ぶことが、モデルの学習効率と最終的な性能を大きく左右する。", "note": "", "imp": "○"}, {"id": 149, "cat": "6.DL学習技術", "term": "事前学習", "en": "Pre-training", "desc": "深層ネットワークの各層を1層ずつ教師なし学習で初期化してから全体を微調整する手法である。勾配消失により深いネットワークの学習が難しかった時代に、良い初期値を与えて学習を成立させるために考案された。代表的にはオートエンコーダを積み重ねて層ごとに学習させ、その後に誤差逆伝播で全体を調整する積層オートエンコーダの手法が知られる。", "note": "オートエンコーダ", "imp": "○"}, {"id": 150, "cat": "6.DL学習技術", "term": "オートエンコーダ", "en": "Autoencoder", "desc": "入力データを一度低次元の潜在表現に圧縮するエンコーダと、それを元の入力に近い形へ復元するデコーダから成るニューラルネットである。出力が入力自身に一致するよう学習させることで、データの本質的な特徴を教師なしで抽出できる。次元削減や異常検知、事前学習の初期化など幅広く応用され、画像を28×28画素から数十次元の潜在ベクトルに圧縮するといった使い方が典型例である。", "note": "次元削減/事前学習", "imp": "◎"}, {"id": 151, "cat": "6.DL学習技術", "term": "積層オートエンコーダ", "en": "Stacked Autoencoder", "desc": "複数のオートエンコーダを層状に積み重ね、下位層から順に1層ずつ教師なしで学習させていく事前学習手法である。各層が入力を圧縮・復元する学習を終えたら、その隠れ層の出力を次のオートエンコーダの入力として学習を繰り返し、最終的に深いネットワーク全体の初期重みを構築する。ヒントンらが2006年頃に提案し、当時困難だった深層ネットワークの学習を可能にした点で歴史的に重要である。", "note": "ヒントンら", "imp": "○"}, {"id": 152, "cat": "6.DL学習技術", "term": "ファインチューニング", "en": "Fine-tuning", "desc": "大量データで学習済みの汎用モデルを、少量の目的タスク用データを使って再学習し、特定の用途に適応させる手法である。ゼロから学習するよりも少ないデータと計算量で高い精度が得られるため、画像認識ではImageNetで事前学習したResNetを医療画像分類に適用したり、自然言語処理ではBERTを特定のQ&Aタスク向けに調整したりする際に広く用いられる。", "note": "", "imp": "◎"}, {"id": 153, "cat": "6.DL学習技術", "term": "ドロップアウト", "en": "Dropout", "desc": "学習時に一定の確率でニューロンの一部をランダムに無効化しながら学習を進めることで、特定のノードへの依存を減らし過学習を抑制する正則化手法である。例えば確率0.5でノードを無効化すると、毎回異なる部分ネットワークを学習させることになり、これは多数の異なるモデルを組み合わせるアンサンブル学習に似た効果を生む。推論時には全ノードを使い出力をスケーリングして調整する。", "note": "", "imp": "◎"}, {"id": 154, "cat": "6.DL学習技術", "term": "バッチ正規化", "en": "Batch Normalization", "desc": "ミニバッチごとに各層への入力を平均0・分散1になるよう正規化し、その後スケールとシフトを学習可能なパラメータで調整する手法である。層を重ねるごとに入力分布が変化してしまう内部共変量シフトを抑えることで、学習率を大きく設定でき学習が安定・高速化し、過学習の抑制効果も期待できる。CNNをはじめ多くの深層モデルで標準的に使われている。", "note": "", "imp": "◎"}, {"id": 155, "cat": "6.DL学習技術", "term": "早期終了", "en": "Early Stopping", "desc": "学習を進めるたびに検証データでの誤差を監視し、それが改善しなくなった時点で学習を打ち切る過学習対策の手法である。訓練誤差は学習を続けるほど下がり続ける一方、検証誤差はある時点から悪化し始めることが多く、この転換点で止めることで汎化性能の高いモデルを得られる。追加の計算コストがほとんどかからない手軽な対策として広く使われる。", "note": "過学習対策", "imp": "○"}, {"id": 156, "cat": "6.DL学習技術", "term": "データ拡張", "en": "Data Augmentation", "desc": "手持ちの訓練データに回転・反転・拡大縮小・明るさ変更・切り出しなどの加工を施して人工的に学習データ数を増やす手法である。データ量が限られる場合でもモデルが多様なパターンに触れられるようになり、過学習の抑制と汎化性能の向上につながる。画像認識では猫の画像を左右反転させたり色調を変えたりして水増しするのが典型例である。", "note": "", "imp": "◎"}, {"id": 157, "cat": "6.DL学習技術", "term": "転移学習", "en": "Transfer Learning", "desc": "あるタスクで学習して得た知識やモデルを、別の関連タスクの学習に再利用する手法である。ゼロから学習するのに比べて必要なデータ量や学習時間を大幅に削減できる利点があり、例えばImageNetで学習した画像分類モデルの前半層をそのまま特徴抽出器として使い、最終層だけを新しいタスク用に付け替えて学習させるといった使い方がされる。ファインチューニングは転移学習を実現する代表的な手段の一つである。", "note": "", "imp": "◎"}, {"id": 158, "cat": "6.DL学習技術", "term": "重みの初期化", "en": "Weight Initialization", "desc": "ニューラルネットの学習を始める前に各層の重みにどのような初期値を与えるかを決める方法である。全ての重みを同じ値や0にすると各ニューロンが同じ更新をしてしまい学習が進まないため、活性化関数の種類に応じた適切な乱数分布から初期値を設定することが重要になる。シグモイド系にはXavierの初期化、ReLU系にはHeの初期化が用いられるのが代表例である。", "note": "Xavier/He初期化", "imp": "○"}, {"id": 159, "cat": "6.DL学習技術", "term": "Xavierの初期化", "en": "Xavier Init", "desc": "シグモイドやtanhなど出力が0付近で線形に近い活性化関数に適した重み初期化手法である。前の層のノード数と次の層のノード数の両方を考慮して重みの分散を調整することで、順伝播・逆伝播の際に信号の分散が層を通過しても大きく変化しないようにし、勾配消失や勾配爆発を防ぐ。グロロットの初期化とも呼ばれる。", "note": "", "imp": "○"}, {"id": 160, "cat": "6.DL学習技術", "term": "Heの初期化", "en": "He Init", "desc": "ReLUのように負の入力を0にする非線形性の強い活性化関数に適した重み初期化手法である。ReLUでは出力の分散が半分になりやすい性質を踏まえ、Xavierの初期化よりも大きめの分散を持つ乱数で重みを初期化することで、深いネットワークでも信号や勾配が消えずに伝わるよう工夫されている。現在のCNNなどで標準的に採用されている。", "note": "", "imp": "○"}, {"id": 161, "cat": "6.DL学習技術", "term": "勾配クリッピング", "en": "Gradient Clipping", "desc": "逆伝播で計算された勾配のノルムが一定の閾値を超えた場合に、その大きさを閾値内に収まるようスケーリングする手法である。RNNのように時間方向に深く展開されるネットワークでは勾配が指数的に増大する勾配爆発が起きやすく、学習が発散する原因になるため、この手法で更新幅を制限し学習を安定させる。閾値を例えば5に設定し、勾配ノルムがそれを超えたら比例縮小するといった形で実装される。", "note": "", "imp": "○"}, {"id": 162, "cat": "6.DL学習技術", "term": "蒸留", "en": "Distillation", "desc": "精度の高い大規模な教師モデルが出力する確率分布などの情報を、より小さな生徒モデルに学習させることでモデルを軽量化する手法である。正解ラベルだけでなく教師モデルが各クラスに割り振る確率の相対的な大小といったソフトな情報も伝えることで、生徒モデルは単純な教師あり学習より高い性能を得やすい。スマートフォンなど計算資源の限られる環境へ大規模モデルの性能を移植する際に利用される。", "note": "", "imp": "○"}, {"id": 163, "cat": "6.DL学習技術", "term": "プルーニング", "en": "Pruning", "desc": "学習済みネットワークの中で出力への寄与が小さい重みやニューロンを削除し、モデルを軽量化・高速化する手法である。重みの絶対値が小さい結合を間引くなどの基準で不要な部分を特定し取り除くことで、精度をほぼ維持しながらパラメータ数や計算量を削減できる。エッジデバイスなど計算資源が限られる環境へモデルを展開する際に量子化と併用されることが多い。", "note": "", "imp": "△"}, {"id": 164, "cat": "6.DL学習技術", "term": "量子化", "en": "Quantization", "desc": "モデルの重みや活性化値を32ビット浮動小数点数から8ビット整数などより少ないビット数の表現に変換し、モデルサイズと計算コストを削減する手法である。精度の低下と引き換えにメモリ使用量や推論時間を大きく減らせるため、スマートフォンやIoT機器など限られた計算資源で深層学習モデルを動かす際に有効な軽量化技術として、プルーニングと並んで用いられる。", "note": "", "imp": "△"}, {"id": 165, "cat": "7.DLの手法", "term": "畳み込みニューラルネット", "en": "CNN", "desc": "画像などの格子状データに対し、小さなフィルタを滑らせて局所的な特徴を抽出する畳み込み層を中心に構成されたニューラルネットである。全結合層と違いフィルタの重みを画像全体で共有するため、パラメータ数を抑えつつ位置に関わらず同じパターンを検出でき、画像分類・物体検出・顔認識など画像認識分野の主役として広く使われている。AlexNetやResNetなど多くの著名モデルの基盤になっている。", "note": "画像認識の主役", "imp": "◎"}, {"id": 166, "cat": "7.DLの手法", "term": "畳み込み層", "en": "Convolution Layer", "desc": "入力画像やその特徴マップに対して小さなフィルタ（カーネル）をスライドさせながら適用し、エッジや模様といった局所的な特徴を抽出する層である。フィルタの重みは画像全体の位置で共有されるため、同じパターンが画像のどこにあっても検出でき、全結合層に比べてパラメータ数を大幅に削減できる。CNNの各段階でこの層を重ねることで、単純な特徴から複雑な特徴へと段階的に抽出していく。", "note": "", "imp": "◎"}, {"id": 167, "cat": "7.DLの手法", "term": "フィルタ／カーネル", "en": "Filter / Kernel", "desc": "畳み込み層で入力画像上を滑らせながら適用される小さな重み行列であり、エッジ・角・色のかたまりといった特定のパターンを検出する役割を持つ。例えば3×3や5×5サイズの行列が用いられ、学習によって縦線を検出するフィルタや斜め方向のエッジを検出するフィルタなどが自動的に獲得される。同じフィルタを画像全体に適用することで、位置によらない特徴抽出が可能になる。", "note": "", "imp": "○"}, {"id": 168, "cat": "7.DLの手法", "term": "プーリング層", "en": "Pooling Layer", "desc": "畳み込み層で得られた特徴マップを一定領域ごとに集約し、サイズを縮小する層である。これにより計算量とパラメータ数を削減できるだけでなく、対象が画像内で多少位置ずれしても同じ特徴として認識できる頑健性（不変性）が得られる。領域内の最大値を取る最大値プーリングと、平均値を取る平均値プーリングが代表的な方式である。", "note": "Max/Average", "imp": "◎"}, {"id": 169, "cat": "7.DLの手法", "term": "最大値プーリング", "en": "Max Pooling", "desc": "プーリング層の一種で、指定した領域内の画素値や特徴量の中から最大値だけを取り出して代表値とする処理である。例えば2×2の領域ごとに最大値を選ぶと特徴マップの縦横のサイズがそれぞれ半分になる。最も強く反応した特徴を残す性質があるため、エッジや模様の有無といった顕著な特徴を保ちながら平均値プーリングよりも高い精度が得られやすいとされる。", "note": "", "imp": "○"}, {"id": 170, "cat": "7.DLの手法", "term": "ストライド", "en": "Stride", "desc": "畳み込みやプーリングでフィルタ（窓）を入力上でずらしていく際の移動幅を指す。ストライドが1ならフィルタを1画素ずつ動かして密に処理し、2にすると2画素ずつ飛ばして動かすため出力の特徴マップが縦横それぞれおよそ半分のサイズに縮小される。ストライドを大きくすると計算量が減る一方、細かい情報が失われやすくなるというトレードオフがある。", "note": "", "imp": "○"}, {"id": 171, "cat": "7.DLの手法", "term": "パディング", "en": "Padding", "desc": "畳み込み処理を行う前に入力データの周囲に0などの値を付け足し、出力される特徴マップのサイズを調整する処理である。パディングをしないと畳み込みのたびに画像の端が削られてサイズが縮小し、端の情報も十分に畳み込まれないまま失われやすい。入力と出力のサイズを同じに保つ「same」パディングと、パディングを行わない「valid」方式がよく比較される。", "note": "", "imp": "○"}, {"id": 172, "cat": "7.DLの手法", "term": "全結合層", "en": "Fully Connected", "desc": "前の層の全てのユニットと次の層の全てのユニットが結合している層であり、CNNやMLPの終盤で特徴を統合し最終的な分類・回帰結果を出力する役割を担う。畳み込み層やプーリング層で抽出された局所的な特徴マップを1次元に展開（フラット化）した上でこの層に入力し、softmax関数などを通して各クラスに属する確率を出力するといった使い方が代表的である。", "note": "", "imp": "○"}, {"id": 173, "cat": "7.DLの手法", "term": "ネオコグニトロン", "en": "Neocognitron", "desc": "福島邦彦が1980年に提案した、視覚野の構造を模した多層ニューラルネットワークであり、現在のCNNの原型とされる。単純細胞に相当する特徴抽出層と複雑細胞に相当する特徴統合層を交互に重ねることで、対象の位置がずれても同じパターンとして認識できる仕組みを備えており、この考え方が後年のLeNetやAlexNetなど畳み込みニューラルネットの発展につながった。", "note": "", "imp": "○"}, {"id": 174, "cat": "7.DLの手法", "term": "LeNet", "en": "LeNet", "desc": "ヤン・ルカンらが1990年代に開発した、手書き数字認識のための初期の畳み込みニューラルネットである。畳み込み層とプーリング層を組み合わせた構造を持ち、郵便番号の手書き数字を読み取る実用システムとして銀行の小切手処理などに実際に使われた。当時は計算資源の制約からあまり注目されなかったが、後のCNN発展の基礎を築いた歴史的に重要なモデルである。", "note": "", "imp": "○"}, {"id": 175, "cat": "7.DLの手法", "term": "AlexNet", "en": "AlexNet", "desc": "2012年の画像認識コンペティションILSVRCで、それまでの手法を大きく上回る精度で優勝したCNNであり、これを機にディープラーニングが急速に注目を集めるきっかけとなったモデルである。ヒントンらの研究室が開発し、ReLU活性化関数やドロップアウト、GPUによる大規模並列計算を活用した点が特徴で、それまでのエラー率を10ポイント近く改善したことが大きな話題となった。", "note": "ヒントンら", "imp": "◎"}, {"id": 176, "cat": "7.DLの手法", "term": "ILSVRC", "en": "ILSVRC", "desc": "ImageNetという大規模画像データセットを用いて、画像分類や物体検出の精度を競う国際的なコンペティションである。2010年から2017年まで毎年開催され、2012年にAlexNetが圧倒的な精度で優勝したことをきっかけにディープラーニング技術が急速に広まった。以後もVGG、GoogLeNet、ResNetなど代表的なCNNモデルがこの大会を通じて生まれている。", "note": "", "imp": "○"}, {"id": 177, "cat": "7.DLの手法", "term": "VGG", "en": "VGG", "desc": "オックスフォード大学のグループが開発した、3×3という小さなフィルタを何層も規則的に重ねることで深さを実現したCNNである。大きなフィルタを1回使うよりも小さなフィルタを複数回重ねる方がパラメータ数を抑えつつ同等の受容野が得られるという考えに基づいており、シンプルで均一な構造ながら高い性能を示したことから、後続の様々なモデルの設計にも影響を与えた。", "note": "", "imp": "○"}, {"id": 178, "cat": "7.DLの手法", "term": "GoogLeNet", "en": "GoogLeNet", "desc": "Googleが開発した、Inceptionモジュールと呼ばれる異なるサイズのフィルタを並列に配置した構造を持つ深いCNNである。1×1、3×3、5×5といった複数サイズの畳み込みを同時に行い結果を結合することで、様々なスケールの特徴を一つの層で捉えられるようにし、パラメータ数を抑えながら深いネットワークを実現した。2014年のILSVRCで優勝している。", "note": "", "imp": "○"}, {"id": 179, "cat": "7.DLの手法", "term": "ResNet", "en": "ResNet", "desc": "マイクロソフトが開発した、層の入力を出力に直接加算するスキップ結合（残差学習）を導入することで、非常に深いネットワークでも安定して学習できるようにしたCNNである。層数が増えるほど勾配消失により学習が難しくなる問題を、恒等写像を学習しやすくする残差ブロックの構造で解決し、100層を超えるような超深層ネットワークを実現した。2015年のILSVRCで優勝し、以後の深層モデル設計の標準的な構成要素となった。", "note": "残差学習", "imp": "◎"}, {"id": 180, "cat": "7.DLの手法", "term": "スキップ結合", "en": "Skip Connection", "desc": "ネットワークのある層の入力を、いくつか先の層の出力に直接加算する形で伝える構造であり、残差結合とも呼ばれる。層を重ねるほど深くなるにつれて勾配が消えてしまい学習が進みにくくなる勾配消失問題を、入力をそのまま後方へ伝える近道を作ることで緩和する。ResNetの中核をなすアイデアであり、これにより100層を超える超深層ネットワークの学習が可能になった。", "note": "ResNet", "imp": "○"}, {"id": 181, "cat": "7.DLの手法", "term": "リカレントニューラルネット", "en": "RNN", "desc": "文章や音声、株価のような時系列・系列データを扱うために、隠れ層の出力を次の時刻の入力へ再帰的に戻す構造を持つニューラルネットである。過去の情報を隠れ状態として保持しながら1つずつ要素を処理していくため、単語の並びの文脈を踏まえた言語処理や、時系列の将来予測などに用いられる。ただし長い系列では勾配消失により古い情報を覚えづらいという弱点があり、これを補うためLSTMやGRUが考案された。", "note": "", "imp": "◎"}, {"id": 182, "cat": "7.DLの手法", "term": "BPTT", "en": "BPTT", "desc": "RNNを学習させる際に用いる誤差逆伝播法の拡張であり、再帰構造を時間方向に展開して通常の順伝播型ネットワークとみなした上で誤差を逆伝播させる手法である。系列が長くなるほど展開されるネットワークも深くなるため、勾配消失や勾配爆発が起きやすくなる問題があり、これがLSTMやGRUのようなゲート構造や勾配クリッピングが必要とされる背景になっている。", "note": "", "imp": "○"}, {"id": 183, "cat": "7.DLの手法", "term": "LSTM", "en": "Long Short-Term Memory", "desc": "通常のRNNが抱える勾配消失問題を解決するために考案された改良版のRNNであり、入力ゲート・忘却ゲート・出力ゲートという3つのゲート機構とセル状態と呼ばれる記憶経路を持つ。これにより必要な情報だけを長期間保持し不要な情報を忘れるという制御が可能になり、文章の前の方に出てきた主語を文末近くまで覚えておく必要がある文章生成や機械翻訳などで高い性能を発揮する。", "note": "", "imp": "◎"}, {"id": 184, "cat": "7.DLの手法", "term": "ゲート機構", "en": "Gate", "desc": "LSTMやGRUなどのRNN改良版において、シグモイド関数で0から1の値を出力し情報をどれだけ通す・保持する・忘れるかを制御する仕組みである。LSTMでは新しい情報をどれだけ取り込むかを決める入力ゲート、過去の情報をどれだけ忘れるかを決める忘却ゲート、セル状態から出力にどれだけ反映するかを決める出力ゲートの3種類が組み合わさって、長期的な依存関係の学習を実現している。", "note": "入力/忘却/出力ゲート", "imp": "○"}, {"id": 185, "cat": "7.DLの手法", "term": "GRU", "en": "Gated Recurrent Unit", "desc": "LSTMの構造を簡略化し、入力ゲートと忘却ゲートを統合したリセットゲートと更新ゲートの2種類のゲートのみで構成したRNNの改良モデルである。LSTMに比べてパラメータ数が少なく計算コストを抑えられる一方で、多くのタスクでLSTMと同程度の性能を発揮できるとされ、計算資源が限られる場面や高速な学習が求められる場面で選ばれることがある。", "note": "", "imp": "○"}, {"id": 186, "cat": "7.DLの手法", "term": "双方向RNN", "en": "Bidirectional RNN", "desc": "系列データを時間の順方向だけでなく逆方向からも同時に処理し、両方向の隠れ状態を組み合わせて出力するRNNの構成である。通常のRNNは過去の情報しか参照できないが、この構造では未来の情報も踏まえて各時点の出力を決められるため、文章全体を見渡して単語の品詞を判定する固有表現認識や音声認識など、系列全体が既知の状況でのタスクに有効である。", "note": "", "imp": "○"}, {"id": 187, "cat": "7.DLの手法", "term": "Seq2Seq", "en": "Sequence to Sequence", "desc": "可変長の入力系列を受け取り、それとは異なる長さや形式の出力系列を生成するモデルの枠組みであり、エンコーダ・デコーダ構造で実現される。入力文をエンコーダで固定長のベクトルに要約し、デコーダがそのベクトルをもとに1語ずつ出力を生成していく仕組みで、日本語を英語に変換する機械翻訳や、質問に対する応答を生成する対話システムなどに応用される。", "note": "翻訳など", "imp": "◎"}, {"id": 188, "cat": "7.DLの手法", "term": "エンコーダ・デコーダ", "en": "Encoder-Decoder", "desc": "入力データを一旦圧縮された内部表現（コンテキストベクトル）に変換するエンコーダと、その内部表現から目的の出力形式を生成するデコーダを組み合わせた構造である。入力と出力の系列長や種類が異なるタスクに柔軟に対応できるため、機械翻訳や文章要約、画像からキャプションを生成するタスクなど幅広い分野の基盤構造として用いられている。", "note": "", "imp": "○"}, {"id": 189, "cat": "7.DLの手法", "term": "アテンション", "en": "Attention", "desc": "入力系列の各要素に対して、出力を生成する際にどの部分をどれだけ重視すべきかを動的に計算し重み付けする仕組みである。Seq2Seqにおいて固定長のベクトルに全情報を圧縮すると長い文章で情報が失われる問題があったため導入され、例えば英語を日本語に翻訳する際に、出力する単語ごとに入力文の対応する単語へ高い重みを割り当てて参照できるようにする。この仕組みがTransformerの中核技術へと発展した。", "note": "", "imp": "◎"}, {"id": 190, "cat": "7.DLの手法", "term": "Transformer", "en": "Transformer", "desc": "2017年の論文「Attention Is All You Need」で提案された、再帰構造を使わずアテンション機構のみで系列データを処理するモデルである。自己注意機構により系列内の全要素間の関係を並列に計算できるため、RNNのように逐次処理する必要がなく学習を高速化でき、長距離の依存関係も捉えやすい。このアーキテクチャがBERTやGPTなど現在の大規模言語モデルの基盤となっている。", "note": "2017年", "imp": "◎"}, {"id": 191, "cat": "7.DLの手法", "term": "自己注意機構", "en": "Self-Attention", "desc": "同一の系列内にある要素同士の関連度を計算し、各要素が他のどの要素に注目すべきかを重み付けする仕組みであり、Transformerの中核をなす技術である。クエリ・キー・バリューと呼ばれる3種類のベクトルを用いて要素間の類似度を計算し、その重みに応じて情報を集約することで、例えば文中の代名詞がどの名詞を指すかといった長距離の依存関係も一度に捉えられる。", "note": "Transformer中核", "imp": "◎"}, {"id": 192, "cat": "7.DLの手法", "term": "位置エンコーディング", "en": "Positional Encoding", "desc": "Transformerが再帰構造を持たず全要素を並列処理するために失われる単語の順序情報を補うために、各位置に固有のベクトルを加算して与える仕組みである。サイン・コサイン関数を組み合わせた周期的な値を位置ごとに割り当てる方式が原論文で提案されており、これにより「私は彼を見た」と「彼は私を見た」のような語順の違いをモデルが区別できるようになる。", "note": "", "imp": "○"}, {"id": 193, "cat": "8.応用-画像", "term": "画像認識", "en": "Image Recognition", "desc": "画像認識とは、入力された画像に写っているものが何であるかをコンピュータに識別させるタスクであり、CNNの発展によって人間の認識精度に匹敵する性能が実現された分野である。画像分類（クラス分類）はその基本形であり、例えば犬・猫の画像を入力してどちらの動物かを出力するといった用途が代表例である。工場の外観検査や医療画像診断など、産業応用の入口となる技術でもある。", "note": "", "imp": "○"}, {"id": 194, "cat": "8.応用-画像", "term": "物体検出", "en": "Object Detection", "desc": "物体検出とは、画像中に含まれる複数の物体について、それぞれの位置（バウンディングボックス）と種類（クラス）を同時に特定するタスクである。単純な画像分類が「1枚に何が写っているか」しか答えないのに対し、物体検出は「どこに何がいくつあるか」まで答える点が重要であり、自動運転の歩行者検知や監視カメラでの人物検知などに応用される。R-CNN系列やYOLO、SSDなど多様な手法が提案されている。", "note": "", "imp": "◎"}, {"id": 195, "cat": "8.応用-画像", "term": "R-CNN", "en": "R-CNN", "desc": "R-CNNとは、画像中から物体が存在しそうな候補領域（リージョンプロポーザル）をまず抽出し、それぞれの領域をCNNで特徴抽出してからクラス分類・位置調整を行う2段階方式の物体検出手法である。初期のR-CNNは候補領域ごとにCNNを個別実行するため低速だったが、Fast R-CNNで特徴抽出を画像全体で共有し、Faster R-CNNでは候補領域の生成自体もニューラルネットワーク（RPN）化することで高速化と精度向上を両立させた。", "note": "Fast/Faster R-CNN", "imp": "○"}, {"id": 196, "cat": "8.応用-画像", "term": "YOLO", "en": "You Only Look Once", "desc": "YOLO（You Only Look Once）とは、画像を一度だけCNNに通すことで物体の位置とクラスを同時に予測する1段階方式の物体検出手法である。R-CNN系のように候補領域生成と分類を別々に行わないため処理が高速であり、動画のリアルタイム物体検出（例えば監視カメラ映像での人物検知）に適している点が最大の特徴である。速度を優先する代わりに小さい物体の検出精度はやや劣る傾向がある。", "note": "リアルタイム", "imp": "◎"}, {"id": 197, "cat": "8.応用-画像", "term": "SSD", "en": "Single Shot Detector", "desc": "SSD（Single Shot Detector）とは、YOLOと同様に画像を1回のネットワーク通過で処理し、物体の位置とクラスを同時に出力する高速な物体検出手法である。異なる解像度の特徴マップを複数階層から利用することで、大きな物体から小さな物体まで幅広いサイズに対応できるよう設計されている点がYOLOとの違いであり、精度と速度のバランスに優れる手法として知られる。", "note": "", "imp": "○"}, {"id": 198, "cat": "8.応用-画像", "term": "セマンティックセグメンテーション", "en": "Semantic Segmentation", "desc": "セマンティックセグメンテーションとは、画像を構成する画素（ピクセル）の一つ一つに対して、それがどのクラスに属するか（例えば「空」「道路」「車」など）を分類するタスクである。物体検出が矩形の範囲でしか位置を示さないのに対し、画素単位で領域の輪郭まで正確に把握できるため、自動運転における走行可能領域の判定や医療画像での病変部位の特定などに応用される。", "note": "", "imp": "◎"}, {"id": 199, "cat": "8.応用-画像", "term": "インスタンスセグメンテーション", "en": "Instance Segmentation", "desc": "インスタンスセグメンテーションとは、セマンティックセグメンテーションをさらに発展させ、同じクラスに属する物体であっても個体ごとに別々の領域として区別して分割するタスクである。例えば画像内に人が3人写っている場合、単に「人」という画素分類にとどまらず、1人目・2人目・3人目をそれぞれ別領域として識別する。代表的な手法にFaster R-CNNを拡張したMask R-CNNがあり、物体検出と画素単位のマスク生成を同時に行う。", "note": "Mask R-CNN", "imp": "○"}, {"id": 200, "cat": "8.応用-画像", "term": "FCN", "en": "Fully Convolutional Network", "desc": "FCN（Fully Convolutional Network）とは、通常のCNNの末尾にある全結合層を用いず、畳み込み層のみで構成することで、入力画像と同じ空間的な広がりを持つ画素単位の出力（クラスラベルのマップ）を得られるようにしたネットワーク構造である。全結合層を使わないことで任意サイズの画像を入力でき、セマンティックセグメンテーションを実現する基礎的な手法として位置づけられる。", "note": "", "imp": "○"}, {"id": 201, "cat": "8.応用-画像", "term": "U-Net", "en": "U-Net", "desc": "U-Netとは、画像を段階的に縮小しながら特徴を抽出するエンコーダ部分と、それを元の解像度まで復元するデコーダ部分をU字型に組み合わせ、さらに対応する層同士をスキップ接続でつなぐことで、位置情報を保ったまま高精度なセグメンテーションを可能にしたCNNである。もともと医療画像（細胞やCTスキャンなど）の領域分割のために提案され、少ない学習データでも高い精度が出せることから医療分野で広く使われている。", "note": "", "imp": "○"}, {"id": 202, "cat": "8.応用-画像", "term": "姿勢推定", "en": "Pose Estimation", "desc": "姿勢推定とは、画像や動画から人体の関節（肩・肘・膝など）の位置を検出し、人がどのような姿勢を取っているかを推定するタスクである。関節点をつなぐことで骨格構造（スケルトン）を得られ、スポーツフォームの分析、リハビリ支援、ジェスチャー操作、防犯カメラでの異常行動検知などに応用される。代表的な手法にOpenPoseがある。", "note": "OpenPose", "imp": "○"}, {"id": 203, "cat": "8.応用-画像", "term": "OpenPose", "en": "OpenPose", "desc": "OpenPoseとは、カーネギーメロン大学が開発した姿勢推定手法であり、画像中に複数人が写っている場合でも各人物の関節位置と骨格をリアルタイムかつ同時に推定できる点が特徴である。各関節間のつながりやすさを表す部位親和性フィールド（PAF）という仕組みを用いることで、人数が増えても効率的に個々の骨格を組み立てられるよう設計されている。", "note": "", "imp": "△"}, {"id": 204, "cat": "8.応用-画像", "term": "IoU", "en": "Intersection over Union", "desc": "IoU（Intersection over Union）とは、物体検出において予測した領域（バウンディングボックス）と正解領域がどれだけ重なっているかを表す評価指標であり、両者の重なり部分の面積を、両者を合わせた面積（和集合）で割って算出する。値は0から1の範囲を取り、1に近いほど予測と正解が一致していることを意味する。一般にIoUが0.5以上であれば正しい検出とみなす、といった閾値判定に用いられる。", "note": "", "imp": "○"}, {"id": 205, "cat": "8.応用-画像", "term": "mAP", "en": "mean Average Precision", "desc": "mAP（mean Average Precision）とは、物体検出モデルの性能を総合的に評価する代表的な指標であり、各クラスごとに適合率と再現率の関係から算出されるAP（Average Precision）を求め、それを全クラスで平均した値である。IoUなどの閾値をどう設定するかによって値が変動するため、COCOデータセットのベンチマークなどでは複数のIoU閾値でmAPを算出して総合的な検出精度を比較する。", "note": "", "imp": "△"}, {"id": 206, "cat": "8.応用-画像", "term": "Grad-CAM", "en": "Grad-CAM", "desc": "Grad-CAM（Gradient-weighted Class Activation Mapping）とは、CNNが画像のどの領域に着目してその分類結果を出力したのかをヒートマップとして可視化する手法である。出力に対する勾配情報を用いて畳み込み層の各チャンネルの重要度を計算し、注目領域を色分け表示する仕組みであり、モデルが本当に犬の顔を見て「犬」と判定しているのか、背景だけを見て誤判定していないかを確認できるため、説明可能AI（XAI）の代表的な手法として知られる。", "note": "説明可能AI", "imp": "○"}, {"id": 207, "cat": "8.応用-画像", "term": "データセットImageNet", "en": "ImageNet", "desc": "ImageNetとは、1000クラス以上、1400万枚以上の画像にラベルを付与した大規模画像データセットであり、画像認識研究の発展を支えた基盤である。このデータセットを用いた画像認識コンテストILSVRC（ImageNet Large Scale Visual Recognition Challenge）では、2012年にAlexNetが従来手法を大きく上回る精度を達成し、以降のディープラーニングブームの火付け役となったことで知られる。", "note": "", "imp": "○"}, {"id": 208, "cat": "9.応用-言語音声", "term": "自然言語処理", "en": "NLP", "desc": "自然言語処理（NLP）とは、人間が日常的に使う言語（自然言語）をコンピュータに理解・生成・処理させるための技術分野全般を指す。機械翻訳、文章要約、感情分析、チャットボット、検索エンジンなど応用範囲は非常に広く、近年はBERTやGPTなどのTransformerベースの大規模言語モデルの登場により、翻訳や文章生成の精度が飛躍的に向上している。", "note": "", "imp": "◎"}, {"id": 209, "cat": "9.応用-言語音声", "term": "形態素解析", "en": "Morphological Analysis", "desc": "形態素解析とは、文を意味を持つ最小単位である形態素（単語に近い単位）に分割し、それぞれの品詞（名詞・動詞など）や活用形を判定する処理である。英語のように単語間にスペースがある言語と異なり、日本語は単語の区切りが明示されないため、自然言語処理の最初のステップとして形態素解析が不可欠であり、代表的なツールにMeCabやJUMAN、近年ではSudachiなどがある。", "note": "MeCab", "imp": "◎"}, {"id": 210, "cat": "9.応用-言語音声", "term": "n-gram", "en": "n-gram", "desc": "n-gramとは、文章を構成する単語や文字を連続するn個のまとまりとして捉える表現方法であり、n=1のときユニグラム、n=2のときバイグラム、n=3のときトライグラムと呼ばれる。例えば「私は学生です」を単語バイグラムにすると「私は・は学生・学生です」のように分割され、直前の語との共起関係を捉えられるため、言語モデルやテキストの特徴量抽出、検索エンジンの索引付けなどに利用される。", "note": "", "imp": "○"}, {"id": 211, "cat": "9.応用-言語音声", "term": "BoW", "en": "Bag of Words", "desc": "BoW（Bag of Words）とは、文章中に含まれる単語の出現回数だけに着目し、単語が現れる順序（語順）は無視して文書をベクトルとして表現する手法である。例えば「猫が犬を追う」と「犬が猫を追う」は語順が違うが、含まれる単語の集合は同じであるため同一のベクトルになってしまう欠点がある。単純だが実装が容易であり、文書分類やスパムフィルタなど基本的な自然言語処理タスクの土台として長く使われてきた。", "note": "", "imp": "○"}, {"id": 212, "cat": "9.応用-言語音声", "term": "TF-IDF", "en": "TF-IDF", "desc": "TF-IDFとは、文書中の単語の重要度を数値化する代表的な指標であり、ある単語が特定の文書内で出現する頻度（TF：Term Frequency）と、その単語が他の多くの文書にはあまり出現しない希少性（IDF：Inverse Document Frequency）を掛け合わせて算出する。「is」や「the」のようにどの文書にも頻出する単語は重要度が下がり、特定の文書にだけ多く現れる専門用語は重要度が上がるため、検索エンジンの関連度計算や文書要約に広く利用される。", "note": "", "imp": "◎"}, {"id": 213, "cat": "9.応用-言語音声", "term": "単語埋め込み", "en": "Word Embedding", "desc": "単語埋め込み（Word Embedding）とは、単語を数百次元程度の実数値ベクトルに変換し、意味的に似た単語同士が空間上で近い位置に配置されるようにする表現手法である。BoWのような単純な出現回数ベースの表現と異なり、「王様」と「女王」のような意味の近さや、「王様−男性＋女性≒女王」のようなベクトル演算による類推までも扱えるようになった点が画期的であり、word2vecやGloVeが代表的な手法として知られる。", "note": "", "imp": "◎"}, {"id": 214, "cat": "9.応用-言語音声", "term": "word2vec", "en": "word2vec", "desc": "word2vecとは、Googleが提案した単語埋め込みの代表的な手法であり、大量のテキストから単語同士の共起関係を学習することで、意味の近い単語を近いベクトルに、さらに単語間の関係性（王様と女王、パリとフランスなど）をベクトルの引き算・足し算として表現できることで知られる。学習方式には周辺語から中心語を予測するCBOWと、中心語から周辺語を予測するSkip-gramの2種類がある。", "note": "CBOW/Skip-gram", "imp": "◎"}, {"id": 215, "cat": "9.応用-言語音声", "term": "CBOW／Skip-gram", "en": "CBOW / Skip-gram", "desc": "CBOWとSkip-gramは、いずれもword2vecにおける単語ベクトルの学習方式であり、CBOW（Continuous Bag of Words）は文中の周辺の単語群から中心にある単語を予測するように学習し、Skip-gramは逆に中心の単語から周辺の単語群を予測するように学習する。一般にCBOWは学習が高速で頻出語に強く、Skip-gramは低頻度語のベクトル表現に強いという傾向があるとされる。", "note": "word2vec", "imp": "○"}, {"id": 216, "cat": "9.応用-言語音声", "term": "fastText", "en": "fastText", "desc": "fastTextとは、Facebook（現Meta）が開発した単語埋め込み手法であり、単語全体だけでなく、単語を構成する部分文字列（サブワード、例えば「playing」を「pla」「lay」「ayi」…のような文字n-gramに分解したもの）の情報も学習に利用する点がword2vecとの大きな違いである。この仕組みにより、学習データに出現しなかった未知語や、活用形・接頭辞・接尾辞を持つ単語についても、部分文字列の類似性からある程度妥当なベクトルを推定できる。", "note": "", "imp": "○"}, {"id": 217, "cat": "9.応用-言語音声", "term": "ELMo", "en": "ELMo", "desc": "ELMo（Embeddings from Language Models）とは、双方向LSTMを用いた言語モデルを事前学習し、単語の前後の文脈に応じて動的に変化する単語ベクトル（文脈化単語表現）を生成する手法である。word2vecやfastTextが1つの単語に対して常に同じベクトルを割り当てるのに対し、ELMoは「銀行の口座」と「川の土手」のように同じ単語でも文脈によって異なる意味を反映したベクトルを出力できる点が画期的であり、BERT登場前の重要な橋渡しとなった技術である。", "note": "", "imp": "○"}, {"id": 218, "cat": "9.応用-言語音声", "term": "BERT", "en": "BERT", "desc": "BERT（Bidirectional Encoder Representations from Transformers）とは、Googleが開発したTransformerのエンコーダ部分を用いた事前学習済み言語モデルであり、文章を左右両方向から同時に読み込んで文脈を理解できる双方向性が最大の特徴である。事前学習には文中の単語を一部隠して予測させるマスク言語モデル（MLM）と、2つの文が連続するかを判定する次文予測（NSP）という2つのタスクが用いられ、その後に質問応答や文書分類など個別タスクへファインチューニングして使う。", "note": "MLM/NSP", "imp": "◎"}, {"id": 219, "cat": "9.応用-言語音声", "term": "マスク言語モデル", "en": "Masked Language Model", "desc": "マスク言語モデル（Masked Language Model）とは、文中の一部の単語をマスク記号（[MASK]など）に置き換えて隠し、その周囲の文脈から元の単語が何であったかを予測させることで言語モデルを事前学習する手法である。例えば「私は[MASK]を食べた」から「りんご」などの適切な単語を予測させることで、単語の意味や文脈依存性を学習させる。BERTの事前学習で採用されたことで広く知られるようになった。", "note": "BERT", "imp": "○"}, {"id": 220, "cat": "9.応用-言語音声", "term": "GPT", "en": "GPT", "desc": "GPT（Generative Pre-trained Transformer）とは、OpenAIが開発したTransformerのデコーダ部分のみを用いた生成型の言語モデルであり、直前までの単語列から次に来る単語を予測するという学習を大規模テキストで繰り返すことで、自然な文章を生成する能力を獲得する。BERTが文章の理解（分類など）を得意とするのに対し、GPTは文章の生成を得意とし、GPT-3・GPT-4のように大規模化するにつれて対話や要約、コード生成など幅広いタスクをこなせるようになった。", "note": "", "imp": "◎"}, {"id": 221, "cat": "9.応用-言語音声", "term": "大規模言語モデル", "en": "LLM", "desc": "大規模言語モデル（LLM：Large Language Model）とは、インターネット上の膨大なテキストデータを用いて数十億から数千億以上のパラメータを学習させた巨大な言語モデルの総称であり、GPTシリーズやBERT系列の大規模版などが該当する。パラメータ数やデータ量を増やすほど性能が向上する「スケーリング則」が知られており、追加学習なしで指示文（プロンプト）だけで様々なタスクをこなせる汎用性の高さが特徴である。", "note": "", "imp": "◎"}, {"id": 222, "cat": "9.応用-言語音声", "term": "ファウンデーションモデル", "en": "Foundation Model", "desc": "ファウンデーションモデル（基盤モデル）とは、大量かつ多様なデータで事前学習され、その後のファインチューニングやプロンプトを通じて翻訳・要約・分類・画像生成など幅広い下流タスクに応用できる汎用性の高いモデルの総称である。GPTやBERTのような大規模言語モデルのほか、画像生成モデルなども含まれ、個別タスクごとにゼロからモデルを作るのではなく、一つの基盤モデルを様々な用途に転用するという開発パラダイムの転換を象徴する概念である。", "note": "", "imp": "◎"}, {"id": 223, "cat": "9.応用-言語音声", "term": "プロンプト", "en": "Prompt", "desc": "プロンプトとは、ChatGPTのような生成AIに対して与える指示文・質問文・入力文のことであり、その内容や書き方次第で出力の質が大きく変わるため、望ましい回答を引き出すための指示文の設計・改善技術はプロンプトエンジニアリングと呼ばれる。例えば「小学生にもわかるように説明して」のように条件を明示したり、回答例を事前に示す（few-shotプロンプティング）ことで精度を高める工夫が行われる。", "note": "プロンプトエンジニアリング", "imp": "◎"}, {"id": 224, "cat": "9.応用-言語音声", "term": "ハルシネーション", "en": "Hallucination", "desc": "ハルシネーションとは、大規模言語モデルなどの生成AIが、文法的には自然で一見もっともらしいにもかかわらず、事実とは異なる内容や存在しない情報を自信満々に生成してしまう現象である。例えば実在しない論文や書籍を根拠として挙げたり、誤った歴史的事実を断定的に述べたりするケースが典型例であり、生成AIを業務や意思決定に活用する際には出力を鵜呑みにせず必ず裏取りする必要がある、重要なリスクとして知られる。", "note": "", "imp": "◎"}, {"id": 225, "cat": "9.応用-言語音声", "term": "RLHF", "en": "RLHF", "desc": "RLHF（Reinforcement Learning from Human Feedback、人間のフィードバックに基づく強化学習）とは、人間が複数のAI出力に対して良し悪しの評価やランキングを付け、その評価データを報酬モデルとして学習させたうえで、その報酬を最大化するように言語モデル自体を強化学習で調整する手法である。ChatGPTの学習でも用いられており、単に流暢な文章を生成するだけでなく、人間にとって有用で安全、かつ指示に忠実な出力をするようモデルを調整する目的で使われる。", "note": "", "imp": "◎"}, {"id": 226, "cat": "9.応用-言語音声", "term": "機械翻訳", "en": "Machine Translation", "desc": "機械翻訳とは、ある言語で書かれた文章を別の言語へ自動的に変換する技術であり、初期は単語や句を辞書的に置き換える統計的機械翻訳（SMT）が主流だったが、現在はニューラルネットワークを用いたニューラル機械翻訳（NMT）が中心となっている。特にTransformerの登場以降、文全体の文脈を考慮した自然な訳文を生成できるようになり、Google翻訳やDeepLなど実用サービスの精度向上につながった。", "note": "NMT", "imp": "○"}, {"id": 227, "cat": "9.応用-言語音声", "term": "音声認識", "en": "Speech Recognition", "desc": "音声認識とは、人の発話音声をコンピュータが解析し、対応するテキストに変換する技術である。スマートフォンの音声入力や音声アシスタント（Siriなど）、議事録の自動文字起こしなどに応用されており、近年はディープラーニングを用いた音響モデル・言語モデルの組み合わせにより、雑音下や様々な話者に対しても高い認識精度を実現している。", "note": "", "imp": "○"}, {"id": 228, "cat": "9.応用-言語音声", "term": "音声合成", "en": "Speech Synthesis", "desc": "音声合成とは、テキストデータから人の声に近い音声を自動生成する技術であり、カーナビの音声案内や音声アシスタントの発話、近年ではAIナレーションなどに広く使われている。従来は録音済みの音声断片をつなぎ合わせる方式が主流だったが、DeepMindが開発したWaveNetのようにニューラルネットワークで音声波形そのものを生成する方式が登場したことで、より自然で人間らしい抑揚を持つ音声が生成できるようになった。", "note": "WaveNet", "imp": "○"}, {"id": 229, "cat": "9.応用-言語音声", "term": "メル周波数ケプストラム", "en": "MFCC", "desc": "MFCC（メル周波数ケプストラム係数）とは、音声認識や話者認識で広く使われる代表的な音声特徴量であり、人間の耳が高い周波数の違いを鈍感に、低い周波数の違いを敏感に知覚する特性（メル尺度）を反映して音声のスペクトル情報を圧縮したものである。生の音声波形をそのまま扱うよりも人間の聴覚特性に沿った少ない次元数で音声の特徴を表現できるため、機械学習モデルへの入力として長年利用されてきた。", "note": "", "imp": "△"}, {"id": 230, "cat": "9.応用-言語音声", "term": "WaveNet", "en": "WaveNet", "desc": "WaveNetとは、DeepMindが開発した音声波形を直接生成するニューラルネットワークであり、拡張畳み込み（Dilated Convolution）を積み重ねることで、音声のような長い時系列データにおける広い範囲の依存関係を効率よく捉えられるよう設計されている。従来の音声合成に比べて格段に自然で人間に近い音質を実現し、GoogleアシスタントなどにDeepMindの技術として実用化されたことでも知られる。", "note": "", "imp": "○"}, {"id": 231, "cat": "9.応用-言語音声", "term": "音素", "en": "Phoneme", "desc": "音素（フォニーム）とは、言語における意味の区別に関わる音の最小単位であり、例えば日本語の「か」と「が」は「k」と「g」という音素の違いによって意味が区別される。音声認識や音声合成のシステムでは、音声を音素の並びとしてモデル化することが多く、言語ごとに音素の種類や数が異なる（例えば日本語より英語の方が音素数が多い）点も特徴である。", "note": "音韻と対比", "imp": "△"}, {"id": 232, "cat": "10.応用-強化生成", "term": "エージェント", "en": "Agent", "desc": "強化学習において、環境を観測しながら行動を選択し、その結果として報酬を受け取る学習主体である。ロボット制御ならセンサ情報から関節を動かす制御器が、囲碁AIなら盤面から次の一手を選ぶ計算主体がエージェントに相当する。エージェントは試行錯誤を繰り返しながら、報酬を最大化する行動則を自ら獲得していく。", "note": "強化学習", "imp": "○"}, {"id": 233, "cat": "10.応用-強化生成", "term": "環境・状態・行動・報酬", "en": "Environment/State/Action/Reward", "desc": "強化学習の枠組みを構成する4つの基本要素であり、環境はエージェントが置かれる世界、状態は環境の現在の状況、行動はエージェントが取れる選択肢、報酬は行動の良し悪しを示す数値信号である。例えば迷路探索では、迷路全体が環境、現在位置が状態、上下左右への移動が行動、ゴール到達時の得点が報酬にあたる。この4要素の相互作用のサイクルを通じてエージェントは学習を進める。", "note": "", "imp": "◎"}, {"id": 234, "cat": "10.応用-強化生成", "term": "方策", "en": "Policy", "desc": "ある状態においてエージェントがどの行動を選ぶかを決める戦略であり、強化学習が最終的に獲得すべき目標そのものである。方策は決定論的に一つの行動を返す場合と、各行動を選ぶ確率を返す確率的な場合がある。将棋AIであれば、盤面という状態を入力すると指し手の確率分布を出力する仕組みが方策に該当する。", "note": "", "imp": "○"}, {"id": 235, "cat": "10.応用-強化生成", "term": "価値関数", "en": "Value Function", "desc": "ある状態、あるいは状態と行動の組み合わせが将来的にどれだけの報酬をもたらすかを見積もる関数である。目先の報酬だけでなく将来得られる報酬の割引累積和を評価するため、遠回りでも最終的に得な行動を選べるようになる。状態価値関数Vと行動価値関数Qが代表例で、Q学習やDQNなど多くの手法がこの価値関数の推定を中心に据えている。", "note": "", "imp": "○"}, {"id": 236, "cat": "10.応用-強化生成", "term": "Q学習", "en": "Q-Learning", "desc": "状態と行動の組に対する期待報酬を表す行動価値Q(s,a)を、実際に得た報酬と次状態での最大Q値を使って繰り返し更新し、最適な方策を間接的に学ぶ強化学習の代表的手法である。方策に依存せず最良の行動価値を学習できるオフポリシー型の手法であり、テーブル形式でQ値を保持する素朴な実装でも迷路やゲームの最適経路学習に利用できる。深層学習と組み合わせるとDQNとなる。", "note": "", "imp": "◎"}, {"id": 237, "cat": "10.応用-強化生成", "term": "DQN", "en": "Deep Q-Network", "desc": "Q学習の行動価値関数をニューラルネットワークで近似することで、状態数が膨大で従来のテーブル管理では扱えない問題に強化学習を適用できるようにした手法である。DeepMindが開発し、Atariのブロック崩しなど複数のビデオゲームで画面のピクセル画像を入力するだけで人間を超える成績を達成したことで大きな注目を集めた。経験再生と目標ネットワークの導入によって学習を安定化させている点も特徴である。", "note": "Atariで成果", "imp": "◎"}, {"id": 238, "cat": "10.応用-強化生成", "term": "経験再生", "en": "Experience Replay", "desc": "エージェントが経験した状態・行動・報酬・次状態の組をバッファに蓄積しておき、そこからランダムに取り出して学習に再利用する手法である。時系列的に連続するデータをそのまま使うとサンプル間の相関が強く学習が不安定になるため、過去の経験をシャッフルして使うことで独立同分布に近づけ、DQNなどの学習を安定させる効果がある。", "note": "DQN", "imp": "○"}, {"id": 239, "cat": "10.応用-強化生成", "term": "方策勾配法", "en": "Policy Gradient", "desc": "価値関数を経由せず、方策そのものをパラメータ化して報酬の期待値が大きくなる方向に直接勾配法で最適化していく強化学習の手法である。行動空間が連続的なロボット制御など、行動の種類が多く価値関数ベースの手法が扱いにくい問題に向いている。REINFORCEアルゴリズムが基本形として知られる。", "note": "", "imp": "○"}, {"id": 240, "cat": "10.応用-強化生成", "term": "Actor-Critic", "en": "Actor-Critic", "desc": "行動を選ぶ方策担当のActorと、その行動の良し悪しを評価する価値関数担当のCriticを組み合わせ、互いにフィードバックし合いながら同時に学習を進める手法である。方策勾配法単体よりも学習の分散を抑えられ、安定した収束が期待できる。複数のエージェントを並列に動かし非同期で学習するA3Cはその代表的な発展形である。", "note": "A3C", "imp": "○"}, {"id": 241, "cat": "10.応用-強化生成", "term": "探索と活用", "en": "Exploration vs Exploitation", "desc": "強化学習に本質的に伴うジレンマであり、まだ試していない行動を試して情報を集める探索と、これまでの経験から最も報酬が高いとわかっている行動を選ぶ活用のバランスをどう取るかという問題である。探索ばかりでは効率が悪く、活用ばかりでは局所的な最適解に陥る恐れがある。一定確率εでランダムな行動を選び残りは最良の行動を選ぶε-greedy法が代表的な解決策として使われる。", "note": "ε-greedy", "imp": "○"}, {"id": 242, "cat": "10.応用-強化生成", "term": "マルチエージェント強化学習", "en": "Multi-agent RL", "desc": "単一のエージェントではなく複数のエージェントが同じ環境の中で互いに影響を与えながら学習する強化学習の枠組みである。他のエージェントの行動によって環境自体が変化して見えるため、単一エージェントの場合より学習が難しくなる。協調が必要な倉庫内の複数ロボットの制御や、対戦が発生するゲームAIの学習などに応用される。", "note": "", "imp": "△"}, {"id": 243, "cat": "10.応用-強化生成", "term": "AlphaGo", "en": "AlphaGo", "desc": "2016年にGoogle DeepMindが開発し、世界トップクラスのプロ棋士イ・セドル氏に対戦で勝利したことで世界的に注目された囲碁AIである。盤面の評価にディープラーニングを、次の一手の探索にモンテカルロ木探索を組み合わせることで、それまで人間に及ばないとされていた囲碁の分野でAIが人間を上回れることを示した歴史的な成果である。", "note": "モンテカルロ木探索+DL", "imp": "◎"}, {"id": 244, "cat": "10.応用-強化生成", "term": "AlphaGo Zero", "en": "AlphaGo Zero", "desc": "人間の棋譜データを一切使わず、ルールのみを与えられた状態から自己対戦だけを繰り返して学習し、従来のAlphaGoを上回る強さに到達した囲碁AIである。人間の知識に頼らずゼロから強化学習だけで高度な能力を獲得できることを示し、深層強化学習の可能性を大きく広げた事例として重要視されている。", "note": "", "imp": "○"}, {"id": 245, "cat": "10.応用-強化生成", "term": "生成モデル", "en": "Generative Model", "desc": "与えられたデータが従う確率分布を学習し、その分布に従う新しいデータを作り出すモデルの総称である。画像、文章、音声など様々なデータの生成に使われ、データの背後にある構造を捉えている点が識別モデルとは異なる。GAN、VAE、拡散モデルはいずれも生成モデルの代表例であり、近年の画像生成AIや文章生成AIの基盤となっている。", "note": "", "imp": "◎"}, {"id": 246, "cat": "10.応用-強化生成", "term": "GAN", "en": "Generative Adversarial Network", "desc": "偽物のデータを作る生成器と、本物か偽物かを見分ける識別器という2つのネットワークを競わせるように学習させることで、本物と見分けがつかないデータを生成できるようにする手法である。イアン・グッドフェロー氏が2014年に提案し、生成器は識別器を騙そうとし識別器は見破ろうとする敵対的な学習過程を通じて、双方が徐々に能力を高めていく点が特徴である。", "note": "イアン・グッドフェロー", "imp": "◎"}, {"id": 247, "cat": "10.応用-強化生成", "term": "生成器／識別器", "en": "Generator / Discriminator", "desc": "GANを構成する2つのネットワークであり、生成器はランダムなノイズなどを入力として本物らしい偽データを作り出す役割を、識別器は入力されたデータが本物か生成器が作った偽物かを判定する役割を担う。両者を交互に競わせながら学習させることで、最終的には識別器が見破れないほど精巧なデータを生成器が作れるようになる。", "note": "", "imp": "○"}, {"id": 248, "cat": "10.応用-強化生成", "term": "DCGAN", "en": "DCGAN", "desc": "GANの生成器と識別器の両方に畳み込みニューラルネットワークを用いた代表的な構成であり、Deep Convolutional GANの略である。プーリング層を使わずストライド付き畳み込みを利用するなど、安定した学習のための設計指針を示したことで、画像生成分野でのGAN研究の基礎となった。", "note": "", "imp": "○"}, {"id": 249, "cat": "10.応用-強化生成", "term": "CycleGAN", "en": "CycleGAN", "desc": "馬とシマウマの画像のように対応関係が明確なペアデータが存在しない状況でも、あるスタイルの画像を別のスタイルに変換できるように学習するGANの一種である。変換した画像を元に戻す逆変換を行い元の画像と一致させるサイクル一貫性損失を導入することで、ペアデータなしでも意味のある変換を学習できるようにした点が特徴である。", "note": "", "imp": "○"}, {"id": 250, "cat": "10.応用-強化生成", "term": "VAE", "en": "Variational Autoencoder", "desc": "入力データを潜在変数の確率分布へと変換するエンコーダと、その潜在変数から元のデータを復元するデコーダから構成される生成モデルである。通常のオートエンコーダと異なり潜在空間を確率分布として学習するため、学習後は潜在空間から適当にサンプリングするだけで新しいデータを生成できる。生成される画像はGANに比べてやや滑らかでぼやける傾向があるとされる。", "note": "", "imp": "◎"}, {"id": 251, "cat": "10.応用-強化生成", "term": "拡散モデル", "en": "Diffusion Model", "desc": "元のデータに少しずつノイズを加えて完全なノイズへと変化させる過程を学習し、その逆過程であるノイズから徐々にノイズを取り除いてデータを復元する過程を利用してデータを生成するモデルである。学習が安定しやすく高品質な画像を生成できることから近年急速に主流となり、後述のStable Diffusionなど数多くの画像生成AIの基盤技術になっている。", "note": "Stable Diffusion", "imp": "◎"}, {"id": 252, "cat": "10.応用-強化生成", "term": "Stable Diffusion", "en": "Stable Diffusion", "desc": "拡散モデルを用いた代表的なテキストから画像を生成するモデルであり、Stability AI社が中心となって開発しオープンソースとして公開されたことで広く普及した。画像そのものではなく圧縮された潜在空間上でノイズ除去処理を行うことで計算コストを抑えており、一般のパソコンでも比較的手軽に画像生成を試せる点が特徴である。", "note": "", "imp": "○"}, {"id": 253, "cat": "10.応用-強化生成", "term": "DALL-E", "en": "DALL-E", "desc": "OpenAIが開発した、文章による指示から画像を生成するモデルである。「アボカド型の椅子」のような現実には存在しない組み合わせの説明文からも、それらしい画像を生成できることを示し、テキストから画像を生成するという分野への注目を大きく高めた先駆的なモデルとして知られる。", "note": "", "imp": "○"}, {"id": 254, "cat": "10.応用-強化生成", "term": "マルチモーダル", "en": "Multimodal", "desc": "画像、テキスト、音声、動画といった異なる種類の情報を単一のモデルの中で組み合わせて扱う技術やモデルを指す。人間が視覚と聴覚など複数の感覚を統合して物事を理解するのと同様に、複数のモダリティの情報を組み合わせることで、単一のモダリティだけでは得られない豊かな理解や生成が可能になる。画像に説明文を付けるモデルなどが代表例である。", "note": "", "imp": "○"}, {"id": 255, "cat": "10.応用-強化生成", "term": "CLIP", "en": "CLIP", "desc": "OpenAIが開発した、画像とその説明文であるテキストを同じベクトル空間に埋め込むことで対応づけるマルチモーダルなモデルである。大量の画像とテキストの組をインターネットから収集して対照学習を行うことで、ラベル付き教師データを使わなくても画像分類が行えるゼロショット性能を実現し、Stable DiffusionやDALL-Eなど後続の画像生成モデルの構成要素としても広く使われている。", "note": "", "imp": "○"}, {"id": 256, "cat": "11.社会実装-産業", "term": "ビッグデータ", "en": "Big Data", "desc": "従来のデータベースや表計算では扱いきれないほど量が多く、種類が多様で、生成される速度も速いデータの総称である。量（Volume）、多様性（Variety）、速度（Velocity）の3つのVで特徴づけられることが多く、SNSの投稿やセンサーログ、購買履歴などが該当する。ディープラーニングはこうした大量データから複雑なパターンを学習できるため、ビッグデータの活用と相性が良い。", "note": "", "imp": "○"}, {"id": 257, "cat": "11.社会実装-産業", "term": "IoT", "en": "Internet of Things", "desc": "家電、自動車、工場の設備など、あらゆるモノにセンサーや通信機能を搭載してインターネットに接続し、データの収集や機器の遠隔制御を可能にする仕組みである。IoT機器から集まる大量のセンサーデータはビッグデータの主要な発生源であり、そのデータをAIで分析して異常検知や需要予測を行うといった形で、IoTとAIは組み合わせて活用されることが多い。", "note": "", "imp": "○"}, {"id": 258, "cat": "11.社会実装-産業", "term": "GPU", "en": "Graphics Processing Unit", "desc": "元々は3Dグラフィックスの画像処理のために開発された演算装置で、多数の単純な計算を同時にこなす並列処理に優れる。ディープラーニングの学習では行列演算を大量に繰り返す必要があり、この並列計算能力が非常に有効であるため、CPUだけで学習する場合に比べて桁違いに高速に学習を行えることから、深層学習の実用化を支えた立役者とされている。", "note": "", "imp": "◎"}, {"id": 259, "cat": "11.社会実装-産業", "term": "TPU", "en": "Tensor Processing Unit", "desc": "Googleがディープラーニングの計算に特化して独自に開発した演算処理装置である。汎用的な計算ができるGPUとは異なり、ニューラルネットワークの行列演算に処理を絞り込むことで高い電力効率と処理速度を実現しており、Google検索や翻訳など自社サービスの機械学習基盤やクラウドサービスとして提供されている。", "note": "", "imp": "○"}, {"id": 260, "cat": "11.社会実装-産業", "term": "エッジAI", "en": "Edge AI", "desc": "クラウド上のサーバーではなく、スマートフォンやセンサー機器などの末端の端末そのものでAIの推論処理を行う方式である。クラウドAIのようにネットワーク経由でサーバーに問い合わせる必要がないため、通信遅延が少なく、通信できない環境でも動作し、個人情報を外部に送らずに済むという利点がある。自動運転車のカメ
